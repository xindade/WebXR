<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎈🎉 VR 气球派对</title>
    <style>
        :root { --bg: #1a0a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        canvas { display: block; }
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: flex-start;
            align-items: center; padding-top: 24px;
        }
        #score-panel {
            background: linear-gradient(135deg, rgba(255,50,120,0.3), rgba(255,170,0,0.25));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 3px solid rgba(255,215,0,0.6); border-radius: 28px;
            padding: 16px 40px; color: #fff; text-align: center;
            pointer-events: auto; transition: all 0.3s ease;
            box-shadow:
                0 0 30px rgba(255,50,150,0.4),
                0 8px 32px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255,255,255,0.08);
        }
        #score-panel .label {
            font-size: 14px; text-transform: uppercase; letter-spacing: 5px;
            opacity: 0.9; font-weight: 600;
            background: linear-gradient(90deg, #ff6eb4, #ffd700, #ff6eb4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #score-panel .score {
            font-size: 60px; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, #fff176, #ffb300, #ff6d00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,200,0,0.7));
            animation: scoreGlow 2s ease-in-out infinite alternate;
        }
        @keyframes scoreGlow { from{filter:drop-shadow(0 0 10px rgba(255,200,0,0.5));} to{filter:drop-shadow(0 0 25px rgba(255,200,0,0.9));} }
        #score-panel .combo {
            font-size: 18px; color: #ffdd57; opacity: 0; transition: opacity 0.2s;
            min-height: 26px; font-weight: 700; letter-spacing: 2px;
        }
        #score-panel .combo.active { opacity: 1; animation: comboBounce 0.5s cubic-bezier(0.68,-0.55,0.265,1.55); }
        @keyframes comboBounce { 0%,100%{ transform: scale(1) translateY(0); } 50%{ transform: scale(1.4) translateY(-5px); } }

        /* ── 入口按钮区 ── */
        #vr-entry {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 20; pointer-events: auto;
        }
        #enter-vr-btn {
            display: block; padding: 18px 56px; font-size: 22px; font-weight: 800;
            letter-spacing: 3px; color: #fff;
            background: linear-gradient(135deg, #ff2d7a, #ff6b35, #ffd700);
            background-size: 200% 200%;
            animation: btnShimmer 3s ease infinite;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255,45,122,0.6), inset 0 0 20px rgba(255,255,255,0.15);
            text-transform: uppercase; outline: none;
            /* 确保 VR 头显中可点击 */
            min-height: 52px;
        }
        @keyframes btnShimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        #enter-vr-btn:hover {
            box-shadow: 0 0 60px rgba(255,107,53,0.9), inset 0 0 30px rgba(255,255,255,0.25);
            transform: translateY(-4px) scale(1.05);
        }
        #enter-vr-btn:active { transform: scale(0.95); }
        #enter-vr-btn:disabled { background: #444; box-shadow: none; cursor: not-allowed; opacity: 0.5; animation: none; }
        #vr-hints {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            z-index: 15; pointer-events: none; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
        }
        .hint-badge {
            background: linear-gradient(135deg, rgba(255,50,150,0.25), rgba(255,180,0,0.2));
            border: 2px solid rgba(255,215,0,0.4); border-radius: 24px;
            padding: 10px 22px; color: #fff; font-size: 14px; font-weight: 600;
            letter-spacing: 1px; backdrop-filter: blur(8px); white-space: nowrap;
            box-shadow: 0 0 15px rgba(255,150,0,0.2);
        }
        .hint-badge .key { font-weight: 800; color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.6); }

        /* ── 状态消息（VR 内也可见）── */
        #status-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 30; color: #fff; font-size: 20px; font-weight: 700; text-align: center;
            pointer-events: none; background: rgba(0,0,0,0.9); padding: 28px 40px;
            border-radius: 20px; border: 3px solid rgba(255,215,0,0.5); display: none;
        }
        #status-msg.error { background: rgba(180,20,60,0.95); border-color: #ff3366; display: block !important; }
        #status-msg.info { background: rgba(30,20,80,0.95); border-color: #aa66ff; display: block !important; }

        /* ── 3D 内嵌提示文字（VR 内显示）── */
        #vr-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25; pointer-events: none; display: none;
            justify-content: center; align-items: center;
        }
        #vr-overlay .overlay-text {
            color: #fff; font-size: 36px; font-weight: 900;
            text-shadow: 0 0 30px #ff2d7a, 0 0 60px #ff6b35;
            animation: pulseText 1s ease-in-out infinite alternate;
        }
        @keyframes pulseText { from{opacity:0.7;transform:scale(0.95);} to{opacity:1;transform:scale(1.05);} }

        /* 浮动得分动画 */
        .float-score {
            position: fixed; pointer-events: none; z-index: 50;
            font-size: 32px; font-weight: 900; color: #ffd700;
            text-shadow: 0 0 10px rgba(255,200,0,0.8), 0 2px 4px rgba(0,0,0,0.5);
            animation: floatUp 1s ease-out forwards;
        }
        .float-score.golden {
            font-size: 42px; color: #fff;
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00, 0 2px 4px rgba(0,0,0,0.5);
            animation: floatUpGold 1.2s ease-out forwards;
        }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(0.5);} 100%{opacity:0;transform:translateY(-80px) scale(1.3);} }
        @keyframes floatUpGold { 0%{opacity:1;transform:translateY(0) scale(0.3) rotate(-10deg);} 50%{transform:translateY(-40px) scale(1.5) rotate(5deg);} 100%{opacity:0;transform:translateY(-100px) scale(1) rotate(-5deg);} }

        /* 加载动画 */
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-dot { display: inline-block; width: 8px; height: 8px; margin: 0 3px; border-radius: 50%; background: #ffd700; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="score-panel">
            <div class="label">🎯 得 分</div>
            <div class="score" id="score-value">0</div>
            <div class="combo" id="combo-text"></div>
        </div>
    </div>
    <div id="vr-entry"><button id="enter-vr-btn">🎈 进入VR气球派对！</button></div>
    <div id="vr-hints">
        <span class="hint-badge">🔫 <span class="key">右手扳机</span> 自动步枪</span>
        <span class="hint-badge">🔫 <span class="key">左手扳机</span> 手枪单发</span>
        <span class="hint-badge">🕹️ <span class="key">摇杆</span> 移动</span>
        <span class="hint-badge">🅰️ <span class="key">A键</span> 退出</span>
    </div>
    <div id="status-msg"></div>
    <div id="vr-overlay"><div class="overlay-text" id="overlay-text"></div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ════════════════════════════════════
        //  DOM 元素
        // ════════════════════════════════════
        const scoreValueEl = document.getElementById('score-value');
        const comboTextEl = document.getElementById('combo-text');
        const enterVRBtn = document.getElementById('enter-vr-btn');
        const statusMsgEl = document.getElementById('status-msg');
        const vrHintsEl = document.getElementById('vr-hints');
        const vrEntryEl = document.getElementById('vr-entry');
        const vrOverlay = document.getElementById('vr-overlay');
        const overlayText = document.getElementById('overlay-text');

        // ════════════════════════════════════
        //  游戏常量 & 状态
        // ════════════════════════════════════
        let score = 0, comboCount = 0, comboTimer;
        const COMBO_TIMEOUT = 1500, BALLOON_POINTS = 10, GOLDEN_POINTS = 30;
        const MAX_BALLOONS = 20, SPAWN_INTERVAL = 1800;
        const SPAWN_RADIUS_MIN = 4, SPAWN_RADIUS_MAX = 14;
        const SPAWN_HEIGHT_MIN = 1.2, SPAWN_HEIGHT_MAX = 4.5;
        const MOVE_SPEED = 3.5, RAY_MAX_DISTANCE = 20, GOLDEN_CHANCE = 0.12;
        const RIFLE_COOLDOWN = 120;
        const DEADZONE = 0.2;

        /** @type {{stickX:number,stickY:number,trigger:boolean}} */
        const rightInput = { stickX: 0, stickY: 0, trigger: false };
        /** @type {{stickX:number,stickY:number,trigger:boolean}} */
        const leftInput  = { stickX: 0, stickY: 0, trigger: false };

        // 游戏运行标志
        let gameActive = false;
        let vrSessionStarted = false;

        // ════════════════════════════════════
        //  Three.js 场景初始化
        // ════════════════════════════════════
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = false;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();

        // ── 渐变天空 ──
        const skyGeo = new THREE.SphereGeometry(90, 32, 32);
        const skyMat = new THREE.ShaderMaterial({
            side: THREE.BackSide,
            uniforms: {
                uTopColor:   { value: new THREE.Color(0xff6eb4) },
                uMidColor:   { value: new THREE.Color(0x64b5f6) },
                uBottomColor:{ value: new THREE.Color(0xffb347) },
                uOffset:     { value: 0.4 }, uExponent:   { value: 0.6 },
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPos = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPos.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }`,
            fragmentShader: `
                uniform vec3 uTopColor, uMidColor, uBottomColor;
                uniform float uOffset, uExponent;
                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize(vWorldPosition).y + uOffset;
                    float t = pow(max(h, 0.0), uExponent);
                    vec3 col = mix(uBottomColor, uMidColor, smoothstep(0.0, 0.5, t));
                    col = mix(col, uTopColor, smoothstep(0.5, 1.0, t));
                    gl_FragColor = vec4(col, 1.0);
                }`
        });
        scene.add(new THREE.Mesh(skyGeo, skyMat));
        scene.fog = new THREE.FogExp2(0xff88cc, 0.012);

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 0);
        const dolly = new THREE.Group();
        dolly.add(camera);
        scene.add(dolly);

        // ── 光照 ──
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sunLight = new THREE.DirectionalLight(0xfff0e0, 2.0);
        sunLight.position.set(15, 25, 10);
        scene.add(sunLight);
        scene.add(new THREE.HemisphereLight(0xff88cc, 0x88ff88, 0.8));

        // 彩虹旋转灯
        const partyLights = [];
        const rainbowColors = [0xff3366, 0xff9933, 0xffff33, 0x33ff66, 0x3399ff, 0xcc33ff];
        for (let i = 0; i < 6; i++) {
            const light = new THREE.PointLight(rainbowColors[i], 2, 25);
            const angle = (i / 6) * Math.PI * 2;
            light.position.set(Math.cos(angle)*12, 4+Math.random()*4, Math.sin(angle)*12);
            scene.add(light);
            partyLights.push({ light, angle, speed: 0.3+Math.random()*0.4, radius: 10+Math.random()*6, yOffset: 3+Math.random()*4 });
        }

        // ════════════════════════════════════
        //  地面 — 彩虹棋盘格
        // ════════════════════════════════════
        function createPartyGround() {
            const groundGroup = new THREE.Group();
            const groundMat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor1: { value: new THREE.Color(0xff6eb4) },
                    uColor2: { value: new THREE.Color(0x64d2ff) },
                    uScale: { value: 3.0 }, uTime: { value: 0 },
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() { vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
                fragmentShader: `
                    uniform vec3 uColor1,uColor2; uniform float uScale,uTime; varying vec2 vUv;
                    void main() {
                        vec2 uv=vUv*uScale; float checker=mod(floor(uv.x)+floor(uv.y),2.0);
                        vec3 baseCol=mix(uColor1,uColor2,checker);
                        float dist=length(vUv-0.5)*1.8; float edge=1.0-smoothstep(0.5,1.0,dist);
                        gl_FragColor=vec4(baseCol*(0.6+0.4*edge),1.0);
                    }`
            });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(80,80,1,1), groundMat);
            ground.rotation.x=-Math.PI/2; ground.position.y=-0.01;
            groundGroup.add(ground); ground.userData.material=groundMat;
            for(let ring=0;ring<3;ring++){
                const rRadius=6+ring*8;
                const ringMesh=new THREE.Mesh(
                    new THREE.RingGeometry(rRadius-0.15,rRadius+0.15,64),
                    new THREE.MeshBasicMaterial({color:rainbowColors[ring%rainbowColors.length],transparent:true,opacity:0.35,side:THREE.DoubleSide})
                );
                ringMesh.rotation.x=-Math.PI/2; ringMesh.position.y=0.005;
                groundGroup.add(ringMesh);
            }
            return groundGroup;
        }
        const groundScene=createPartyGround(); scene.add(groundScene);

        // ════════════════════════════════════
        //  派对装饰物
        // ════════════════════════════════════
        const decorGroup=new THREE.Group(); scene.add(decorGroup);
        function createDecorBalloonString(x,z,colors){
            const group=new THREE.Group(); let yPos=0;
            for(const c of colors){
                const b=new THREE.Mesh(new THREE.SphereGeometry(0.25,12,10),new THREE.MeshStandardMaterial({color:c,roughness:0.3,emissive:c,emissiveIntensity:0.2}));
                b.scale.y=1.3; b.position.set((Math.random()-0.5)*0.3,yPos,(Math.random()-0.5)*0.3);
                group.add(b); yPos+=0.6+Math.random()*0.3;
            }
            group.position.set(x,3+Math.random()*4,z);
            group.userData.baseY=group.position.y; group.userData.phase=Math.random()*Math.PI*2;
            return group;
        }
        const balloonColors=[0xff3b3b,0xff6b35,0xffc635,0x4caf50,0x2196f3,0x9c27b0,0xe91e63,0x00bcd4,0xff9800,0x8bc34a];
        for(let i=0;i<16;i++){
            const angle=(i/16)*Math.PI*2,r=15+Math.random()*18;
            const x=Math.cos(angle)*r,z=Math.sin(angle)*r;
            if(Math.abs(x)<4&&Math.abs(z)<4) continue;
            const cols=[];
            for(let j=0;j<4+Math.floor(Math.random()*4);j++) cols.push(balloonColors[Math.floor(Math.random()*balloonColors.length)]);
            decorGroup.add(createDecorBalloonString(x,z,cols));
        }

        // 彩色柱子
        const pillarColors=[0xff3366,0xff9933,0xffee33,0x33ff77,0x33bbff,0xcc33ff];
        for(let i=0;i<10;i++){
            const angle=(i/10)*Math.PI*2+Math.random()*0.2,radius=10+Math.random()*18;
            const px=Math.cos(angle)*radius,pz=Math.sin(angle)*radius;
            const pCol=pillarColors[i%pillarColors.length];
            const pillar=new THREE.Group();
            const shaft=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.45,4,12),new THREE.MeshStandardMaterial({color:pCol,roughness:0.2,metalness:0.6,emissive:pCol,emissiveIntensity:0.3}));
            shaft.position.y=2; pillar.add(shaft);
            const top=new THREE.Mesh(new THREE.SphereGeometry(0.5,12,10),new THREE.MeshStandardMaterial({color:pCol,roughness:0.15,metalness:0.8,emissive:pCol,emissiveIntensity:0.5}));
            top.position.y=4.4; pillar.add(top);
            const ring=new THREE.Mesh(new THREE.TorusGeometry(0.38,0.03,8,24),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.7}));
            ring.position.y=3.5; ring.rotation.x=Math.PI/2; pillar.add(ring);
            pillar.position.set(px,0,pz); scene.add(pillar);
        }

        // 星星粒子
        const starsGeo=new THREE.BufferGeometry(), starPositions=[],starColors=[];
        for(let i=0;i<300;i++){starPositions.push((Math.random()-0.5)*70,Math.random()*20+2,(Math.random()-0.5)*70);const sc=new THREE.Color(rainbowColors[Math.floor(Math.random()*rainbowColors.length)]);starColors.push(sc.r,sc.g,sc.b);}
        starsGeo.setAttribute('position',new THREE.Float32BufferAttribute(starPositions,3));
        starsGeo.setAttribute('color',new THREE.Float32BufferAttribute(starColors,3));
        const stars=new THREE.Points(starsGeo,new THREE.PointsMaterial({size:0.15,vertexColors:true,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending}));
        scene.add(stars);

        // ════════════════════════════════════
        //  气球系统
        // ════════════════════════════════════
        const balloons=[],balloonGroup=new THREE.Group();scene.add(balloonGroup);
        const goldenColor=0xffd700;
        function createBalloonMesh(color){
            const g=new THREE.Group();
            const body=new THREE.Mesh(new THREE.SphereGeometry(0.35,24,20),new THREE.MeshStandardMaterial({color,roughness:0.2,metalness:0.05,emissive:color,emissiveIntensity:0.25}));
            body.name='balloonBody';g.add(body);
            g.add(new THREE.Mesh(new THREE.ConeGeometry(0.06,0.14,8,8),new THREE.MeshStandardMaterial({color:new THREE.Color(color).multiplyScalar(0.6),roughness:0.5})).translateY(-0.38));
            g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.025,0.22,6),new THREE.MeshStandardMaterial({color:0xcccccc,roughness:0.6})).translateY(-0.5));
            const hl=new THREE.Mesh(new THREE.SphereGeometry(0.09,8,6),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.6}));
            hl.position.set(0.13,0.17,0.13);g.add(hl);
            const glow=new THREE.Mesh(new THREE.SphereGeometry(0.45,16,12),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.12,side:THREE.BackSide}));
            g.add(glow);g.userData={bodyMesh:body,bodyMaterial:body.material};return g;
        }

        function spawnBalloon(forceGolden=false){
            if(balloons.length>=MAX_BALLOONS)removeOldestBalloon();
            const isGolden=forceGolden||Math.random()<GOLDEN_CHANCE;
            const color=isGolden?goldenColor:balloonColors[Math.floor(Math.random()*balloonColors.length)];
            const b=createBalloonMesh(color);
            b.userData.isGolden=isGolden;b.userData.color=color;
            b.userData.baseY=SPAWN_HEIGHT_MIN+Math.random()*(SPAWN_HEIGHT_MAX-SPAWN_HEIGHT_MIN);
            b.userData.floatSpeed=0.5+Math.random()*1.8;b.userData.floatAmp=0.15+Math.random()*0.6;
            b.userData.floatPhase=Math.random()*Math.PI*2;
            b.userData.driftX=(Math.random()-0.5)*0.4;b.userData.driftZ=(Math.random()-0.5)*0.4;
            b.userData.points=isGolden?GOLDEN_POINTS:BALLOON_POINTS;
            const pos=dolly.position;const angle=Math.random()*Math.PI*2;
            const r=SPAWN_RADIUS_MIN+Math.random()*(SPAWN_RADIUS_MAX-SPAWN_RADIUS_MIN);
            b.position.set(pos.x+Math.cos(angle)*r,b.userData.baseY,pos.z+Math.sin(angle)*r);
            b.userData.spawnPos=b.position.clone();
            if(isGolden){b.userData.bodyMaterial.emissive=new THREE.Color(goldenColor);b.userData.bodyMaterial.emissiveIntensity=0.7;b.scale.setScalar(0.9);const goldGlow=new THREE.Mesh(new THREE.SphereGeometry(0.6,16,12),new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:0.15,side:THREE.BackSide}));b.add(goldGlow);}
            balloonGroup.add(b);balloons.push(b);return b;
        }

        function removeOldestBalloon(){
            if(!balloons.length)return;const old=balloons.shift();const start=performance.now(),duration=800,startPos=old.position.clone();
            const rise=3+Math.random()*4,dx=(Math.random()-0.5)*2,dz=(Math.random()-0.5)*2;
            function anim(t){const e=Math.min((t-start)/duration,1);old.position.set(startPos.x+dx*e*e,startPos.y+rise*e*e,startPos.z+dz*e*e);old.scale.setScalar(1-e*0.7);old.userData.bodyMaterial.opacity=1-e;old.userData.bodyMaterial.transparent=true;if(e<1)requestAnimationFrame(anim);else disposeBalloon(old);}
            requestAnimationFrame(anim);
        }
        function disposeBalloon(b){balloonGroup.remove(b);b.traverse(c=>{if(c.geometry&&c.geometry!==b.userData.bodyMesh?.geometry)c.geometry.dispose();if(c.material)Array.isArray(c.material)?c.material.forEach(m=>m.dispose()):c.material.dispose();});b.userData.bodyMaterial?.dispose();b.userData.bodyMesh?.geometry?.dispose();}

        // ════════════════════════════════════
        //  碎片系统
        // ════════════════════════════════════

        }

        function updateDebris(dt){

                if(!ud.grounded){d.position.x+=ud.velocity.x*dt;d.position.y+=ud.velocity.y*dt;d.position.z+=ud.velocity.z*dt;d.rotation.x+=ud.rotSpeed.x*dt;d.rotation.y+=ud.rotSpeed.y*dt;d.rotation.z+=ud.rotSpeed.z*dt;ud.velocity.y-=9.8*dt;if(d.position.y<=0.01){d.position.y=0.01;ud.grounded=true;ud.velocity.set(0,0,0);}}

            for(let i=0;i<buf.length;i++){const t=i/audioCtx.sampleRate,env=Math.exp(-t*(isGolden?14:22));data[i]=(Math.random()*2-1)*env*0.75+Math.sin(t*(isGolden?900:550)*Math.PI*2)*env*0.45+Math.sin(t*(isGolden?1400:800)*Math.PI*2)*env*0.25;}

        }catch(e){}}

            flash.add(new THREE.Mesh(new THREE.SphereGeometry(0.1,8,8),new THREE.MeshBasicMaterial({color:colorHex,transparent:true,opacity:0})));

        // 后坐力
        function applyRecoil(gunMesh,strength=1){gunMesh.userData.recoilStrength=strength;gunMesh.userData.recoilTime=0;}
        function updateRecoils(dt){
            [rightController,leftController].forEach(ctrl=>{
                if(!ctrl?.userData.gunModel)return;const gun=ctrl.userData.gunModel;
                if(gun.userData.recoilStrength!==undefined&&gun.userData.recoilTime!==undefined){
                    const totalDur=0.1;gun.userData.recoilTime+=dt;const t=gun.userData.recoilTime/totalDur;
                    if(t>=1){gun.position.set(0,0,0);delete gun.userData.recoilStrength;delete gun.userData.recoilTime;}
                    else{gun.position.set(0,0,gun.userData.recoilStrength*0.04*Math.max(0,1-t*4));gun.rotation.x=gun.userData.recoilStrength*0.05*Math.max(0,1-t*3);}

            });
            [leftController,rightController].forEach(ctrl=>{
                if(!ctrl?.userData.muzzleFlash)return;const mf=ctrl.userData.muzzleFlash;
                if(mf.userData.active){mf.userData.timer-=dt;if(mf.userData.timer<=0){mf.userData.active=false;mf.children.forEach(c=>{c.material.opacity=0;});}
                else{const fade=mf.userData.timer/0.06;mf.children.forEach(c=>{c.material.opacity=fade;});mf.scale.setScalar(1+(1-fade)*2);}
            });
        }
        function triggerMuzzleFlash(controller){if(!controller?.userData.muzzleFlash)return;const mf=controller.userData.muzzleFlash;mf.userData.active=true;mf.userData.timer=0.06;mf.children.forEach(c=>{c.material.opacity=1;});mf.scale.setScalar(1);}

        // 左手得分面板

            if(!leftScoreCanvas||!leftScoreTexture)return;

            ctx.clearRect(0,0,W,H);ctx.fillStyle='rgba(30,0,50,0.8)';roundRect(ctx,4,4,W-8,H-8,14);ctx.fill();
            const grad=ctx.createLinearGradient(0,0,W,0);grad.addColorStop(0,'#ff3366');grad.addColorStop(0.33,'#ffaa00');grad.addColorStop(0.66,'#33ff77');grad.addColorStop(1,'#3388ff');ctx.strokeStyle=grad;ctx.lineWidth=3;roundRect(ctx,4,4,W-8,H-8,14);ctx.stroke();

        // 子弹系统

            else{geom=new THREE.SphereGeometry(0.03,10,8);mat=new THREE.MeshStandardMaterial({color:0x44ccff,emissive:0x0088ff,emissiveIntensity:0.6,roughness:0.15,metalness:0.4});trail=new THREE.Mesh(new THREE.CylinderGeometry(0.006,0.012,0.12,6),new THREE.MeshBasicMaterial({color:0x2299ff,transparent:true,opacity:0.5}));trail.rotation.x=Math.PI/2;trail.position.z=0.07;}
            const bullet=new THREE.Group();bullet.add(new THREE.Mesh(geom,mat));if(trail)bullet.add(trail);bullet.position.copy(origin);bullet.lookAt(origin.clone().add(direction));bullet.userData={velocity:direction.clone().normalize().multiplyScalar(speed),life:1.5};bulletGroup.add(bullet);bullets.push(bullet);

        // 开枪核心函数
        let leftTriggerWas=false;
        function shoot(controller){
            try{
                const{origin,direction}=getControllerRay(controller);
                if(!Number.isFinite(origin.x)||!Number.isFinite(direction.x))return;
                spawnBullet(origin,direction,controller===rightController);
                playShootSound();
                triggerMuzzleFlash(controller);
                if(controller.userData.gunModel)applyRecoil(controller.userData.gunModel,controller===rightController?1:0.7);
            }catch(e){console.error('shoot:',e)}
        }

        function updateBullets(dt){const _bp=new THREE.Vector3(),_balp=new THREE.Vector3();
            for(let i=bullets.length-1;i>=0;i--){const b=bullets[i],ud=b.userData;ud.life-=dt;b.position.x+=ud.velocity.x*dt;b.position.y+=ud.velocity.y*dt;b.position.z+=ud.velocity.z*dt;b.lookAt(b.position.clone().add(ud.velocity));let hit=false;
                if(ud.life>0&&balloons.length>0){_bp.copy(b.position);for(let j=balloons.length-1;j>=0;j--){const bal=balloons[j];_balp.copy(bal.position);if(_bp.distanceTo(_balp)<0.42){hit=true;destroyBalloon(bal,_balp.clone());break;}}}
                if(hit||ud.life<=0||Math.abs(b.position.y)>50||Math.abs(b.position.x)>60||Math.abs(b.position.z)>60){b.traverse(c=>{if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose()});bulletGroup.remove(b);bullets.splice(i,1);}}
        }

        const raycaster=new THREE.Raycaster();raycaster.far=RAY_MAX_DISTANCE;

        function checkBalloonHit(controller){const{o,d}=getControllerRay(controller);raycaster.set(o,d);const hits=raycaster.intersectObjects(balloons.map(b=>b.userData.bodyMesh).filter(Boolean),false);if(hits.length)for(const b of balloons)if(b.userData.bodyMesh===hits[0].object)return{balloon:b,hits:hits[0].point.clone()};return null;}

        function setupController(idx){

        function handleLeftFire(dt){if(!leftController||!leftInput.trigger){leftTriggerWas=false;return;}if(pistolCooldown>0)return;if(!leftTriggerWas&&pistolCooldown<=0){shoot(leftController);pistolCooldown=0.25;leftTriggerWas=true;}if(pistolCooldown>0)pistolCooldown-=dt;}

        // 移动
        function handleMove(dt){let sx=rightInput.stickX,sy=rightInput.stickY;if(Math.abs(sx)<DEADZONE&&Math.abs(sy)<DEADZONE){sx=leftInput.stickX;sy=leftInput.stickY;}if(Math.abs(sx)<DEADZONE&&Math.abs(sy)<DEADZONE)return;const f=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);f.y=0;f.normalize();const r=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);r.y=0;r.normalize();const md=new THREE.Vector3().addScaledVector(f,-sy).addScaledVector(r,sx).normalize();const sp=MOVE_SPEED*Math.max(Math.abs(sx),Math.abs(sy));dolly.position.addScaledVector(md,sp*dt);dolly.position.x=THREE.MathUtils.clamp(dolly.position.x,-30,30);dolly.position.z=THREE.MathUtils.clamp(dolly.position.z,-30,30);}

        // 气球生成与动画
        let lastSpawn=0;
        function spawnLoop(now){if(now-lastSpawn>SPAWN_INTERVAL){lastSpawn=now;if(balloons.length<MAX_BALLOONS)spawnBalloon();if(Math.random()<0.25&&balloons.length<MAX_BALLOONS-1)setTimeout(()=>{if(balloons.length<MAX_BALLOONS)spawnBalloon()},300+Math.random()*500);}}
        function animBalloons(now){balloons.forEach(b=>{const t=now*0.001;b.position.y=b.userData.baseY+Math.sin(t*b.userData.floatSpeed+b.userData.floatPhase)*b.userData.floatAmp;b.position.x+=b.userData.driftX*0.016;b.position.z+=b.userData.driftZ*0.016;b.rotation.y+=0.003;b.rotation.x+=Math.sin(t*0.7+b.userData.floatPhase)*0.005;const dx=b.position.x-b.userData.spawnPos.x,dz=b.position.z-b.userData.spawnPos.z;if(Math.sqrt(dx*dx+dz*dz)>5){b.userData.driftX*=-0.8;b.userData.driftZ*=-0.8;}});
            decorGroup.children.forEach(d=>{d.position.y=d.userData.baseY+Math.sin(now*0.0008+d.userData.phase)*0.3;d.rotation.y=now*0.0003+d.userData.phase;});
            stars.rotation.y=now*0.00005;
            partyLights.forEach(pl=>{pl.angle+=pl.speed*0.016;pl.light.position.set(Math.cos(pl.angle)*pl.radius,pl.yOffset+Math.sin(now*0.001+pl.angle)*1.5,Math.sin(pl.angle)*pl.radius);});
        }

        // ════════════════════════════════════
        //  主循环
        // ════════════════════════════════════
        const clock=new THREE.Clock();
        function animate(ts,frame){
            const dt=Math.min(clock.getDelta(),0.1);

            if(renderer.xr.isPresenting && gameActive){
                // ===== VR 游戏模式 =====
                try {
                    updateInput();
                    handleExit();
                    handleMove(dt);
                    handleAutoFire(dt);
                    handleLeftFire(dt);
                    spawnLoop(ts);
                    animBalloons(ts);
                    updateDebris(dt);
                    updateBullets(dt);
                    updateRecoils(dt);
                    controllers.forEach(c => {
                        const h = checkBalloonHit(c);
                        updateLaserPointer(c, h ? h.point : null);
                    });
                    updateLeftScoreDisplay();

                    // 隐藏 2D UI
                    vrEntryEl.style.display = 'none';
                    vrHintsEl.style.display = 'none';
                    statusMsgEl.style.display = 'none';

                    if(groundScene.userData.material)
                        groundScene.userData.material.uniforms.uTime.value = ts * 0.001;
                } catch(loopErr) {
                    console.error('[GAME LOOP ERROR]', loopErr);
                }
            }
            else if(renderer.xr.isPresenting && !gameActive){
                // ===== VR 已连接但游戏未激活（过渡态）=====
                vrEntryEl.style.display = 'none';
                vrHintsEl.style.display = 'none';
                animBalloons(ts);
                partyLights.forEach(pl => {
                    pl.angle += pl.speed * 0.016;
                    pl.light.position.set(
                        Math.cos(pl.angle) * pl.radius,
                        pl.yOffset,
                        Math.sin(pl.angle) * pl.radius
                    );
                });
                stars.rotation.y = ts * 0.00005;
            }
            else {
                // ===== 非 VR / 2D 预览模式 =====
                vrEntryEl.style.display = 'block';
                vrHintsEl.style.display = 'flex';
                animBalloons(ts);
                partyLights.forEach(pl => {
                    pl.angle += pl.speed * 0.016;
                    pl.light.position.set(
                        Math.cos(pl.angle) * pl.radius,
                        pl.yOffset,
                        Math.sin(pl.angle) * pl.radius
                    );
                });
                stars.rotation.y = ts * 0.00005;
            }

            renderer.render(scene, camera);
        }
        renderer.setAnimationLoop(animate);

        // ════════════════════════════════════════════════
        //  ★★★ VR 进入逻辑（index12 彻底修复版）★★★
        // ════════════════════════════════════════════════
        function init(){
            setupController(0);
            setupController(1);
            for(let i=0;i<8;i++)setTimeout(()=>spawnBalloon(),i*250);
            setTimeout(()=>spawnBalloon(true),1500);
            lastSpawn=performance.now();

            // ─────────────────────────────────
            //  核心：进入VR
            //  策略：先 requiredFeatures 失败则 fallback 到 optionalFeatures
            // ─────────────────────────────────
            async function enterVRAction(e) {
                e && e.preventDefault();

                // 防止重复点击（ debounce ）
                if (enterVRBtn.disabled) return;

                console.log('[VR] === 按钮被点击，开始进入VR流程 ===');
                enterVRBtn.disabled = true;
                enterVRBtn.innerHTML = '⏳ 检测设备...';

                try {
                    // ── Step 1: 检查 WebXR API ──
                    console.log('[VR] Step 1: 检查 navigator.xr...');
                    if (!navigator.xr) {
                        throw new Error('此浏览器不支持 WebXR。\n请使用 Pico4/Quest 内置浏览器访问 HTTPS 页面。');
                    }
                    logStatus('✅ WebXR API 可用');

                    // ── Step 2: 检查 immersive-vr 支持 ──
                    enterVRBtn.innerHTML = '⏳ 检查VR支持...';
                    const supported = await navigator.xr.isSessionSupported('immersive-vr');
                    console.log('[VR] Step 2: immersive-vr supported =', supported);
                    if (!supported) {
                        throw new Error('设备不支持沉浸式VR模式。\n请确认：\n1. 已戴上头显\n2. 页面通过 HTTPS 访问\n3. 浏览器允许使用 VR 功能');
                    }
                    logStatus(`✅ VR 支持: ${supported}`);

                    // ── Step 3: 请求会话（双重策略）──
                    enterVRBtn.innerHTML = '⏳ 正在进入VR...';
                    let sess = null;
                    const sessionOpts = {
                        requiredFeatures: ['local-floor'],
                        optionalFeatures: ['bounded-floor', 'hand-tracking']
                    };

                    try {
                        console.log('[VR] Step 3a: 尝试 requiredFeatures: local-floor');
                        sess = await navigator.xr.requestSession('immersive-vr', sessionOpts);
                        console.log('[VR] ✅ requiredFeatures 模式成功！');
                    } catch (reqErr) {
                        console.warn('[VR] ⚠️ requiredFeatures 失败:', reqErr.message);
                        console.log('[VR] Step 3b: 回退到 optionalFeatures...');

                        // Fallback: 去掉 required，全部改为 optional
                        sess = await navigator.xr.requestSession('immersive-vr', {
                            optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
                        });
                        console.log('[VR] ✅ optionalFeatures 模式成功！');
                    }

                    // ── Step 4: 绑定渲染器 ──
                    enterVRBtn.innerHTML = '🎮 初始化场景...';
                    console.log('[VR] Step 4: 绑定 renderer.xr.setSession...');
                    await renderer.xr.setSession(sess);
                    console.log('[VR] ✅ 渲染器已绑定！');

                    // ── Step 5: 标记VR已启动 ──
                    vrSessionStarted = true;
                    gameActive = true;
                    console.log('[VR] 🎉 VR 会话完整启动！gameActive =', gameActive);

                    // 显示进入成功的覆盖层
                    showOverlay('🎉 PARTY TIME!');
                    setTimeout(() => hideOverlay(), 2000);

                } catch (err) {
                    console.error('[VR] ❌ 进入失败:', err);
                    const errMsg = err.message || String(err);
                    resetButton(`❌ ${errMsg}`);
                    showStatus(errMsg, 'error');

                    // 确保状态回滚
                    vrSessionStarted = false;
                    gameActive = false;
                }
            }

            // ─────────────────────────────────────
            //  只绑定 click（不绑 touchstart）
            //  Pico4/Quest 触摸板点击天然触发 click 事件
            //  绑定 touchstart 反而可能导致重复调用 + preventDefault 干扰
            // ─────────────────────────────────────
            enterVRBtn.addEventListener('click', enterVRAction);

            // session 结束
            renderer.xr.addEventListener('sessionend', () => {
                console.log('[VR] Session ended');
                rifleTimer = 0;
                pistolCooldown = 0;
                vrSessionStarted = false;
                gameActive = false;
                resetButton('🎈 进入VR气球派对！');
                vrEntryEl.style.display = 'block';
                vrHintsEl.style.display = 'flex';
                showStatus('', '');
                hideOverlay();
                controllers.forEach(c => {
                    if(c.userData.laser) c.userData.laser.visible = false;
                });
            });

            // session 开始（确认帧开始渲染）
            renderer.xr.addEventListener('sessionstart', () => {
                console.log('[VR] sessionstart 事件触发！isPresenting =', renderer.xr.isPresenting);
                vrEntryEl.style.display = 'none';
                vrHintsEl.style.display = 'none';
                statusMsgEl.style.display = 'none';
                initAudio();

                // 双保险：再次确认 gameActive
                if (!gameActive) {
                    gameActive = true;
                    console.log('[VR] sessionstart 中激活 gameActive');
                }

                showOverlay('🎈🎉 LET\'S GO!');
                setTimeout(() => hideOverlay(), 1500);
            });

            // 键盘 ESC 退出
            window.addEventListener('keydown', e => {
                if(e.key === 'Escape' && renderer.xr.isPresenting) exitVR();
            });

            // 窗口缩放
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ── 辅助函数 ──
        function resetButton(html) {
            enterVRBtn.disabled = false;
            enterVRBtn.innerHTML = html || '🎈 进入VR气球派对！';
            enterVRBtn.style.fontSize = '';
            enterVRBtn.style.lineHeight = '';
        }

        function showStatus(msg, type) {
            statusMsgEl.innerHTML = msg;
            statusMsgEl.className = type || '';
            if (!msg) {
                statusMsgEl.style.display = 'none';
            } else {
                statusMsgEl.style.display = 'block';
            }
        }

        function logStatus(msg) {
            console.log('[VR]', msg);
        }

        function showOverlay(text) {
            overlayText.textContent = text;
            vrOverlay.style.display = 'flex';
        }

        function hideOverlay() {
            vrOverlay.style.display = 'none';
        }

        // 启动初始化
        init();
    </script>
</body>
</html>
