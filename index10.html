<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR 气球射击</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88);
      color: #fff; z-index: 10;
    }
    #overlay h1 { font-size: 2.4rem; margin-bottom: 1rem; letter-spacing: 3px; }
    #overlay .desc {
      font-size: 1rem; color: #ccc; margin-bottom: 2rem;
      text-align: center; line-height: 2.2;
      background: rgba(255,255,255,0.06);
      padding: 1rem 2rem; border-radius: 10px;
    }
    #startBtn {
      padding: 14px 48px; font-size: 1.15rem;
      background: linear-gradient(135deg,#e74c3c,#c0392b);
      color: #fff; border: none; border-radius: 10px;
      cursor: pointer; letter-spacing: 2px; box-shadow: 0 4px 16px rgba(231,76,60,0.5);
    }
    #startBtn:hover { filter: brightness(1.15); }

    #endScreen {
      display: none;
      position: fixed; inset: 0;
      flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.92);
      color: #fff; z-index: 20;
    }
    #endScreen h2 { font-size: 2.2rem; margin-bottom: 0.8rem; }
    #finalScore { font-size: 3.5rem; color: #f1c40f; margin-bottom: 2rem; font-weight: bold; }
    #restartBtn {
      padding: 13px 38px; font-size: 1rem;
      background: linear-gradient(135deg,#27ae60,#1e8449);
      color: #fff; border: none; border-radius: 10px;
      cursor: pointer; letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!-- ── 开始界面 ── -->
<div id="overlay">
  <h1>🎈 VR 气球射击</h1>
  <div class="desc">
    🔫 右手扳机 &nbsp;→&nbsp; 开枪<br/>
    🕹️ 摇杆 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→&nbsp; 移动<br/>
    🅰️ A 键 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→&nbsp; 退出游戏<br/>
    ⏱️ 60 秒内打爆更多气球！
  </div>
  <div id="xrStatus" style="font-size:0.85rem;margin-bottom:1rem;padding:6px 18px;border-radius:6px;background:rgba(255,255,255,0.08);color:#aaa;">
    正在检测 WebXR 支持…
  </div>
  <button id="startBtn" disabled style="opacity:0.5;">进入 VR</button>
</div>

<!-- ── 结束界面 ── -->
<div id="endScreen">
  <h2>🎉 游戏结束</h2>
  <div id="finalScore">0 分</div>
  <button id="restartBtn">🔄 再来一局</button>
</div>

<!-- Three.js r165 via CDN -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

// ═══════════════════════════════════════════
//  渲染器
// ═══════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── XR Session 管理 ──────────────────────────
let currentSession = null;

async function enterVR() {
  if (!navigator.xr) {
    alert('您的浏览器不支持 WebXR，请在 Pico4 浏览器中打开本页面。');
    return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!supported) {
    alert('当前设备/浏览器不支持 immersive-vr 模式。\n请确认：\n1. 在 Pico4 浏览器中访问\n2. 页面通过 HTTPS 或 localhost 访问');
    return;
  }
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
    });
    currentSession = session;
    await renderer.xr.setSession(session);
    session.addEventListener('end', () => {
      currentSession = null;
      gameRunning = false;
      document.getElementById('overlay').style.display = 'flex';
    });
  } catch (e) {
    console.error('XR requestSession 失败:', e);
    alert('进入 VR 失败：' + e.message);
  }
}

async function exitVR() {
  if (currentSession) {
    await currentSession.end();
  }
}

// ═══════════════════════════════════════════
//  场景 & 相机
// ═══════════════════════════════════════════
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 25, 65);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 0);

// XR Origin（移动容器）
const xrOrigin = new THREE.Group();
xrOrigin.add(camera);
scene.add(xrOrigin);

// ═══════════════════════════════════════════
//  光照
// ═══════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(6, 12, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far  = 60;
sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
sun.shadow.camera.right = sun.shadow.camera.top   =  20;
scene.add(sun);

// ═══════════════════════════════════════════
//  地面
// ═══════════════════════════════════════════
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshLambertMaterial({ color: 0x4caf50 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);
scene.add(new THREE.GridHelper(60, 40, 0x388e3c, 0x388e3c));

// ═══════════════════════════════════════════
//  远景树木（装饰）
// ═══════════════════════════════════════════
function makeTree(x, z) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.2, 1.2, 6),
    new THREE.MeshLambertMaterial({ color: 0x795548 })
  );
  trunk.position.set(x, 0.6, z);
  trunk.castShadow = true;
  scene.add(trunk);
  const top = new THREE.Mesh(
    new THREE.ConeGeometry(0.8, 1.8, 7),
    new THREE.MeshLambertMaterial({ color: 0x2e7d32 })
  );
  top.position.set(x, 2.0, z);
  top.castShadow = true;
  scene.add(top);
}
const treePos = [[-10,–12],[10,–14],[–14,–8],[14,–10],[–8,–18],[8,–16],[–16,–16],[16,–18]];
treePos.forEach(([x, z]) => makeTree(x, z));

// ═══════════════════════════════════════════
//  云朵
// ═══════════════════════════════════════════
function makeCloud(x, y, z) {
  const g = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  [[0,0,0,1.1],[1.0,0.35,0,0.85],[–0.9,0.3,0,0.75],[0,0.55,0,0.65]].forEach(([cx,cy,cz,r]) => {
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), mat);
    m.position.set(cx, cy, cz);
    g.add(m);
  });
  g.position.set(x, y, z);
  scene.add(g);
}
for (let i = 0; i < 10; i++) {
  makeCloud(
    (Math.random() - 0.5) * 50,
    8 + Math.random() * 4,
    –16 - Math.random() * 20
  );
}

// ═══════════════════════════════════════════
//  气球管理
// ═══════════════════════════════════════════
const COLORS = [0xe74c3c,0x3498db,0x2ecc71,0xf39c12,0x9b59b6,0xe67e22,0x1abc9c,0xe91e63,0xff5722];
const balloons = [];

function spawnBalloon() {
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  const mat   = new THREE.MeshPhongMaterial({ color, shininess: 100 });

  const body = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 12), mat);
  body.scale.y = 1.35;
  body.castShadow = true;

  // 绳子
  const pts = [new THREE.Vector3(0,–0.25,0), new THREE.Vector3(0.06,–0.65,0)];
  const strGeo = new THREE.BufferGeometry().setFromPoints(pts);
  const string = new THREE.Line(strGeo, new THREE.LineBasicMaterial({ color: 0xffffff }));

  const group = new THREE.Group();
  group.add(body);
  group.add(string);

  const angle = Math.random() * Math.PI * 2;
  const dist  = 4 + Math.random() * 10;
  group.position.set(
    Math.cos(angle) * dist,
    0.5 + Math.random() * 3.5,
    Math.sin(angle) * dist – 3
  );
  group.userData = {
    velY: 0.007 + Math.random() * 0.006,
    velX: (Math.random() – 0.5) * 0.004,
    velZ: (Math.random() – 0.5) * 0.004,
    phase: Math.random() * Math.PI * 2,
    alive: true,
    body
  };
  scene.add(group);
  balloons.push(group);
}

for (let i = 0; i < 18; i++) spawnBalloon();

// ═══════════════════════════════════════════
//  子弹
// ═══════════════════════════════════════════
const bullets = [];
const BULLET_SPEED = 0.55;
const BULLET_LIFE  = 90;

function fireBullet(worldPos, worldDir) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.045, 8, 6),
    new THREE.MeshBasicMaterial({ color: 0xffef00 })
  );
  mesh.position.copy(worldPos);
  const vel = worldDir.clone().normalize().multiplyScalar(BULLET_SPEED);
  mesh.userData = { vel, life: BULLET_LIFE };
  scene.add(mesh);
  bullets.push(mesh);
}

// ═══════════════════════════════════════════
//  爆炸粒子
// ═══════════════════════════════════════════
const particles = [];

function burst(pos, color) {
  for (let i = 0; i < 16; i++) {
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 4, 4),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
    );
    p.position.copy(pos);
    p.userData = {
      vel: new THREE.Vector3(
        (Math.random() – 0.5) * 0.2,
        Math.random() * 0.18,
        (Math.random() – 0.5) * 0.2
      ),
      life: 35
    };
    scene.add(p);
    particles.push(p);
  }
}

// ═══════════════════════════════════════════
//  手柄控制器
// ═══════════════════════════════════════════
const cmf = new XRControllerModelFactory();

const ctrlL     = renderer.xr.getController(0);
const ctrlGripL = renderer.xr.getControllerGrip(0);
ctrlGripL.add(cmf.createControllerModel(ctrlGripL));
xrOrigin.add(ctrlL, ctrlGripL);

const ctrlR     = renderer.xr.getController(1);
const ctrlGripR = renderer.xr.getControllerGrip(1);
ctrlGripR.add(cmf.createControllerModel(ctrlGripR));
xrOrigin.add(ctrlR, ctrlGripR);

// ── 右手激光（细圆柱）
function makeLaser(colorHex) {
  return new THREE.Mesh(
    new THREE.CylinderGeometry(0.003, 0.003, 22, 4),
    new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.55 })
  );
}
const aimLineR = makeLaser(0xff2020);
aimLineR.position.set(0, 0, –11);
aimLineR.rotation.x = Math.PI / 2;
ctrlR.add(aimLineR);

// ── 左手激光
const aimLineL = makeLaser(0x2080ff);
aimLineL.position.set(0, 0, –11);
aimLineL.rotation.x = Math.PI / 2;
ctrlL.add(aimLineL);

// 枪口闪光
const muzzleFlashR = new THREE.Mesh(
  new THREE.SphereGeometry(0.07, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0xffff80, transparent: true, opacity: 0 })
);
muzzleFlashR.position.set(0, 0, –0.18);
ctrlR.add(muzzleFlashR);

const muzzleFlashL = new THREE.Mesh(
  new THREE.SphereGeometry(0.07, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0xffff80, transparent: true, opacity: 0 })
);
muzzleFlashL.position.set(0, 0, –0.18);
ctrlL.add(muzzleFlashL);

// ═══════════════════════════════════════════
//  手柄得分 UI（Canvas Texture，附在右手柄上）
// ═══════════════════════════════════════════
const uiCanvas  = document.createElement('canvas');
uiCanvas.width  = 256;
uiCanvas.height = 128;
const uiCtx = uiCanvas.getContext('2d');
const uiTex = new THREE.CanvasTexture(uiCanvas);

const uiPanel = new THREE.Mesh(
  new THREE.PlaneGeometry(0.3, 0.15),
  new THREE.MeshBasicMaterial({ map: uiTex, transparent: true, depthWrite: false, side: THREE.DoubleSide })
);
uiPanel.position.set(0, 0.14, –0.06);
uiPanel.rotation.x = –0.35;
ctrlGripR.add(uiPanel);

let score    = 0;
let gameTime = 60;

function drawUI() {
  const W = 256, H = 128;
  uiCtx.clearRect(0, 0, W, H);

  // 背景
  uiCtx.fillStyle = 'rgba(0,0,0,0.6)';
  rrect(uiCtx, 4, 4, W–8, H–8, 14); uiCtx.fill();

  // 边框（时间不足10秒变红）
  uiCtx.strokeStyle = gameTime <= 10 ? 'rgba(255,80,80,0.95)' : 'rgba(255,200,60,0.9)';
  uiCtx.lineWidth = 3;
  rrect(uiCtx, 4, 4, W–8, H–8, 14); uiCtx.stroke();

  // 分隔线
  uiCtx.strokeStyle = 'rgba(255,255,255,0.15)';
  uiCtx.lineWidth = 1;
  uiCtx.beginPath(); uiCtx.moveTo(W/2, 12); uiCtx.lineTo(W/2, H–12); uiCtx.stroke();

  // SCORE
  uiCtx.fillStyle = '#ffd700';
  uiCtx.font = 'bold 18px sans-serif';
  uiCtx.textAlign = 'center';
  uiCtx.fillText('SCORE', W*0.26, 34);
  uiCtx.fillStyle = '#fff';
  uiCtx.font = 'bold 46px sans-serif';
  uiCtx.fillText(score, W*0.26, 94);

  // TIME
  uiCtx.fillStyle = gameTime <= 10 ? '#ff6666' : '#88ccff';
  uiCtx.font = 'bold 18px sans-serif';
  uiCtx.fillText('TIME', W*0.74, 34);
  uiCtx.fillStyle = '#fff';
  uiCtx.font = 'bold 46px sans-serif';
  uiCtx.fillText(gameTime, W*0.74, 94);

  uiTex.needsUpdate = true;
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w–r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h–r);
  ctx.quadraticCurveTo(x+w, y+h, x+w–r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h–r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

drawUI();

// ═══════════════════════════════════════════
//  游戏状态
// ═══════════════════════════════════════════
let gameRunning  = false;
let gameClock    = 0;
let shootCooldownR = 0;
let shootCooldownL = 0;
let triggerWasR   = false;
let triggerWasL   = false;
let muzzleTimerR  = 0;
let muzzleTimerL  = 0;
const moveVec    = new THREE.Vector2();

function startGame() {
  score       = 0;
  gameTime    = 60;
  gameClock   = 0;
  gameRunning = true;
  drawUI();
  document.getElementById('overlay').style.display  = 'none';
  document.getElementById('endScreen').style.display = 'none';
}

function endGame() {
  gameRunning = false;
  const es = document.getElementById('endScreen');
  es.style.display = 'flex';
  document.getElementById('finalScore').textContent = score + ' 分';
}

function resetBalloons() {
  balloons.forEach(b => scene.remove(b));
  balloons.length = 0;
  for (let i = 0; i < 18; i++) spawnBalloon();
}

// ═══════════════════════════════════════════
//  动画主循环
// ═══════════════════════════════════════════
const clock    = new THREE.Clock();
const _bwp     = new THREE.Vector3();
const _balwp   = new THREE.Vector3();
const _camDir  = new THREE.Vector3();
const _right   = new THREE.Vector3();
const UP       = new THREE.Vector3(0, 1, 0);

renderer.setAnimationLoop(() => {
  const delta = clock.getDelta();

  // ── PC WASD（非XR调试用）──────────────
  if (!renderer.xr.isPresenting) {
    camera.getWorldDirection(_camDir);
    _camDir.y = 0; _camDir.normalize();
    _right.crossVectors(_camDir, UP);
    const S = 4 * delta;
    if (pcKeys['KeyW']) xrOrigin.position.addScaledVector(_camDir,  S);
    if (pcKeys['KeyS']) xrOrigin.position.addScaledVector(_camDir, –S);
    if (pcKeys['KeyA']) xrOrigin.position.addScaledVector(_right,  –S);
    if (pcKeys['KeyD']) xrOrigin.position.addScaledVector(_right,   S);
  }

  // ── 读取 XR Gamepad ───────────────────
  const session = renderer.xr.getSession();
  if (session) {
    moveVec.set(0, 0);
    for (const src of session.inputSources) {
      if (!src.gamepad) continue;
      const gp = src.gamepad;

      if (src.handedness === 'right') {
        // 扳机（button 0）
        const trig = (gp.buttons[0]?.value ?? 0) > 0.55;
        if (trig && !triggerWasR && shootCooldownR <= 0 && gameRunning) {
          try {
            shootCooldownR = 8;
            const o = new THREE.Vector3(), d = new THREE.Vector3();
            ctrlR.getWorldPosition(o);
            ctrlR.getWorldDirection(d);
            d.negate();
            if (o.x === o.x && d.x === d.x) { // NaN guard
              fireBullet(o, d);
              muzzleFlashR.material.opacity = 1;
              muzzleTimerR = 5;
            }
          } catch(e) { console.error('right shoot error:', e); }
        }
        triggerWasR = trig;

        // 摇杆（axes 2/3）
        const ax = gp.axes[2] ?? 0, ay = gp.axes[3] ?? 0;
        if (Math.abs(ax) > 0.15) moveVec.x = ax;
        if (Math.abs(ay) > 0.15) moveVec.y = ay;

        // A 键 = buttons[4]（Pico4 / Quest）
        if (gp.buttons[4]?.pressed && gameRunning) { endGame(); exitVR(); }
      }

      if (src.handedness === 'left') {
        // 左手摇杆也可移动
        const ax = gp.axes[2] ?? 0, ay = gp.axes[3] ?? 0;
        if (Math.abs(ax) > 0.15) moveVec.x = ax;
        if (Math.abs(ay) > 0.15) moveVec.y = ay;

        // 左手扳机开枪
        const trigL = (gp.buttons[0]?.value ?? 0) > 0.55;
        if (trigL && !triggerWasL && shootCooldownL <= 0 && gameRunning) {
          try {
            shootCooldownL = 8;
            const o = new THREE.Vector3(), d = new THREE.Vector3();
            ctrlL.getWorldPosition(o);
            ctrlL.getWorldDirection(d);
            d.negate();
            if (o.x === o.x && d.x === d.x) { // NaN guard
              fireBullet(o, d);
              muzzleFlashL.material.opacity = 1;
              muzzleTimerL = 5;
            }
          } catch(e) { console.error('left shoot error:', e); }
        }
        triggerWasL = trigL;
      }
    }

    // XR 摇杆移动
    if (gameRunning && (moveVec.x !== 0 || moveVec.y !== 0)) {
      camera.getWorldDirection(_camDir);
      _camDir.y = 0; _camDir.normalize();
      _right.crossVectors(_camDir, UP);
      const S = 2.5 * delta;
      xrOrigin.position.addScaledVector(_camDir, –moveVec.y * S);
      xrOrigin.position.addScaledVector(_right,   moveVec.x * S);
      xrOrigin.position.x = THREE.MathUtils.clamp(xrOrigin.position.x, –24, 24);
      xrOrigin.position.z = THREE.MathUtils.clamp(xrOrigin.position.z, –24, 24);
    }
  }

  // 冷却计时
  if (shootCooldownR > 0) shootCooldownR--;
  if (shootCooldownL > 0) shootCooldownL--;
  if (muzzleTimerR > 0) {
    muzzleTimerR--;
    if (muzzleTimerR === 0) muzzleFlashR.material.opacity = 0;
  }
  if (muzzleTimerL > 0) {
    muzzleTimerL--;
    if (muzzleTimerL === 0) muzzleFlashL.material.opacity = 0;
  }

  // ── 激光瞄准变色（双手）─────────────
  try {
    let rAiming = false, lAiming = false;
    const _fp = new THREE.Vector3();
    for (const bal of balloons) {
      if (!bal.userData.alive) continue;
      bal.getWorldPosition(_balwp);
      ctrlR.getWorldPosition(_fp);
      const rDir = new THREE.Vector3(); ctrlR.getWorldDirection(rDir); rDir.negate();
      const toBal = _balwp.clone().sub(_fp).normalize();
      if (rDir.dot(toBal) > 0.97) { rAiming = true; break; }
    }
    ctrlL.getWorldPosition(_fp);
    const lDir = new THREE.Vector3(); ctrlL.getWorldDirection(lDir); lDir.negate();
    for (const bal of balloons) {
      if (!bal.userData.alive) continue;
      bal.getWorldPosition(_balwp);
      const toBal = _balwp.clone().sub(_fp).normalize();
      if (lDir.dot(toBal) > 0.97) { lAiming = true; break; }
    }
    aimLineR.material.color.setHex(rAiming ? 0x00ff44 : 0xff2020);
    aimLineL.material.color.setHex(lAiming ? 0x00ff44 : 0x2080ff);
  } catch(e) {}

  // ── 子弹更新 ─────────────────────────
  for (let i = bullets.length – 1; i >= 0; i--) {
    const b = bullets[i];
    b.position.add(b.userData.vel);
    b.userData.life--;
    let hit = false;

    if (gameRunning) {
      b.getWorldPosition(_bwp);
      for (let j = balloons.length – 1; j >= 0; j--) {
        const bal = balloons[j];
        if (!bal.userData.alive) continue;
        bal.getWorldPosition(_balwp);
        if (_bwp.distanceTo(_balwp) < 0.34) {
          bal.userData.alive = false;
          burst(_balwp.clone(), bal.userData.body.material.color.getHex());
          scene.remove(bal);
          balloons.splice(j, 1);
          score += 10;
          drawUI();
          hit = true;
          setTimeout(spawnBalloon, 1500);
          break;
        }
      }
    }

    if (hit || b.userData.life <= 0) {
      scene.remove(b);
      bullets.splice(i, 1);
    }
  }

  // ── 粒子更新 ─────────────────────────
  for (let i = particles.length – 1; i >= 0; i--) {
    const p = particles[i];
    p.position.add(p.userData.vel);
    p.userData.vel.y –= 0.006;
    p.userData.life--;
    p.material.opacity = p.userData.life / 35;
    if (p.userData.life <= 0) {
      scene.remove(p);
      particles.splice(i, 1);
    }
  }

  // ── 气球飘动 ─────────────────────────
  for (const bal of balloons) {
    const d = bal.userData;
    d.phase += 0.025;
    bal.position.y += d.velY * 0.55 + Math.sin(d.phase) * 0.0015;
    bal.position.x += d.velX;
    bal.position.z += d.velZ;
    bal.rotation.z  = Math.sin(d.phase * 0.8) * 0.05;
    if (bal.position.y > 8) {
      bal.position.y = 0.5;
      bal.position.x = (Math.random() – 0.5) * 18;
      bal.position.z = (Math.random() – 0.5) * 18 – 3;
    }
  }

  // ── 游戏计时 ─────────────────────────
  if (gameRunning) {
    gameClock += delta;
    if (gameClock >= 1) {
      gameClock = 0;
      gameTime  = Math.max(0, gameTime – 1);
      drawUI();
      if (gameTime <= 0) endGame();
    }
  }

  renderer.render(scene, camera);
});

// ═══════════════════════════════════════════
//  键盘输入（PC 调试）
// ═══════════════════════════════════════════
const pcKeys = {};
window.addEventListener('keydown', e => {
  pcKeys[e.code] = true;
  if (e.code === 'Escape' && gameRunning) endGame();
  if (e.code === 'Space' && gameRunning) {
    const o = new THREE.Vector3(), d = new THREE.Vector3();
    camera.getWorldPosition(o);
    camera.getWorldDirection(d);
    fireBullet(o, d);
    muzzleFlashR.material.opacity = 1;
    muzzleTimerR = 5;
  }
});
window.addEventListener('keyup', e => { delete pcKeys[e.code]; });

// PC 鼠标左键开枪（调试）
window.addEventListener('mousedown', e => {
  if (e.button === 0 && gameRunning && !renderer.xr.isPresenting) {
    const o = new THREE.Vector3(), d = new THREE.Vector3();
    camera.getWorldPosition(o);
    camera.getWorldDirection(d);
    fireBullet(o, d);
    muzzleFlashR.material.opacity = 1;
    muzzleTimerR = 5;
  }
});

// ═══════════════════════════════════════════
//  按钮交互
// ═══════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click', async () => {
  await enterVR();
  startGame();
});

document.getElementById('restartBtn').addEventListener('click', async () => {
  resetBalloons();
  startGame();
  if (!renderer.xr.isPresenting) {
    await enterVR();
  }
});

renderer.xr.addEventListener('sessionstart', () => {
  if (!gameRunning) startGame();
});

renderer.xr.addEventListener('sessionend', () => {
  gameRunning = false;
  document.getElementById('overlay').style.display = 'flex';
});

// ═══════════════════════════════════════════
//  Resize
// ═══════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════
//  启动时检测 WebXR 支持
// ═══════════════════════════════════════════
(async () => {
  const statusEl = document.getElementById('xrStatus');
  const btnEl    = document.getElementById('startBtn');

  if (!navigator.xr) {
    statusEl.style.color = '#ff6b6b';
    statusEl.textContent = '⚠️ 不支持 WebXR — 请在 Pico4 浏览器中打开';
    btnEl.disabled = false;
    btnEl.style.opacity = '1';
    btnEl.textContent = '普通模式（PC调试）';
    return;
  }

  const supported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (supported) {
    statusEl.style.color = '#69f0ae';
    statusEl.textContent = '✅ 设备支持 VR，点击按钮进入！';
    btnEl.disabled = false;
    btnEl.style.opacity = '1';
  } else {
    statusEl.style.color = '#ffb74d';
    statusEl.textContent = '⚠️ immersive-vr 不可用（请确认已戴上头显）';
    btnEl.disabled = false;
    btnEl.style.opacity = '0.75';
    btnEl.textContent = '尝试进入 VR';
  }
})();



</script>
</body>
</html>
