<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR 射击气球 - 自动步枪+抓取黑块</title>
    <style>
        :root { --bg: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        canvas { display: block; }
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: flex-start;
            align-items: center; padding-top: 24px;
        }
        #score-panel {
            background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.25); border-radius: 24px;
            padding: 14px 32px; color: #fff; text-align: center;
            pointer-events: auto; transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #score-panel .label { font-size: 13px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.8; font-weight: 500; }
        #score-panel .score {
            font-size: 52px; font-weight: 700; line-height: 1;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; filter: drop-shadow(0 2px 8px rgba(255,170,0,0.5));
        }
        #score-panel .combo { font-size: 14px; color: #ffdd57; opacity: 0; transition: opacity 0.2s; min-height: 20px; }
        #score-panel .combo.active { opacity: 1; animation: pulse 0.4s ease-out; }
        @keyframes pulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.3); } }
        #vr-entry { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20; pointer-events: auto; }
        #enter-vr-btn {
            display: block; padding: 16px 44px; font-size: 20px; font-weight: 700;
            letter-spacing: 2px; color: #fff;
            background: linear-gradient(135deg, #e94560, #c23152);
            border: none; border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 8px 30px rgba(233,69,96,0.5);
            text-transform: uppercase; outline: none; -webkit-tap-highlight-color: transparent;
        }
        #enter-vr-btn:hover { background: linear-gradient(135deg, #ff5a7a, #e94560); box-shadow: 0 12px 40px rgba(233,69,96,0.7); transform: translateY(-3px); }
        #enter-vr-btn:active { transform: scale(0.96); transition: transform 0.1s; }
        #enter-vr-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
        #vr-hints {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            z-index: 15; pointer-events: none; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
        }
        .hint-badge {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px; padding: 8px 18px; color: #fff; font-size: 13px;
            letter-spacing: 1px; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); white-space: nowrap;
        }
        .hint-badge .key { font-weight: 700; color: #ffd700; }
        #status-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 30; color: #fff; font-size: 18px; text-align: center;
            pointer-events: none; background: rgba(0,0,0,0.75); padding: 20px 30px;
            border-radius: 16px; display: none;
        }
        #status-msg.error { background: rgba(180,30,30,0.85); display: block; }
        #status-msg.info { background: rgba(30,30,50,0.85); display: block; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="score-panel">
            <div class="label">🏆 得分</div>
            <div class="score" id="score-value">0</div>
            <div class="combo" id="combo-text"></div>
        </div>
    </div>
    <div id="vr-entry"><button id="enter-vr-btn">🎯 进入VR游戏</button></div>
    <div id="vr-hints">
        <span class="hint-badge">🔫 <span class="key">右手扳机</span> 自动步枪</span>
        <span class="hint-badge">🕹️ <span class="key">摇杆</span> 移动</span>
        <span class="hint-badge">✊ <span class="key">侧键</span> 抓取黑块</span>
        <span class="hint-badge">🅰️ <span class="key">A键</span> 退出</span>
    </div>
    <div id="status-msg"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // DOM 元素
        const scoreValueEl = document.getElementById('score-value');
        const comboTextEl = document.getElementById('combo-text');
        const enterVRBtn = document.getElementById('enter-vr-btn');
        const statusMsgEl = document.getElementById('status-msg');
        const vrHintsEl = document.getElementById('vr-hints');
        const vrEntryEl = document.getElementById('vr-entry');

        // 游戏状态
        let score = 0, comboCount = 0, comboTimer;
        const COMBO_TIMEOUT = 1500, BALLOON_POINTS = 10, GOLDEN_POINTS = 30;
        const MAX_BALLOONS = 20, SPAWN_INTERVAL = 1800;
        const SPAWN_RADIUS_MIN = 4, SPAWN_RADIUS_MAX = 14;
        const SPAWN_HEIGHT_MIN = 1.2, SPAWN_HEIGHT_MAX = 4.5;
        const MOVE_SPEED = 3.5, RAY_MAX_DISTANCE = 20, GOLDEN_CHANCE = 0.12;
        const RIFLE_COOLDOWN = 120; // 右手自动步枪射击间隔（ms）
        const DEADZONE = 0.2;       // 摇杆死区

        // 摇杆输入状态（从 session.inputSources 轮询填充）
        const rightInput = { stickX: 0, stickY: 0, trigger: false };
        const leftInput  = { stickX: 0, stickY: 0, trigger: false };
        // 侧键抓取状态
        let rightGripPressed = false;
        let leftGripPressed = false;

        // Three.js 初始化
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // 开启阴影让黑块更真实
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0xb8dff5, 30, 80);

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 0);
        const dolly = new THREE.Group();
        dolly.add(camera);
        scene.add(dolly);

        // 光照
        scene.add(new THREE.AmbientLight(0xffeedd, 1.4));
        const sunLight = new THREE.DirectionalLight(0xffffff, 3.5);
        sunLight.position.set(20, 30, 10);
        sunLight.castShadow = true;
        sunLight.receiveShadow = false;
        scene.add(sunLight);
        scene.add(new THREE.HemisphereLight(0x87ceeb, 0x5a8a3c, 0.9));

        // 地面
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80),
            new THREE.MeshStandardMaterial({ color: 0x5a9e3f, roughness: 0.85 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);
        const gridHelper = new THREE.PolarGridHelper(35, 40, 28, 128, 0x4a8a30, 0x4a8a30);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // 环境树
        function createTree(x, z, h = 2.5) {
            const t = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.18, h * 0.5, 8), new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7 }));
            trunk.position.y = h * 0.25; t.add(trunk);
            const crown = new THREE.Mesh(new THREE.SphereGeometry(h * 0.35, 12, 10), new THREE.MeshStandardMaterial({ color: 0x3d7a28, roughness: 0.6 }));
            crown.position.y = h * 0.6; t.add(crown);
            const crown2 = new THREE.Mesh(new THREE.SphereGeometry(h * 0.28, 10, 8), new THREE.MeshStandardMaterial({ color: 0x3d7a28, roughness: 0.6 }));
            crown2.position.y = h * 0.78; crown2.position.x = h * 0.1; t.add(crown2);
            t.position.set(x, 0, z); t.scale.setScalar(0.7 + Math.random() * 0.6);
            return t;
        }
        for (let i = 0; i < 35; i++) {
            const angle = Math.random() * Math.PI * 2, radius = 8 + Math.random() * 28;
            const tx = Math.cos(angle) * radius, tz = Math.sin(angle) * radius;
            if (Math.abs(tx) < 3 && Math.abs(tz) < 3) continue;
            scene.add(createTree(tx, tz, 1.8 + Math.random() * 3.5));
        }

        // 彩色柱子
        const pillarColors = [0xe8d5b7, 0xd4a574, 0xc9b99a, 0xb8a88a, 0xe0c9a6];
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.3, radius = 10 + Math.random() * 16;
            const px = Math.cos(angle) * radius, pz = Math.sin(angle) * radius;
            const pillar = new THREE.Group();
            pillar.add(new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3.5, 12), new THREE.MeshStandardMaterial({ color: pillarColors[i % pillarColors.length], roughness: 0.4, metalness: 0.2 })).translateY(1.75));
            pillar.add(new THREE.Mesh(new THREE.SphereGeometry(0.4, 12, 8), new THREE.MeshStandardMaterial({ color: pillarColors[i % pillarColors.length], roughness: 0.4, metalness: 0.2 })).translateY(3.7));
            pillar.position.set(px, 0, pz);
            scene.add(pillar);
        }

        // ================= 新增：黑色方块系统 =================
        const blackCubes = [];           // 存储所有黑块Mesh
        const CUBE_SIZE = 0.2;           // 0.2m立方体
        const CUBE_GRAVITY = 12.0;
        const GROUND_Y = 0.1;             // 方块中心最低y = 半高0.1
        let grabbedCube = null;           // 当前被抓取的黑块
        let grabbingController = null;    // 抓住它的手柄 (left/right controller object)
        let grabOffset = new THREE.Vector3(); // 抓取时相对于手柄的偏移(世界空间)
        
        // 为每个方块存储物理数据
        class CubePhysics {
            constructor(mesh) {
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.isStatic = false;      // 抓取时物理暂停
            }
        }
        const cubePhysicsMap = new WeakMap();

        // 生成黑色方块，随机位置避免与树木/柱子重叠太严重(简单的距离检查)
        function isPositionValidForCube(x, z) {
            for (let i = 0; i < 40; i++) { // 粗略避免生成在树墩区域
                const angle = Math.random() * Math.PI * 2;
                const r = 1.2;
                const tx = x + Math.cos(angle) * r;
                const tz = z + Math.sin(angle) * r;
                // 只要不正好在树坐标周围太近
            }
            return true;
        }
        function spawnBlackCube(x, z) {
            const geometry = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);
            const material = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.1 });
            const cube = new THREE.Mesh(geometry, material);
            cube.castShadow = true;
            cube.receiveShadow = true;
            const yPos = GROUND_Y;
            cube.position.set(x, yPos, z);
            scene.add(cube);
            blackCubes.push(cube);
            const physics = new CubePhysics(cube);
            cubePhysicsMap.set(cube, physics);
            return cube;
        }

        // 随机生成8~12个黑块在地面半径范围内
        function initBlackCubes(count = 10) {
            const existingPos = new Set();
            for (let i = 0; i < count; i++) {
                let attempts = 0;
                let placed = false;
                while (!placed && attempts < 30) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 7 + Math.random() * 22;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    // 避免与起始点过近, 同时避免重叠
                    let overlap = false;
                    for (let cb of blackCubes) {
                        if (cb && Math.hypot(cb.position.x - x, cb.position.z - z) < 0.5) { overlap = true; break; }
                    }
                    if (!overlap && Math.abs(x) < 28 && Math.abs(z) < 28) {
                        spawnBlackCube(x, z);
                        placed = true;
                    }
                    attempts++;
                }
                if (!placed) spawnBlackCube((Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30);
            }
        }

        // 更新所有黑块物理 (被抓取的除外)
        function updateBlackCubesPhysics(dt) {
            for (let cube of blackCubes) {
                if (grabbedCube === cube) continue; // 被抓取不应用物理
                const phys = cubePhysicsMap.get(cube);
                if (!phys) continue;
                // 应用重力
                phys.velocity.y -= CUBE_GRAVITY * dt;
                cube.position.x += phys.velocity.x * dt;
                cube.position.y += phys.velocity.y * dt;
                cube.position.z += phys.velocity.z * dt;
                
                // 地面碰撞 (y半高0.1)
                const half = CUBE_SIZE * 0.5;
                if (cube.position.y - half <= 0) {
                    cube.position.y = half;
                    if (phys.velocity.y < 0) phys.velocity.y = -phys.velocity.y * 0.3;
                    else phys.velocity.y = 0;
                    // 地面摩擦力
                    phys.velocity.x *= 0.98;
                    phys.velocity.z *= 0.98;
                    if (Math.abs(phys.velocity.x) < 0.05 && Math.abs(phys.velocity.z) < 0.05 && Math.abs(phys.velocity.y) < 0.2) {
                        phys.velocity.set(0, 0, 0);
                    }
                }
                // 边界限制 (防止飘出世界)
                const limit = 34;
                if (cube.position.x > limit) { cube.position.x = limit; phys.velocity.x *= -0.5; }
                if (cube.position.x < -limit) { cube.position.x = -limit; phys.velocity.x *= -0.5; }
                if (cube.position.z > limit) { cube.position.z = limit; phys.velocity.z *= -0.5; }
                if (cube.position.z < -limit) { cube.position.z = -limit; phys.velocity.z *= -0.5; }
                // 防止飞出天空
                if (cube.position.y > 8) { cube.position.y = 8; phys.velocity.y *= -0.5; }
            }
        }

        // 释放黑块 (物理飞出去)
        function releaseCube(controllerVelocity = null) {
            if (!grabbedCube) return;
            const phys = cubePhysicsMap.get(grabbedCube);
            if (phys) {
                // 释放时赋予一点初速度: 基于手柄瞬间速度(如果无法获取则小抛射)
                if (controllerVelocity) {
                    phys.velocity.copy(controllerVelocity);
                    phys.velocity.y += 2.5;
                } else {
                    phys.velocity.set(0, 3, 0);
                }
                phys.isStatic = false;
            }
            grabbedCube = null;
            grabbingController = null;
        }

        // 尝试抓取: 检测给定手柄是否靠近某个未抓取的黑块
        function tryGrab(controller, worldPos, gripPressed) {
            if (!gripPressed) return false;
            if (grabbedCube) return false; // 已经抓了一个
            let closest = null;
            let minDist = 0.45; // 抓取半径
            for (let cube of blackCubes) {
                if (grabbedCube === cube) continue;
                const dist = worldPos.distanceTo(cube.position);
                if (dist < minDist) {
                    minDist = dist;
                    closest = cube;
                }
            }
            if (closest) {
                grabbedCube = closest;
                grabbingController = controller;
                // 记录抓取时的偏移(世界空间偏移) : 方块位置 - 手柄世界位置
                grabOffset.copy(closest.position).sub(worldPos);
                // 停止物理运动
                const phys = cubePhysicsMap.get(closest);
                if (phys) {
                    phys.velocity.set(0,0,0);
                    phys.isStatic = true;
                }
                return true;
            }
            return false;
        }

        // 每帧更新抓取跟随
        function updateGrabbedCube(controllerWorldPos) {
            if (!grabbedCube || !grabbingController) return;
            // 将方块移动到 当前手柄世界位置 + 偏移量
            grabbedCube.position.copy(controllerWorldPos.clone().add(grabOffset));
            // 限制不要陷入地底
            const half = CUBE_SIZE * 0.5;
            if (grabbedCube.position.y - half < 0) grabbedCube.position.y = half;
        }

        // 获取手柄的世界位置 (使用控制器的matrixWorld获取位置)
        function getControllerWorldPosition(controller) {
            const pos = new THREE.Vector3();
            if (controller && controller.matrixWorld) {
                pos.setFromMatrixPosition(controller.matrixWorld);
            } else {
                pos.set(0, 0, 0);
            }
            return pos;
        }

        // 重置超出边界的黑块 (掉进虚空重置位置)
        function resetOutOfBoundsCubes() {
            const limit = 38;
            for (let cube of blackCubes) {
                if (Math.abs(cube.position.x) > limit || Math.abs(cube.position.z) > limit || cube.position.y < -2) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 12 + Math.random() * 12;
                    cube.position.x = Math.cos(angle) * radius;
                    cube.position.z = Math.sin(angle) * radius;
                    cube.position.y = GROUND_Y;
                    const phys = cubePhysicsMap.get(cube);
                    if (phys) phys.velocity.set(0,0,0);
                }
            }
        }

        // 气球系统 (保持原有)
        const balloons = [], balloonGroup = new THREE.Group(); scene.add(balloonGroup);
        const balloonColors = [0xff3b3b, 0xff6b35, 0xffc635, 0x4caf50, 0x2196f3, 0x9c27b0, 0xe91e63, 0x00bcd4, 0xff9800, 0x8bc34a];
        const goldenColor = 0xffd700;

        function createBalloonMesh(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.35, 24, 20), new THREE.MeshStandardMaterial({ color, roughness: 0.25, metalness: 0.05, emissive: color, emissiveIntensity: 0.15 }));
            body.name = 'balloonBody'; g.add(body);
            g.add(new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.14, 8, 8), new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.6), roughness: 0.5 })).translateY(-0.38));
            g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.025, 0.22, 6), new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.6 })).translateY(-0.5));
            const hl = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 6), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
            hl.position.set(0.15, 0.18, 0.15); g.add(hl);
            g.userData = { bodyMesh: body, bodyMaterial: body.material };
            return g;
        }
        function spawnBalloon(forceGolden = false) {
            if (balloons.length >= MAX_BALLOONS) removeOldestBalloon();
            const isGolden = forceGolden || Math.random() < GOLDEN_CHANCE;
            const color = isGolden ? goldenColor : balloonColors[Math.floor(Math.random() * balloonColors.length)];
            const b = createBalloonMesh(color);
            b.userData.isGolden = isGolden; b.userData.color = color;
            b.userData.baseY = SPAWN_HEIGHT_MIN + Math.random() * (SPAWN_HEIGHT_MAX - SPAWN_HEIGHT_MIN);
            b.userData.floatSpeed = 0.5 + Math.random() * 1.8;
            b.userData.floatAmp = 0.15 + Math.random() * 0.6;
            b.userData.floatPhase = Math.random() * Math.PI * 2;
            b.userData.driftX = (Math.random() - 0.5) * 0.4;
            b.userData.driftZ = (Math.random() - 0.5) * 0.4;
            b.userData.points = isGolden ? GOLDEN_POINTS : BALLOON_POINTS;

            const pos = dolly.position;
            const angle = Math.random() * Math.PI * 2;
            const r = SPAWN_RADIUS_MIN + Math.random() * (SPAWN_RADIUS_MAX - SPAWN_RADIUS_MIN);
            b.position.set(pos.x + Math.cos(angle) * r, b.userData.baseY, pos.z + Math.sin(angle) * r);
            b.userData.spawnPos = b.position.clone();
            if (isGolden) { b.userData.bodyMaterial.emissiveIntensity = 0.5; b.scale.setScalar(0.85); }
            balloonGroup.add(b); balloons.push(b);
            return b;
        }
        function removeOldestBalloon() {
            if (!balloons.length) return;
            const old = balloons.shift();
            const start = performance.now(), duration = 800, startPos = old.position.clone();
            const rise = 3 + Math.random() * 4, dx = (Math.random() - 0.5) * 2, dz = (Math.random() - 0.5) * 2;
            function anim(t) {
                const e = Math.min((t - start) / duration, 1);
                old.position.set(startPos.x + dx * e * e, startPos.y + rise * e * e, startPos.z + dz * e * e);
                old.scale.setScalar(1 - e * 0.7);
                if (old.userData.bodyMaterial) old.userData.bodyMaterial.opacity = 1 - e;
                if (e < 1) requestAnimationFrame(anim); else disposeBalloon(old);
            }
            requestAnimationFrame(anim);
        }
        function disposeBalloon(b) { balloonGroup.remove(b); b.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) Array.isArray(c.material) ? c.material.forEach(m=>m.dispose()) : c.material.dispose(); }); }

        // 碎片系统
        const debris = [], debrisGroup = new THREE.Group(); scene.add(debrisGroup);
        function createDebris(position, color, isGolden = false) {
            const count = isGolden ? 18 : 10;
            const baseColor = new THREE.Color(color);
            for (let i = 0; i < count; i++) {
                const size = 0.02 + Math.random() * 0.06;
                const geom = new THREE.BoxGeometry(size, size, size);
                const mat = new THREE.MeshStandardMaterial({ color: baseColor.clone().multiplyScalar(0.7 + Math.random() * 0.5), roughness: 0.8, transparent: true });
                const piece = new THREE.Mesh(geom, mat);
                piece.position.copy(position);
                const dir = new THREE.Vector3((Math.random() - 0.5) * 2, Math.random() * 1.5 + 0.5, (Math.random() - 0.5) * 2).normalize();
                const speed = 1.5 + Math.random() * 4;
                piece.userData = { velocity: dir.multiplyScalar(speed), life: 5, grounded: false, material: mat };
                debrisGroup.add(piece); debris.push(piece);
            }
        }
        function updateDebris(dt) {
            for (let i = debris.length - 1; i >= 0; i--) {
                const d = debris[i], ud = d.userData;
                if (!ud.grounded) {
                    d.position.x += ud.velocity.x * dt; d.position.y += ud.velocity.y * dt; d.position.z += ud.velocity.z * dt;
                    ud.velocity.y -= 9.8 * dt;
                    if (d.position.y <= 0.01) { d.position.y = 0.01; ud.grounded = true; ud.velocity.set(0,0,0); }
                } else {
                    ud.life -= dt;
                    if (ud.life <= 0) {
                        ud.material.dispose(); d.geometry.dispose(); debrisGroup.remove(d); debris.splice(i,1);
                    } else if (ud.life < 0.8) ud.material.opacity = ud.life / 0.8;
                }
            }
        }

        // 音频等简化
        let audioCtx;
        function initAudio() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} } }
        function playPopSound(isGolden) { if(!audioCtx)return; try { const now=audioCtx.currentTime, dur=0.15; const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*dur),audioCtx.sampleRate); const data=buf.getChannelData(0); for(let i=0;i<buf.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/audioCtx.sampleRate*25); const src=audioCtx.createBufferSource(); src.buffer=buf; const gain=audioCtx.createGain(); gain.gain.setValueAtTime(0.5,now); gain.gain.exponentialRampToValueAtTime(0.001,now+dur); src.connect(gain); gain.connect(audioCtx.destination); src.start(now); } catch(e){} }
        function playShootSound() { if(!audioCtx)return; try{ const now=audioCtx.currentTime, dur=0.06; const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*dur),audioCtx.sampleRate); const data=buf.getChannelData(0); for(let i=0;i<buf.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/audioCtx.sampleRate*60); const src=audioCtx.createBufferSource(); src.buffer=buf; const gain=audioCtx.createGain(); gain.gain.setValueAtTime(0.25,now); gain.gain.exponentialRampToValueAtTime(0.001,now+dur); src.connect(gain); gain.connect(audioCtx.destination); src.start(now); }catch(e){} }

        function addScore(pts, isGolden) {
            score += pts; scoreValueEl.textContent = score;
            scoreValueEl.style.transform = 'scale(1.25)'; setTimeout(() => scoreValueEl.style.transform = 'scale(1)', 150);
            comboCount++; if (comboTimer) clearTimeout(comboTimer);
            comboTimer = setTimeout(() => { comboCount = 0; comboTextEl.textContent = ''; comboTextEl.classList.remove('active'); }, COMBO_TIMEOUT);
            if (comboCount >= 3) { comboTextEl.textContent = `🔥 ${comboCount}连击!`; comboTextEl.classList.add('active'); setTimeout(() => comboTextEl.classList.remove('active'), 500); }
            else if (isGolden) { comboTextEl.textContent = '⭐ 金色气球!'; comboTextEl.classList.add('active'); setTimeout(() => comboTextEl.classList.remove('active'), 500); }
        }

        // 控制器及子弹 (原有代码保留)
        const controllers = []; let leftController, rightController;
        const bullets = [], bulletGroup = new THREE.Group(); scene.add(bulletGroup);
        function spawnBullet(origin, direction, isRightHand) {
            const speed = 15;
            const geom = isRightHand ? new THREE.BoxGeometry(0.04,0.04,0.04) : new THREE.SphereGeometry(0.025,8,6);
            const mat = new THREE.MeshStandardMaterial({ color: isRightHand ? 0xffaa00 : 0x44aaff, emissive: isRightHand ? 0xff4400 : 0x0044ff });
            const bullet = new THREE.Mesh(geom, mat);
            bullet.position.copy(origin);
            bullet.userData = { velocity: direction.clone().normalize().multiplyScalar(speed), life: 1.5 };
            bulletGroup.add(bullet); bullets.push(bullet);
        }
        function shoot(controller) {
            const isRight = (controller === rightController);
            const origin = new THREE.Vector3(0,0.015,-0.12).applyMatrix4(controller.matrixWorld);
            const quat = controller.getWorldQuaternion(new THREE.Quaternion());
            const direction = new THREE.Vector3(0,0,-1).applyQuaternion(quat);
            spawnBullet(origin, direction, isRight);
            playShootSound();
        }
        function updateBullets(dt) {
            for (let i = bullets.length-1; i>=0; i--) {
                const b = bullets[i], ud = b.userData;
                ud.life -= dt;
                b.position.x += ud.velocity.x * dt; b.position.y += ud.velocity.y * dt; b.position.z += ud.velocity.z * dt;
                let hit = false;
                for (let j = balloons.length-1; j>=0; j--) {
                    if (b.position.distanceTo(balloons[j].position) < 0.42) {
                        const bal = balloons[j];
                        createDebris(bal.position.clone(), bal.userData.color, bal.userData.isGolden);
                        addScore(bal.userData.points, bal.userData.isGolden);
                        disposeBalloon(bal); balloons.splice(j,1);
                        playPopSound(bal.userData.isGolden);
                        hit = true; break;
                    }
                }
                if (hit || ud.life<=0 || Math.abs(b.position.y)>50) {
                    b.geometry.dispose(); if(b.material) b.material.dispose();
                    bulletGroup.remove(b); bullets.splice(i,1);
                }
            }
        }

        // 控制器的简单搭建 (略去部分重复长代码，保留核心)
        const tempV3 = new THREE.Vector3();
        function setupController(idx) { /* 与原类似简化，但保留基本功能以保证手柄显示 */ 
            const controller = renderer.xr.getController(idx);
            const grip = renderer.xr.getControllerGrip(idx);
            dolly.add(controller); dolly.add(grip);
            controllers.push(controller);
            if(idx===0) leftController=controller;
            else rightController=controller;
        }

        // 获取手柄世界位置并尝试抓取更新
        let lastRightPos = new THREE.Vector3(), lastLeftPos = new THREE.Vector3();
        function updateGrabAndPhysics(dt) {
            if (!renderer.xr.isPresenting) return;
            const rightWorldPos = getControllerWorldPosition(rightController);
            const leftWorldPos = getControllerWorldPosition(leftController);
            // 尝试抓取 (仅在侧键按下且当前没有抓取)
            if (!grabbedCube) {
                if (rightGripPressed) tryGrab(rightController, rightWorldPos, true);
                else if (leftGripPressed) tryGrab(leftController, leftWorldPos, true);
            } else {
                // 已抓住, 检查对应手柄的侧键是否松开
                const grabberIsRight = (grabbingController === rightController);
                const gripStill = grabberIsRight ? rightGripPressed : leftGripPressed;
                if (!gripStill) {
                    // 释放: 加入速度估计
                    let relVel = new THREE.Vector3(0, 2, 0);
                    releaseCube(relVel);
                } else {
                    // 更新跟随位置
                    const curWorldPos = grabberIsRight ? rightWorldPos : leftWorldPos;
                    updateGrabbedCube(curWorldPos);
                }
            }
            // 物理更新
            updateBlackCubesPhysics(dt);
            resetOutOfBoundsCubes();
        }

        // 输入轮询 (扩展侧键)
        function updateInput() {
            const session = renderer.xr.getSession();
            if (!session) return;
            rightInput.stickX = 0; rightInput.stickY = 0; rightInput.trigger = false;
            leftInput.stickX = 0; leftInput.stickY = 0;
            rightGripPressed = false; leftGripPressed = false;
            for (const source of session.inputSources) {
                if (!source.gamepad) continue;
                const gp = source.gamepad; const hand = source.handedness;
                if (gp.axes.length >= 4) {
                    const sx = gp.axes[2]||0, sy = gp.axes[3]||0;
                    if (hand === 'right') { rightInput.stickX = sx; rightInput.stickY = sy; rightInput.trigger = (gp.buttons[0]?.value??0)>0.5; rightGripPressed = gp.buttons[2]?.pressed||false; }
                    else if (hand === 'left') { leftInput.stickX = sx; leftInput.stickY = sy; leftInput.trigger = (gp.buttons[0]?.value??0)>0.5; leftGripPressed = gp.buttons[2]?.pressed||false; }
                }
            }
        }

        function handleMove(dt) {
            let sx = rightInput.stickX, sy = rightInput.stickY;
            if (Math.abs(sx) < DEADZONE && Math.abs(sy) < DEADZONE) { sx = leftInput.stickX; sy = leftInput.stickY; }
            if (Math.abs(sx) < DEADZONE && Math.abs(sy) < DEADZONE) return;
            const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); forward.y=0; forward.normalize();
            const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); right.y=0; right.normalize();
            const moveDir = new THREE.Vector3().addScaledVector(forward, -sy).addScaledVector(right, sx).normalize();
            const speed = MOVE_SPEED * Math.max(Math.abs(sx), Math.abs(sy));
            dolly.position.addScaledVector(moveDir, speed * dt);
            dolly.position.x = THREE.MathUtils.clamp(dolly.position.x, -30, 30);
            dolly.position.z = THREE.MathUtils.clamp(dolly.position.z, -30, 30);
        }

        let rifleTimer = 0, pistolCooldown = 0;
        function handleAutoFire(dt) { if(rightController && rightInput.trigger) { rifleTimer+=dt; while(rifleTimer>=0.12) { shoot(rightController); rifleTimer-=0.12; } } else rifleTimer=0; }
        function handleLeftFire(dt) { if(leftController && leftInput.trigger && pistolCooldown<=0) { shoot(leftController); pistolCooldown=0.25; } if(pistolCooldown>0) pistolCooldown-=dt; }

        let lastSpawn = 0;
        function spawnLoop(now) { if(now-lastSpawn>SPAWN_INTERVAL && balloons.length<MAX_BALLOONS) { lastSpawn=now; spawnBalloon(); } }
        function animBalloons(now) { balloons.forEach(b=>{ const t=now*0.001; b.position.y=b.userData.baseY+Math.sin(t*b.userData.floatSpeed+b.userData.floatPhase)*b.userData.floatAmp; b.rotation.y+=0.003; }); }

        const clock = new THREE.Clock();
        function animate(ts) {
            const dt = Math.min(clock.getDelta(), 0.1);
            if (renderer.xr.isPresenting) {
                updateInput();
                handleMove(dt);
                handleAutoFire(dt);
                handleLeftFire(dt);
                spawnLoop(ts);
                animBalloons(ts);
                updateDebris(dt);
                updateBullets(dt);
                updateGrabAndPhysics(dt);
                vrEntryEl.style.display = 'none'; vrHintsEl.style.display = 'none';
            } else {
                updateDebris(dt); animBalloons(ts);
                vrEntryEl.style.display = 'block'; vrHintsEl.style.display = 'flex';
            }
            renderer.render(scene, camera);
        }
        renderer.setAnimationLoop(animate);

        function init() {
            setupController(0); setupController(1);
            initBlackCubes(10);
            for(let i=0;i<8;i++) setTimeout(()=>spawnBalloon(), i*250);
            lastSpawn = performance.now();
            enterVRBtn.onclick = async () => {
                enterVRBtn.disabled=true;
                try { const sess = await navigator.xr.requestSession('immersive-vr', { requiredFeatures: ['local-floor'] }); renderer.xr.setSession(sess); initAudio(); }
                catch(e) { showStatus('❌ '+e.message, 'error'); enterVRBtn.disabled=false; }
            };
            renderer.xr.addEventListener('sessionend', () => { enterVRBtn.disabled=false; vrEntryEl.style.display='block'; vrHintsEl.style.display='flex'; });
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }
        function showStatus(m,t) { statusMsgEl.innerHTML=m; statusMsgEl.className=t; if(m==='') statusMsgEl.style.display='none'; }
        init();
    </script>
</body>
</html>
