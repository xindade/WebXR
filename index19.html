<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>☁️🎈 云上气球大作战</title>
    <style>
        :root { --bg: #0a1628; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        canvas { display: block; }

        /* ── HUD 得分面板 ── */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: flex-start;
            align-items: center; padding-top: 24px;
        }
        #score-panel {
            background: linear-gradient(135deg, rgba(100,180,255,0.25), rgba(200,230,255,0.2));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 3px solid rgba(255,255,255,0.4); border-radius: 28px;
            padding: 16px 40px; color: #fff; text-align: center;
            pointer-events: auto; transition: all 0.3s ease;
            box-shadow:
                0 0 30px rgba(100,180,255,0.3),
                0 8px 32px rgba(0,0,0,0.4),
                inset 0 0 20px rgba(255,255,255,0.08);
        }
        #score-panel .label {
            font-size: 14px; text-transform: uppercase; letter-spacing: 5px;
            opacity: 0.9; font-weight: 600;
            background: linear-gradient(90deg, #64b5f6, #fff, #64b5f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #score-panel .score {
            font-size: 60px; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, #fff, #90caf9, #42a5f5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(100,180,255,0.7));
            animation: scoreGlow 2s ease-in-out infinite alternate;
        }
        @keyframes scoreGlow { from{filter:drop-shadow(0 0 10px rgba(100,180,255,0.5));} to{filter:drop-shadow(0 0 25px rgba(150,210,255,0.9));} }
        #score-panel .combo {
            font-size: 18px; color: #ffdd57; opacity: 0; transition: opacity 0.2s;
            min-height: 26px; font-weight: 700; letter-spacing: 2px;
        }
        #score-panel .combo.active { opacity: 1; animation: comboBounce 0.5s cubic-bezier(0.68,-0.55,0.265,1.55); }
        @keyframes comboBounce { 0%,100%{ transform: scale(1) translateY(0); } 50%{ transform: scale(1.4) translateY(-5px); } }

        /* ── 关卡信息面板 ── */
        #level-panel {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            z-index: 10; pointer-events: none;
            background: linear-gradient(135deg, rgba(60,60,80,0.7), rgba(30,30,50,0.8));
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 20px;
            padding: 12px 28px; color: #fff; font-size: 16px; font-weight: 600;
            letter-spacing: 2px; display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #level-panel.visible { display: block; animation: levelPulse 2s ease-in-out infinite; }
        @keyframes levelPulse { 0%,100%{border-color:rgba(255,255,255,0.3);} 50%{border-color:rgba(100,200,255,0.7);} }

        /* ── 提示文字（X键）── */
        #x-key-hint {
            position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
            z-index: 20; pointer-events: auto;
            background: linear-gradient(135deg, rgba(255,152,0,0.85), rgba(255,87,34,0.85));
            border: 2px solid rgba(255,255,255,0.5); border-radius: 18px;
            padding: 14px 36px; color: #fff; font-size: 18px; font-weight: 800;
            letter-spacing: 2px; cursor: default;
            box-shadow: 0 0 30px rgba(255,152,0,0.5), 0 4px 15px rgba(0,0,0,0.3);
            animation: hintBounce 1.5s ease-in-out infinite;
            display: none;
        }
        @keyframes hintBounce { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.05);} }
        #x-key-hint.storm-mode {
            background: linear-gradient(135deg, rgba(63,81,181,0.9), rgba(21,101,192,0.9));
            box-shadow: 0 0 30px rgba(63,81,181,0.6), 0 4px 15px rgba(0,0,0,0.3);
        }

        /* ── VR入口按钮 ── */
        #vr-entry {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 20; pointer-events: auto;
        }
        #enter-vr-btn {
            display: block; padding: 18px 56px; font-size: 22px; font-weight: 800;
            letter-spacing: 3px; color: #fff;
            background: linear-gradient(135deg, #42a5f5, #1e88e5, #90caf9);
            background-size: 200% 200%;
            animation: btnShimmer 3s ease infinite;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(66,165,245,0.6), inset 0 0 20px rgba(255,255,255,0.15);
            text-transform: uppercase; outline: none; min-height: 52px;
        }
        @keyframes btnShimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        #enter-vr-btn:hover {
            box-shadow: 0 0 60px rgba(66,165,245,0.9), inset 0 0 30px rgba(255,255,255,0.25);
            transform: translateY(-4px) scale(1.05);
        }
        #enter-vr-btn:active { transform: scale(0.95); }
        #enter-vr-btn:disabled { background: #444; box-shadow: none; cursor: not-allowed; opacity: 0.5; animation: none; }

        /* ── 操作提示 ── */
        #vr-hints {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            z-index: 15; pointer-events: none; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
        }
        .hint-badge {
            background: linear-gradient(135deg, rgba(100,180,255,0.2), rgba(200,230,255,0.15));
            border: 2px solid rgba(255,255,255,0.35); border-radius: 24px;
            padding: 10px 22px; color: #fff; font-size: 14px; font-weight: 600;
            letter-spacing: 1px; backdrop-filter: blur(8px); white-space: nowrap;
            box-shadow: 0 0 15px rgba(100,180,255,0.2);
        }
        .hint-badge .key { font-weight: 800; color: #90caf9; text-shadow: 0 0 8px rgba(144,202,249,0.6); }

        /* ── 状态消息 ── */
        #status-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 30; color: #fff; font-size: 20px; font-weight: 700; text-align: center;
            pointer-events: none; background: rgba(0,0,0,0.88); padding: 28px 40px;
            border-radius: 20px; border: 3px solid rgba(100,180,255,0.5); display: none;
        }
        #status-msg.error { background: rgba(180,20,60,0.95); border-color: #ff3366; display: block !important; }
        #status-msg.info { background: rgba(20,40,80,0.95); border-color: #42a5f5; display: block !important; }

        /* ── 过渡覆盖层（VR内）── */
        #vr-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 35; pointer-events: none; display: none;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.4);
        }
        #vr-overlay .overlay-text {
            color: #fff; font-size: 42px; font-weight: 900;
            text-shadow: 0 0 40px #42a5f5, 0 0 80px #1e88e5;
            animation: pulseText 1s ease-in-out infinite alternate;
        }
        @keyframes pulseText { from{opacity:0.7;transform:scale(0.95);} to{opacity:1;transform:scale(1.05);} }

        /* 浮动得分 */
        .float-score {
            position: fixed; pointer-events: none; z-index: 50;
            font-size: 32px; font-weight: 900; color: #ffd700;
            text-shadow: 0 0 10px rgba(255,200,0,0.8), 0 2px 4px rgba(0,0,0,0.5);
            animation: floatUp 1s ease-out forwards;
        }
        .float-score.golden {
            font-size: 42px; color: #fff;
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00, 0 2px 4px rgba(0,0,0,0.5);
            animation: floatUpGold 1.2s ease-out forwards;
        }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(0.5);} 100%{opacity:0;transform:translateY(-80px) scale(1.3);} }
        @keyframes floatUpGold { 0%{opacity:1;transform:translateY(0) scale(0.3) rotate(-10deg);} 50%{transform:translateY(-40px) scale(1.5) rotate(5deg);} 100%{opacity:0;transform:translateY(-100px) scale(1) rotate(-5deg);} }

        /* 闪电效果 */
        @keyframes flashScreen { 0%{background:white;} 5%{background:transparent;} 100%{background:transparent;} }
        .lightning-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 28; pointer-events: none; display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-dot { display: inline-block; width: 8px; height: 8px; margin: 0 3px; border-radius: 50%; background: #90caf9; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>
    <!-- HUD -->
    <div id="hud">
        <div id="score-panel">
            <div class="label">🎯 得 分</div>
            <div class="score" id="score-value">0</div>
            <div class="combo" id="combo-text"></div>
        </div>
    </div>

    <!-- 关卡提示 -->
    <div id="level-panel">☁️ 第 1 关 — 云端乐园</div>

    <!-- X键提示 -->
    <div id="x-key-hint">⬆️ 按下 X 键 升空！</div>

    <!-- VR 入口 -->
    <div id="vr-entry"><button id="enter-vr-btn">☁️ 进入云上气球大战！</button></div>
    <div id="vr-hints">
        <span class="hint-badge">🔫 <span class="key">右手扳机</span> 自动步枪</span>
        <span class="hint-badge">🔫 <span class="key">左手扳机</span> 手枪单发</span>
        <span class="hint-badge">🕹️ <span class="key">摇杆</span> 移动</span>
        <span class="hint-badge">⬆️ <span class="key">X键</span> 升空/下一关</span>
        <span class="hint-badge">🅰️ <span class="key">A键</span> 退出</span>
    </div>
    <div id="status-msg"></div>
    <div id="vr-overlay"><div class="overlay-text" id="overlay-text"></div></div>
    <div class="lightning-flash" id="lightning-flash"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ════════════════════════════════════
        //  DOM 元素
        // ════════════════════════════════════
        const scoreValueEl = document.getElementById('score-value');
        const comboTextEl  = document.getElementById('combo-text');
        const enterVRBtn   = document.getElementById('enter-vr-btn');
        const statusMsgEl  = document.getElementById('status-msg');
        const vrHintsEl    = document.getElementById('vr-hints');
        const vrEntryEl    = document.getElementById('vr-entry');
        const vrOverlay     = document.getElementById('vr-overlay');
        const overlayText   = document.getElementById('overlay-text');
        const levelPanelEl  = document.getElementById('level-panel');
        const xKeyHintEl    = document.getElementById('x-key-hint');
        const lightningEl   = document.getElementById('lightning-flash');

        // ════════════════════════════════════
        //  关卡系统
        // ════════════════════════════════════
        /** @type {'cloud'|'storm'} */
        let currentLevel = 'cloud';       // 当前关卡
        let gameActive    = false;         // VR 游戏是否激活
        let isAscending   = false;         // 热气球上升中
        let ascentTimer   = 0;             // 上升计时器（秒）
        const ASCENT_DURATION = 5;         // 上升持续时间

        // ════════════════════════════════════
        //  游戏常量 & 状态
        // ════════════════════════════════════
        let score = 0, comboCount = 0, comboTimer;
        const COMBO_TIMEOUT = 1500, BALLOON_POINTS = 10, GOLDEN_POINTS = 30;
        const MAX_BALLOONS = 20, SPAWN_INTERVAL = 1800;
        const SPAWN_RADIUS_MIN = 4, SPAWN_RADIUS_MAX = 14;
        const SPAWN_HEIGHT_MIN = 1.2, SPAWN_HEIGHT_MAX = 4.5;
        const MOVE_SPEED = 3.5, RAY_MAX_DISTANCE = 20, GOLDEN_CHANCE = 0.12;
        const RIFLE_COOLDOWN = 120;
        const DEADZONE = 0.2;

        // 云层高度常量
        const CLOUD_SURFACE_Y = 0;          // 云层表面 Y 坐标
        const BALLOON_HEIGHT_ABOVE_CLOUD = 5; // 热气球距离云层高度
        const BASKET_WIDTH  = 4;            // 篮子宽度 (X轴)
        const BASKET_LENGTH = 8;            // 篮子长度 (Z轴)
        const BASKET_HEIGHT = 2;            // 篮子高度 (墙壁)

        const rightInput = { stickX: 0, stickY: 0, trigger: false };
        const leftInput  = { stickX: 0, stickY: 0, trigger: false };

        // ════════════════════════════════════
        //  Three.js 初始化
        // ════════════════════════════════════
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = false;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();

        // ════════════════════════════════════
        //  天空（动态可切换）
        // ════════════════════════════════════
        const skyGeo = new THREE.SphereGeometry(95, 32, 32);
        // 天空材质（可运行时修改颜色）
        const skyMat = new THREE.ShaderMaterial({
            side: THREE.BackSide,
            uniforms: {
                uTopColor:    { value: new THREE.Color(0x87CEEB) },  // 天蓝
                uMidColor:    { value: new THREE.Color(0xB0E0E6) },  // 粉蓝
                uBottomColor: { value: new THREE.Color(0xFFF8DC) },  // 玉米丝色
                uOffset:      { value: 0.4 },
                uExponent:    { value: 0.6 },
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPos = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPos.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }`,
            fragmentShader: `
                uniform vec3 uTopColor, uMidColor, uBottomColor;
                uniform float uOffset, uExponent;
                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize(vWorldPosition).y + uOffset;
                    float t = pow(max(h, 0.0), uExponent);
                    vec3 col = mix(uBottomColor, uMidColor, smoothstep(0.0, 0.5, t));
                    col = mix(col, uTopColor, smoothstep(0.5, 1.0, t));
                    gl_FragColor = vec4(col, 1.0);
                }`
        });
        const skyMesh = new THREE.Mesh(skyGeo, skyMat);
        scene.add(skyMesh);
        scene.fog = new THREE.FogExp2(0xddeeff, 0.008);  // 轻薄雾气

        // ════════════════════════════════════
        //  相机 & 玩家（出生在篮子中心）
        // ════════════════════════════════════
        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 100);
        // 玩家出生点：篮子中心上方（眼睛高度 ~1.6m），篮子底部在 CLOUD_SURFACE_Y + BALLOON_HEIGHT_ABOVE_CLOUD
        const PLAYER_SPAWN_Y = CLOUD_SURFACE_Y + BALLOON_HEIGHT_ABOVE_CLOUD + 1.6;
        camera.position.set(0, PLAYER_SPAWN_Y, 0);
        const dolly = new THREE.Group();
        dolly.add(camera);
        scene.add(dolly);

        // 光照
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sunLight = new THREE.DirectionalLight(0xfff8e0, 1.8);
        sunLight.position.set(20, 30, 10);
        scene.add(sunLight);
        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0xE0F7FA, 0.9);
        scene.add(hemiLight);

        // ════════════════════════════════════════════════
        //  ★★★ 场景一：厚厚的云层 ★★★
        // ════════════════════════════════════════════════
        const cloudLayerGroup = new THREE.Group();
        scene.add(cloudLayerGroup);

        /**
         * 创建单个云朵团块（多个球体组合 + 半透明白色材质）
         */
        function createCloudPuff(centerX, centerY, centerZ, scale = 1) {
            const puff = new THREE.Group();
            const cloudMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                roughness: 1.0,
                metalness: 0.0,
                transparent: true,
                opacity: 0.75,
                side: THREE.DoubleSide
            });

            // 用多个球体组成一朵蓬松的云
            const sphereCount = 5 + Math.floor(Math.random() * 5);
            for (let i = 0; i < sphereCount; i++) {
                const r = (0.4 + Math.random() * 0.8) * scale;
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(r, 8, 8),
                    cloudMat
                );
                sphere.position.set(
                    (Math.random() - 0.5) * 2.5 * scale,
                    (Math.random() - 0.5) * 1.0 * scale,
                    (Math.random() - 0.5) * 2.5 * scale
                );
                puff.add(sphere);
            }
            puff.position.set(centerX, centerY, centerZ);
            return puff;
        }

        /**
         * 创建厚云层（多层云朵密集排列形成地面感）
         */
        function createThickCloudLayer() {
            const group = new THREE.Group();
            group.name = 'thickCloudLayer';

            // 云层参数
            const layerRadius = 50;          // 云层半径
            const layers = 4;                 // 层数（厚度）
            const puffsPerLayer = 80;         // 每层的云团数
            const layerSpacing = 1.2;         // 层间距

            for (let layer = 0; layer < layers; layer++) {
                const yBase = CLOUD_SURFACE_Y - (layer - layers / 2) * layerSpacing;

                for (let i = 0; i < puffsPerLayer; i++) {
                    // 极坐标随机分布，中心更密
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.pow(Math.random(), 0.5) * layerRadius;
                    const x = Math.cos(angle) * r;
                    const z = Math.sin(angle) * r;

                    // 中心区域留空（给热气球和玩家活动空间）
                    const distFromCenter = Math.sqrt(x*x + z*z);
                    if (distFromCenter < 6 && layer === Math.floor(layers/2)) continue;

                    const y = yBase + (Math.random() - 0.5) * 0.8;
                    const scale = 0.8 + Math.random() * 1.5;

                    const puff = createCloudPuff(x, y, z, scale);
                    group.add(puff);
                }
            }

            // 额外的底层支撑云（确保看不到下方）
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = 5 + Math.random() * (layerRadius - 5);
                group.add(createCloudPuff(
                    Math.cos(angle) * r,
                    CLOUD_SURFACE_Y - layers * layerSpacing * 0.6 - Math.random(),
                    Math.sin(angle) * r,
                    1.5 + Math.random()
                ));
            }

            return group;
        }

        const thickCloudLayer = createThickCloudLayer();
        cloudLayerGroup.add(thickCloudLayer);

        // ════════════════════════════════════════════════
        //  ★★★ 热气球 + 篮子（核心场景物体）★★★
        // ════════════════════════════════════════════════
        const hotAirBalloonGroup = new THREE.Group();  // 整个热气球组（用于升空动画）
        scene.add(hotAirBalloonGroup);

        // 热气球整体位置：篮子底部在 CLOUD_SURFACE_Y + BALLOON_HEIGHT_ABOVE_CLOUD
        // 篮子中心 Y = CLOUD_SURFACE_Y + BALLOON_HEIGHT_ABOVE_CLOUD + BASKET_HEIGHT/2
        const basketCenterY = CLOUD_SURFACE_Y + BALLOON_HEIGHT_ABOVE_CLOUD + BASKET_HEIGHT / 2;
        hotAirBalloonGroup.position.y = CLOUD_SURFACE_Y + BALLOON_HEIGHT_ABOVE_CLOUD;

        /**
         * 创建热气球囊（彩色条纹大气球）
         */
        function createBalloonEnvelope() {
            const envelope = new THREE.Group();

            // 气球主体 — 扁球体（宽 > 高）
            const bodyGeo = new THREE.SphereGeometry(2.8, 32, 24);
            // 压扁成热气球形状
            bodyGeo.scale(1, 1.25, 1);

            // 彩色条纹材质（使用 Shader 或简单多色面）
            // 这里用程序化方式创建彩色气球表面
            const stripeColors = [0xFF3333, 0xFFFF33, 0x33CC33, 0x3399FF, 0xFF9900, 0xFF33CC];

            const bodyMat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uColors: {
                        value: stripeColors.map(c => new THREE.Color(c))
                    }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    uniform vec3 uColors[6];
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    void main() {
                        // 基于水平角度的彩虹条纹
                        float angle = atan(vNormal.z, vNormal.x);
                        float stripe = floor((angle / 3.14159 + 1.0) * 3.0 + uTime * 0.05);
                        int idx = int(mod(stripe, 6.0));

                        vec3 col = uColors[0];
                        if(idx == 1) col = uColors[1];
                        else if(idx == 2) col = uColors[2];
                        else if(idx == 3) col = uColors[3];
                        else if(idx == 4) col = uColors[4];
                        else if(idx == 5) col = uColors[5];

                        // 底部渐变到深色
                        float bottomFade = smoothstep(-0.5, 0.5, vNormal.y);
                        col = mix(col * 0.5, col, bottomFade);

                        // 高光
                        vec3 lightDir = normalize(vec3(0.5, 1.0, 0.3));
                        float diff = max(dot(vNormal, lightDir), 0.0) * 0.4 + 0.6;
                        col *= diff;

                        gl_FragColor = vec4(col, 1.0);
                    }
                `
            });

            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 5.5;  // 气球主体在篮子上方
            envelope.add(body);
            envelope.userData.bodyMesh = body;

        /**
         * 创建绳索（从气球底部四角连到篮子四角）
         */
        function createRopes(envelopeBottomY, basketTopY) {
            const ropeGroup = new THREE.Group();
            const ropeMat = new THREE.LineBasicMaterial({ color: 0x996633, linewidth: 2 });

            // 篮子四角位置（相对于 hotAirBalloonGroup）
            const halfW = BASKET_WIDTH / 2;
            const halfL = BASKET_LENGTH / 2;
            const basketCorners = [
                [-halfW, basketTopY - hotAirBalloonGroup.position.y, -halfL],
                [ halfW, basketTopY - hotAirBalloonGroup.position.y, -halfL],
                [-halfW, basketTopY - hotAirBalloonGroup.position.y,  halfL],
                [ halfW, basketTopY - hotAirBalloonGroup.position.y,  halfL],
            ];

            // 气球底部连接点
            const ropeAttachY = envelopeBottomY - hotAirBalloonGroup.position.y;
            const attachPoints = [
                [-1.0, ropeAttachY, -0.8],
                [ 1.0, ropeAttachY, -0.8],
                [-1.0, ropeAttachY,  0.8],
                [ 1.0, ropeAttachY,  0.8],
            ];

            for (let i = 0; i < 4; i++) {
                const pts = [];
                const start = new THREE.Vector3(...attachPoints[i]);
                const end   = new THREE.Vector3(...basketCorners[i]);

                // 绳索稍微弯曲（中间点偏移）
                const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
                mid.y -= 0.3;  // 下垂

                pts.push(start, mid, end);
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                const rope = new THREE.Line(geo, ropeMat);
                ropeGroup.add(rope);
            }

            return ropeGroup;
        }

        /**
         * 创建篮子（4m宽 × 2m高 × 8m长）
         */
        function createBasket() {
            const basket = new THREE.Group();

            const hw = BASKET_WIDTH  / 2;  // 2
            const hh = BASKET_HEIGHT / 2;  // 1
            const hl = BASKET_LENGTH / 2;  // 4

            // 编织藤条材质
            const wickerMat = new THREE.MeshStandardMaterial({
                color: 0xB8860B,
                roughness: 0.85,
                metalness: 0.05
            });
            const wickerDarkMat = new THREE.MeshStandardMaterial({
                color: 0x8B6914,
                roughness: 0.9,
                metalness: 0.02
            });

            // 地板
            const floorGeo = new THREE.BoxGeometry(BASKET_WIDTH, 0.15, BASKET_LENGTH);
            const floor = new THREE.Mesh(floorGeo, wickerMat);
            floor.position.y = -hh;
            basket.add(floor);

            // 四面墙壁（薄板 + 边框）
            const wallThickness = 0.08;
            const wallHeight = BASKET_HEIGHT;

            // 前/后墙（Z方向）
            for (const zSign of [-1, 1]) {
                const wallGeo = new THREE.BoxGeometry(BASKET_WIDTH, wallHeight, wallThickness);
                const wall = new THREE.Mesh(wallGeo, wickerDarkMat);
                wall.position.set(0, 0, zSign * hl);
                basket.add(wall);

                // 上下边框
                for (const ySign of [-1, 1]) {
                    const railGeo = new THREE.BoxGeometry(BASKET_WIDTH + 0.06, 0.1, 0.12);
                    const rail = new THREE.Mesh(railGeo, wickerMat);
                    rail.position.set(0, ySign * hh * 0.92, zSign * hl);
                    basket.add(rail);
                }
            }

            // 左/右墙（X方向）
            for (const xSign of [-1, 1]) {
                const wallGeo = new THREE.BoxGeometry(wallThickness, wallHeight, BASKET_LENGTH);
                const wall = new THREE.Mesh(wallGeo, wickerDarkMat);
                wall.position.set(xSign * hw, 0, 0);
                basket.add(wall);

                // 上下边框
                for (const ySign of [-1, 1]) {
                    const railGeo = new THREE.BoxGeometry(0.12, 0.1, BASKET_LENGTH + 0.06);
                    const rail = new THREE.Mesh(railGeo, wickerMat);
                    rail.position.set(xSign * hw * 0.98, ySign * hh * 0.92, 0);
                    basket.add(rail);
                }
            }

            // 四个立柱角
            for (const xSign of [-1, 1]) {
                for (const zSign of [-1, 1]) {
                    const postGeo = new THREE.CylinderGeometry(0.07, 0.09, wallHeight, 6);
                    const post = new THREE.Mesh(postGeo, wickerMat);
                    post.position.set(xSign * hw * 0.96, 0, zSign * hl * 0.96);
                    basket.add(post);
                }
            }

            // 内部装饰：沙袋
            const sandbagGeo = new THREE.BoxGeometry(0.6, 0.3, 0.4);
            const sandMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C, roughness: 0.95 });
            for (let i = 0; i < 4; i++) {
                const sb = new THREE.Mesh(sandbagGeo, sandMat);
                sb.position.set(
                    (Math.floor(i/2)-0.5) * hw * 0.6,
                    -hh + 0.22,
                    ((i%2)*2-1) * hl * 0.65
                );
                sb.rotation.y = (Math.random()-0.5) * 0.3;

            basket.name = 'basket';
            return basket;

        const balloonColors=[0xff3b3b,0xff6b35,0xffc635,0x4caf50,0x2196f3,0x9c27b0,0xe91e63,0x00bcd4,0xff9800,0x8bc34a];

        function removeOldestBalloon(){
            if(!balloons.length)return;const old=balloons.shift();const start=performance.now(),duration=800,startPos=old.position.clone();
            const rise=3+Math.random()*4,dx=(Math.random()-0.5)*2,dz=(Math.random()-0.5)*2;

                const mat=new THREE.MeshStandardMaterial({color:baseColor.clone().multiplyScalar(0.7+Math.random()*0.5),roughness:0.6,emissive:isGolden?goldenColor:color,emissiveIntensity:isGolden?0.4:0.15,transparent:true,opacity:1});
                const piece=new THREE.Mesh(geom,mat);piece.position.copy(position);piece.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
                const dir=new THREE.Vector3((Math.random()-0.5)*2,Math.random()*2+0.5,(Math.random()-0.5)*2).normalize();const speed=2+Math.random()*5;
                piece.userData={velocity:dir.multiplyScalar(speed),rotSpeed:new THREE.Vector3((Math.random()-0.5)*15,(Math.random()-0.5)*15,(Math.random()-0.5)*15),life:5,grounded:false,material:mat};
                debrisGroup.add(piece);debris.push(piece);

            if(isGolden)for(let i=0;i<12;i++){const sg=new THREE.OctahedronGeometry(0.06);const sm=new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:1});const star=new THREE.Mesh(sg,sm);star.position.copy(position);const sd=new THREE.Vector3((Math.random()-0.5)*3,Math.random()*3,(Math.random()-0.5)*3).normalize().multiplyScalar(3+Math.random()*4);star.userData={velocity:sd,rotSpeed:new THREE.Vector3((Math.random()-0.5)*20,(Math.random()-0.5)*20,(Math.random()-0.5)*20),life:3,grounded:false,material:sm,isStar:true};debrisGroup.add(star);debris.push(star);}
        }

        function updateDebris(dt){
            for(let i=debris.length-1;i>=0;i--){const d=debris[i],ud=d.userData;
                if(!ud.grounded){d.position.x+=ud.velocity.x*dt;d.position.y+=ud.velocity.y*dt;d.position.z+=ud.velocity.z*dt;d.rotation.x+=ud.rotSpeed.x*dt;d.rotation.y+=ud.rotSpeed.y*dt;d.rotation.z+=ud.rotSpeed.z*dt;ud.velocity.y-=9.8*dt;if(d.position.y<=CLOUD_SURFACE_Y-5){d.position.y=CLOUD_SURFACE_Y-5;ud.grounded=true;ud.velocity.set(0,0,0);}}

        /**

            if (isAscending || currentLevel !== 'cloud') return;

            isAscending = true;
            ascentTimer = 0;
            xKeyHintEl.style.display = 'none';

        /**
         * 切换到暴风雨关卡
         */
        function switchToStormLevel() {
            currentLevel = 'storm';
            console.log('[LEVEL] ⛈️ 进入第2关：暴风雨！');

            // 隐藏过渡提示
            hideOverlay();

            skyMat.uniforms.uMidColor.value.setHex(0x37474F);     // 灰蓝中
            skyMat.uniforms.uBottomColor.value.setHex(0x546E7A);  // 深灰底

            // 雾气变浓变暗
            scene.fog.color.setHex(0x37474F);
            scene.fog.density = 0.015;

            // 光照减弱

            sunLight.color.setHex(0x888899);
            hemiLight.intensity = 0.4;
            hemiLight.color.setHex(0x334455);

            // 彩虹灯变暗冷色调
            partyLights.forEach((pl, i) => {
                pl.light.intensity = 0.5;
                pl.light.color.setHex([0x334455, 0x445566, 0x556677][i % 3]);
            });

            // ===== 云层变暗 =====
            cloudLayerGroup.traverse(child => {
                if (child.isMesh && child.material) {
                    child.material.color.lerp(new THREE.Color(0x556677), 0.6);
                    child.material.opacity *= 0.85;

        /**
         * 触发屏幕闪电动画
         */
        function triggerLightning() {
            lightningEl.style.display = 'block';
            lightningEl.style.animation = 'none';
            void lightningEl.offsetWidth;  // force reflow
            lightningEl.style.animation = 'flashScreen 0.3s ease-out';

                lightningEl.style.display = 'none';
            }, 400);

            // 暴风雨模式下随机闪电
            if (currentLevel === 'storm') {
                const nextLightning = 2000 + Math.random() * 5000;

                    if (currentLevel === 'storm' && gameActive) {
                        triggerLightning();
                    }
                }, nextLightning);

        /**
         * 更新升空动画
         */
        function updateAscent(dt) {
            if (!isAscending) return;

            ascentTimer += dt;

            // 缓动曲线：慢→快→慢
            const progress = Math.min(ascentTimer / ASCENT_DURATION, 1);
            const eased = 1 - Math.pow(1 - progress, 3);  // cubic out

            // 热气球上升
            const riseHeight = eased * 15;  // 总共上升15米
            hotAirBalloonGroup.position.y = CLOUD_SURFACE_Y + BALLOON_HEIGHT_ABOVE_CLOUD + riseHeight;

            // dolly（玩家）跟随上升
            dolly.position.y = PLAYER_SPAWN_Y + riseHeight;

            // 摇摆幅度增大
            hotAirBalloonGroup.userData.swayAmount = 0.03 + eased * 0.08;

            // 火焰闪烁
            if (burner.userData.flameMat) {
                burner.userData.flameMat.opacity = 0.6 + Math.sin(ascentTimer * 20) * 0.3;
                burner.userData.flame.scale.setScalar(1 + Math.sin(ascentTimer * 15) * 0.2);
            }

            // 进度显示
            overlayText.textContent = `🎈 升空中... ${Math.round(progress * 100)}%`;

            // 到达终点
            if (progress >= 1) {
                isAscending = false;
                switchToStormLevel();
            }
        }

        // ════════════════════════════════════
        //  主循环
        // ════════════════════════════════════
        const clock = new THREE.Clock();
        function animate(ts, frame){
            const dt = Math.min(clock.getDelta(), 0.1);

            if (renderer.xr.isPresenting && gameActive) {
                try {
                    updateInput();
                    handleExit();
                    handleMove(dt);
                    handleAutoFire(dt);
                    handleLeftFire(dt);
                    spawnLoop(ts);
                    animBalloons(ts);
                    updateDebris(dt);
                    updateBullets(dt);
                    updateRecoils(dt);
                    controllers.forEach(c => {
                        const h = checkBalloonHit(c);
                        updateLaserPointer(c, h ? h.point : null);
                    });
                    updateLeftScoreDisplay();

                    // 热气球摇摆动画
                    hotAirBalloonGroup.userData.swayPhase += dt;
                    if (!isAscending) {
                        const swayX = Math.sin(hotAirBalloonGroup.userData.swayPhase * 0.8) * hotAirBalloonGroup.userData.swayAmount;
                        const swayZ = Math.sin(hotAirBalloonGroup.userData.swayPhase * 0.6 + 1.0) * hotAirBalloonGroup.userData.swayAmount * 0.7;
                        hotAirBalloonGroup.position.x = swayX;
                        hotAirBalloonGroup.position.z = swayZ;
                    }

                    // 升空更新
                    updateAscent(dt);

                    // 气球条纹动画
                    if (envelope.userData.bodyMat) {
                        envelope.userData.bodyMat.uniforms.uTime.value = ts * 0.001;
                    }

                    vrEntryEl.style.display = 'none';
                    vrHintsEl.style.display = 'none';
                    statusMsgEl.style.display = 'none';
                    levelPanelEl.style.display = gameActive ? 'block' : 'none';

                    // X键提示只在云端关卡显示
                    xKeyHintEl.style.display = (currentLevel === 'cloud' && !isAscending) ? 'block' : (currentLevel === 'storm' ? 'block' : 'none');

                } catch(loopErr) {
                    console.error('[GAME LOOP ERROR]', loopErr);
                }
            }
            else if (renderer.xr.isPresenting && !gameActive) {
                vrEntryEl.style.display = 'none';
                vrHintsEl.style.display = 'none';
                animBalloons(ts);
                partyLights.forEach(pl => {
                    pl.angle += pl.speed * 0.016;
                    pl.light.position.set(
                        Math.cos(pl.angle) * pl.radius,
                        pl.yOffset,
                        Math.sin(pl.angle) * pl.radius
                    );
                });
                // 热气球预览摇摆
                hotAirBalloonGroup.userData.swayPhase += dt;
                const sw = hotAirBalloonGroup.userData.swayAmount;
                hotAirBalloonGroup.position.x = Math.sin(hotAirBalloonGroup.userData.swayPhase * 0.8) * sw;
                hotAirBalloonGroup.position.z = Math.sin(hotAirBalloonGroup.userData.swayPhase * 0.6 + 1) * sw * 0.7;
            }
            else {
                // 2D 预览
                vrEntryEl.style.display = 'block';
                vrHintsEl.style.display = 'flex';
                animBalloons(ts);
                partyLights.forEach(pl => {
                    pl.angle += pl.speed * 0.016;
                    pl.light.position.set(
                        Math.cos(pl.angle) * pl.radius,
                        pl.yOffset,
                        Math.sin(pl.angle) * pl.radius
                    );
                });
                hotAirBalloonGroup.userData.swayPhase += dt;
                const sw = hotAirBalloonGroup.userData.swayAmount;
                hotAirBalloonGroup.position.x = Math.sin(hotAirBalloonGroup.userData.swayPhase * 8) * sw;
                hotAirBalloonGroup.position.z = Math.cos(hotAirBalloonGroup.userData.swayPhase * 6) * sw * 0.7;
            }

            renderer.render(scene, camera);
        }
        renderer.setAnimationLoop(animate);

        // ════════════════════════════════════════════════
        //  VR 进入逻辑
        // ════════════════════════════════════════════════
        
        // ── 页面加载时预检XR支持（不在点击时检查，避免user gesture超时）──
        let xrSupported = false;
        let xrCheckDone  = false;

        function init(){
            // ── 预检WebXR支持（页面加载时，不在点击时检查）──
            (async () => {
                try {
                    if (navigator.xr) {
                        xrSupported = await navigator.xr.isSessionSupported('immersive-vr');
                        console.log('[VR] 预检完成 immersive-vr=', xrSupported);
                    } else {
                        console.warn('[VR] navigator.xr 不存在');
                        xrSupported = false;
                    }
                } catch(e) {
                    console.error('[VR] 预检出错:', e);
                    xrSupported = false;
                } finally {
                    xrCheckDone = true;
                    if (!xrSupported) {
                        enterVRBtn.innerHTML = '❌ 设备不支持VR';
                        enterVRBtn.disabled = true;
                        enterVRBtn.style.background = '#666';
                    } else {
                        enterVRBtn.innerHTML = '☁️ 进入云上气球大战！';
                    }
                }
            })();

            setupController(0);
            setupController(1);
            for(let i=0;i<8;i++)setTimeout(()=>spawnBalloon(),i*250);
            setTimeout(()=>spawnBalloon(true),1500);
            lastSpawn=performance.now();

            async function enterVRAction(e) {
                e && e.preventDefault();
                if (enterVRBtn.disabled) return;
                console.log('[VR] Step 1: 按钮被点击！xrSupported=', xrSupported);
                enterVRBtn.disabled = true;
                enterVRBtn.innerHTML = '⏳ 正在进入VR...';

                try {
                    // ── 不在这里检查isSessionSupported！已经在页面加载时预检了 ──
                    if (!navigator.xr) throw new Error('此浏览器不支持 WebXR。\n请使用 Pico4/Quest 内置浏览器访问 HTTPS 页面。');
                    if (!xrSupported) throw new Error('设备不支持沉浸式VR模式。\n请确认已戴上头显且通过 HTTPS 访问。');

                    console.log('[VR] Step 2: 调用 requestSession...');
                    
                    let sess = null;
                    try {
                        sess = await navigator.xr.requestSession('immersive-vr', {
                            requiredFeatures: ['local-floor'],
                            optionalFeatures: ['bounded-floor', 'hand-tracking']
                        });
                        console.log('[VR] Step 3: requiredFeatures 成功');
                    } catch(reqErr) {
                        console.warn('[VR] Step 3: requiredFeatures 失败, 回退到全部optional:', reqErr.message);
                        sess = await navigator.xr.requestSession('immersive-vr', {
                            optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
                        });
                        console.log('[VR] Step 3: optionalFeatures 成功');
                    }

                    console.log('[VR] Step 4: setSession...');
                    enterVRBtn.innerHTML = '🎮 初始化场景...';
                    await renderer.xr.setSession(sess);

                    console.log('[VR] Step 5: 激活游戏状态');
                    gameActive = true;
                    showOverlay('☁️ 欢迎来到云端！');
                    setTimeout(() => hideOverlay(), 2000);

                } catch(err) {
                    console.error('[VR] ❌ 进入失败 Step:', err);
                    const errMsg = err.message || String(err);
                    resetButton(`❌ 进入失败`);
                    showStatus(errMsg, 'error');
                    // 错误信息也显示在按钮上，持续可见
                    enterVRBtn.innerHTML = '❌ 重试';
                    enterVRBtn.style.fontSize = '16px';
                    enterVRBtn.style.lineHeight = '1.4';
                    // 5秒后恢复原状
                    setTimeout(() => {
                        if (!renderer.xr.isPresenting) resetButton('☁️ 进入云上气球大战！');
                    }, 5000);
                }
            }

            enterVRBtn.addEventListener('click', enterVRAction);

            renderer.xr.addEventListener('sessionend', () => {
                rifleTimer = 0; pistolCooldown = 0;
                gameActive = false;
                isAscending = false;
                currentLevel = 'cloud';
                ascentTimer = 0;
                resetButton('☁️ 进入云上气球大战！');
                vrEntryEl.style.display = 'block';
                vrHintsEl.style.display = 'flex';
                showStatus('', '');
                hideOverlay();
                xKeyHintEl.style.display = 'none';
                xKeyHintEl.classList.remove('storm-mode');
                levelPanelEl.classList.remove('visible');
                levelPanelEl.style.display = 'none';
                controllers.forEach(c => { if(c.userData.laser) c.userData.laser.visible = false; });

                // 重置天空颜色
                skyMat.uniforms.uTopColor.value.setHex(0x87CEEB);
                skyMat.uniforms.uMidColor.value.setHex(0xB0E0E6);
                skyMat.uniforms.uBottomColor.value.setHex(0xFFF8DC);
                scene.fog.color.setHex(0xddeeff);
                scene.fog.density = 0.008;
                sunLight.intensity = 1.8;
                sunLight.color.setHex(0xfff8e0);
                hemiLight.intensity = 0.9;
                hemiLight.color.setHex(0x87CEEB);
                hotAirBalloonGroup.position.y = CLOUD_SURFACE_Y + BALLOON_HEIGHT_ABOVE_CLOUD;
                burner.userData.flameMat.opacity = 0;
            });

            renderer.xr.addEventListener('sessionstart', () => {
                vrEntryEl.style.display = 'none';
                vrHintsEl.style.display = 'none';
                statusMsgEl.style.display = 'none';
                initAudio();
                if (!gameActive) gameActive = true;
                levelPanelEl.classList.add('visible');
                levelPanelEl.style.display = 'block';
                xKeyHintEl.style.display = 'block';
                console.log('[VR] sessionstart — gameActive=', gameActive);
            });

            // ── 键盘事件：X键升空 / ESC退出 ──
            window.addEventListener('keydown', e => {
                const key = e.key.toLowerCase();
                if (key === 'escape' && renderer.xr.isPresenting) exitVR();

                // X键：升空进入下一关
                if ((key === 'x' || key === 'x') && gameActive && !isAscending && currentLevel === 'cloud') {
                    startAscent();
                }
            });

            // VR手柄 X键（button index 2 在某些控制器上是X键）
            // 也通过 inputSources 的 buttons[2] 检测
            window.addEventListener('keydown', e => {
                // 已经在上面处理了
            });

            // 定期检查手柄X键输入
            let prevXButton = false;
            const originalUpdateInput = updateInput;
            // 重写 updateInput 以包含X键检测
            updateInput = function() {
                originalUpdateInput();
                // 检查左右手柄的额外按钮作为X键
                const session = renderer.xr.getSession();
                if (!session) return;
                for (const src of session.inputSources) {
                    if (!src.gamepad || src.gamepad.buttons.length < 3) continue;
                    // button[2] 常见于 X/A/Y/B 布局中的 X 键
                    const xPressed = src.gamepad.buttons[2]?.pressed;
                    if (xPressed && !prevXButton && gameActive && !isAscending && currentLevel === 'cloud') {
                        startAscent();
                    }
                    prevXButton = !!xPressed;
                }
            };

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function resetButton(html) {
            enterVRBtn.disabled = false;
            enterVRBtn.innerHTML = html || '☁️ 进入云上气球大战！';
            enterVRBtn.style.fontSize = '';
            enterVRBtn.style.lineHeight = '';
        }
        function showStatus(msg, type) {
            statusMsgEl.innerHTML = msg;
            statusMsgEl.className = type || '';
            statusMsgEl.style.display = msg ? 'block' : 'none';
        }
        function showOverlay(text) {
            overlayText.textContent = text;
            vrOverlay.style.display = 'flex';
        }
        function hideOverlay() {
            vrOverlay.style.display = 'none';
        }

        init();
    </script>
</body>
</html>
