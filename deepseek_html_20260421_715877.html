<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR 射击气球游戏 - Pico 4</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
        }
        /* 信息面板 - 在非VR模式下显示 */
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
        /* 分数显示 - 在VR和桌面模式都可见，悬浮在左前方 */
        .score-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            color: gold;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 32px;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
        .score-panel span {
            color: white;
            font-size: 20px;
            margin-right: 10px;
        }
        /* 进入VR按钮 - 使用Three.js自带的VRButton样式增强 */
        #vr-button-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }
        .vr-btn {
            pointer-events: auto;
            background-color: #00aaff;
            border: none;
            color: white;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,170,255,0.5);
            transition: transform 0.2s, background 0.2s;
            font-family: inherit;
        }
        .vr-btn:hover {
            background-color: #0088cc;
            transform: scale(1.02);
        }
        /* 简单的提示 */
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
        @media (max-width: 600px) {
            .score-panel { padding: 6px 12px; font-size: 22px; top: 10px; right: 10px; }
            .score-panel span { font-size: 14px; }
            .vr-btn { padding: 8px 20px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div id="info">🎈 VR 射击气球 | 扣动扳机射击 | 自动生成气球 | 每击中+10分</div>
    <div class="score-panel">
        <span>🎯 SCORE</span> <span id="scoreValue">0</span>
    </div>
    <div class="instruction">
        🎮 提示：拿起手柄，对准气球扣动扳机(Trigger)即可射击
    </div>
    <div id="vr-button-container">
        <button id="vr-button" class="vr-btn">🚀 进入 VR 模式</button>
    </div>

    <!-- 引入 Three.js 核心库以及扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        // --- 初始化场景、相机、渲染器 (支持WebXR) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a); // 深色天空背景
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // 雾效增强景深

        // 相机: 透视相机，VR中会被XR相机替换，但普通模式需要
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 3);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // 开启阴影映射，增加真实感
        renderer.xr.enabled = true;         // 启用 WebXR 支持
        document.body.appendChild(renderer.domElement);

        // --- 添加 VR 按钮 (Three.js 自带样式) ---
        const vrButton = VRButton.createButton(renderer);
        // 替换我们自定义按钮的容器内容，保留原有样式但让VRButton接管
        const btnContainer = document.getElementById('vr-button-container');
        // 清空容器并添加标准VRButton，同时保留一点样式覆盖
        btnContainer.innerHTML = '';
        btnContainer.appendChild(vrButton);
        // 调整按钮样式以融合
        const actualBtn = btnContainer.querySelector('button');
        if (actualBtn) {
            actualBtn.classList.add('vr-btn');
            actualBtn.style.backgroundColor = '#00aaff';
        }

        // --- 辅助功能: 显示分数的DOM元素更新 ---
        const scoreElement = document.getElementById('scoreValue');
        let currentScore = 0;
        function updateScoreUI() {
            scoreElement.textContent = currentScore;
        }

        // --- 游戏配置参数 ---
        const BALLOON_RADIUS = 0.28;      // 气球半径
        const BALLOON_GEN_INTERVAL = 1.5;  // 生成间隔(秒)
        const BALLOON_MAX_COUNT = 18;       // 最大同时存在气球数
        const SHOOT_RANGE = 12;             // 射击有效距离
        
        // 存储所有活跃的气球对象 (Mesh)
        let balloons = [];
        
        // 存储控制器相关对象
        let controller1, controller2;           // 目标射线空间组
        let controllerGrip1, controllerGrip2;   // 握持空间组(用于模型)
        let raycaster;                          // 射线检测器
        
        // 用于射击冷却(避免单次扳机连发过多)
        let lastShootTime = 0;
        const SHOOT_COOLDOWN_MS = 200; // 毫秒
        
        // 当前是否在VR会话中 (用于动画逻辑)
        let isVRActive = false;
        
        // --- 创建环境: 地面网格、轻微光照、周围装饰 ---
        
        // 1. 地面网格参考 (增强空间感)
        const gridHelper = new THREE.GridHelper(30, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.6;
        scene.add(gridHelper);
        
        // 2. 一个简单的地板半透明平面，用于接收阴影和增加地面感
        const floorPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        floorPlane.rotation.x = -Math.PI / 2;
        floorPlane.position.y = -1.2;
        floorPlane.receiveShadow = true;
        scene.add(floorPlane);
        
        // 3. 环境光照和点光源，让气球材质更好看
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(0, 2, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, 2, -3);
        scene.add(backLight);
        
        // 增加一些漂浮粒子效果，增加氛围 (可选)
        const particleCount = 400;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 60;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 8 + 1;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 40 - 15;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particlesMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.4 });
        const particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particleSystem);
        
        // --- 气球生成函数: 创建一个带有随机颜色和轻微漂浮动画的气球 ---
        function createBalloon(x, z) {
            // 随机鲜艳颜色
            const hue = Math.random();
            const saturation = 0.8;
            const lightness = 0.65;
            const color = new THREE.Color().setHSL(hue, saturation, lightness);
            
            // 主体: 球体 + 一个简单的尾部小锥体(增加趣味)
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.SphereGeometry(BALLOON_RADIUS, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: 0x222222,
                roughness: 0.3,
                metalness: 0.1,
                flatShading: false
            });
            const balloonMesh = new THREE.Mesh(bodyGeo, material);
            balloonMesh.castShadow = true;
            balloonMesh.receiveShadow = false;
            group.add(balloonMesh);
            
            // 添加一个小结 (底部绳结)
            const knotGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.12, 6);
            const knotMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
            const knot = new THREE.Mesh(knotGeo, knotMat);
            knot.position.y = -BALLOON_RADIUS + 0.02;
            group.add(knot);
            
            // 简单飘带效果: 细圆柱体
            const ribbonGeo = new THREE.BoxGeometry(0.04, 0.2, 0.02);
            const ribbonMat = new THREE.MeshStandardMaterial({ color: 0xccaa77 });
            const ribbon = new THREE.Mesh(ribbonGeo, ribbonMat);
            ribbon.position.y = -BALLOON_RADIUS - 0.1;
            group.add(ribbon);
            
            // 随机Y轴位置范围: 0 ~ 2.8 之间，使气球高低错落
            const yPos = 0.2 + Math.random() * 2.6;
            group.position.set(x, yPos, z);
            
            // 存储额外动画数据
            group.userData = {
                floatSpeed: 0.3 + Math.random() * 0.7,
                floatOffset: Math.random() * Math.PI * 2,
                originalY: yPos,
                rotationSpeed: (Math.random() - 0.5) * 0.01,
                colorHue: hue
            };
            
            scene.add(group);
            return group;
        }
        
        // 随机生成气球位置，分布在半圆形区域，主要面向玩家前方 (-5 到 5 X轴, -3 到 -8 Z轴)
        function getRandomSpawnPosition() {
            const angle = (Math.random() - 0.5) * Math.PI * 0.7; // -60° 到 60°
            const radius = 3 + Math.random() * 5; // 距离 3-8 米
            const x = Math.sin(angle) * radius * 0.8;
            const z = -Math.cos(angle) * radius - 1.5;
            // 限制范围避免太偏
            return { x: Math.min(5, Math.max(-5, x)), z: Math.min(-2, Math.max(-9, z)) };
        }
        
        // 自动生成气球，限制最大数量
        function spawnBalloon() {
            if (balloons.length >= BALLOON_MAX_COUNT) return;
            const { x, z } = getRandomSpawnPosition();
            const balloon = createBalloon(x, z);
            balloons.push(balloon);
        }
        
        // 移除气球并加分
        function removeBalloon(balloon, addScore = true) {
            const index = balloons.indexOf(balloon);
            if (index !== -1) {
                balloons.splice(index, 1);
                scene.remove(balloon);
                // 可选: 释放几何体内存 (group中的mesh材质不复杂，无需精细)
                if (addScore) {
                    currentScore += 10;
                    updateScoreUI();
                    // 击中效果: 短暂闪烁 + 小粒子 (为了简洁，不加额外效果，但可以加点小光晕)
                }
            }
        }
        
        // 移除所有气球 (重置游戏用，可选)
        function clearAllBalloons() {
            balloons.forEach(balloon => {
                scene.remove(balloon);
            });
            balloons = [];
        }
        
        // --- 射击检测逻辑: 从控制器发出射线，检测气球 ---
        function performShootFromController(controllerGroup) {
            if (!controllerGroup || !controllerGroup.parent) return false;
            
            // 获取控制器的世界矩阵和位置/方向
            const tempMatrix = new THREE.Matrix4();
            const raycasterLocal = new THREE.Raycaster();
            
            // 从控制器组的世界矩阵中提取原点和方向
            // 控制器射线空间: 方向是局部坐标下的(0,0,-1) 经过矩阵变换得到世界方向
            tempMatrix.identity().extractRotation(controllerGroup.matrixWorld);
            const origin = new THREE.Vector3().setFromMatrixPosition(controllerGroup.matrixWorld);
            const direction = new THREE.Vector3(0, 0, -1).applyMatrix4(tempMatrix);
            
            raycasterLocal.set(origin, direction);
            // 获取所有气球的物体 (注意气球是Group, 但射线相交检测的是其内部的Mesh)
            // 为了方便，收集所有气球的子物体中属于Mesh且为球体的部分，也可以直接检测Group，但three.js的raycaster可以检测Group里的children
            const intersectObjects = [];
            balloons.forEach(balloon => {
                // 添加balloon本身及其子物体，以便射线检测
                intersectObjects.push(balloon);
                balloon.children.forEach(child => {
                    if (child.isMesh) intersectObjects.push(child);
                });
            });
            
            const intersects = raycasterLocal.intersectObjects(intersectObjects, true);
            if (intersects.length > 0) {
                // 找到命中的最上层气球Group
                let hitObj = intersects[0].object;
                while (hitObj && !balloons.includes(hitObj)) {
                    hitObj = hitObj.parent;
                    if (!hitObj) break;
                }
                if (hitObj && balloons.includes(hitObj)) {
                    removeBalloon(hitObj, true);
                    // 击中反馈: 轻微震动控制器(目前API不支持震动，但可以添加视觉特效)，这里简单加个光晕粒子
                    createHitEffect(intersects[0].point);
                    return true;
                }
            }
            return false;
        }
        
        // 击中特效: 一个短暂的小光球
        function createHitEffect(position) {
            const geometry = new THREE.SphereGeometry(0.08, 6, 6);
            const material = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.8 });
            const flash = new THREE.Mesh(geometry, material);
            flash.position.copy(position);
            scene.add(flash);
            // 动画消失
            let start = performance.now();
            function animateFlash() {
                const now = performance.now();
                const elapsed = now - start;
                if (elapsed > 200) {
                    scene.remove(flash);
                    return;
                }
                const scale = 1 - elapsed / 200;
                flash.scale.setScalar(scale * 1.5);
                requestAnimationFrame(animateFlash);
            }
            requestAnimationFrame(animateFlash);
        }
        
        // --- 设置 XR 控制器相关 (监听扳机) ---
        function setupControllers() {
            // 获取左右手控制器射线空间 (用于瞄准线和射击源)
            controller1 = renderer.xr.getController(0);
            controller2 = renderer.xr.getController(1);
            
            // 添加控制器模型 (手柄可视化)
            const controllerModelFactory = new XRControllerModelFactory();
            
            const grip1 = renderer.xr.getControllerGrip(0);
            grip1.add(controllerModelFactory.createControllerModel(grip1));
            scene.add(grip1);
            
            const grip2 = renderer.xr.getControllerGrip(1);
            grip2.add(controllerModelFactory.createControllerModel(grip2));
            scene.add(grip2);
            
            // 为了视觉效果，在每个控制器射线上添加一条细线 (显示瞄准方向)
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00ccff });
            function addRayLine(controller) {
                const points = [];
                points.push(new THREE.Vector3(0, 0, 0));
                points.push(new THREE.Vector3(0, 0, -1.2));
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, lineMaterial);
                controller.add(line);
            }
            addRayLine(controller1);
            addRayLine(controller2);
            
            // 扳机事件: selectstart 对应扣动扳机开始
            const onSelectStart = (event) => {
                const now = Date.now();
                if (now - lastShootTime < SHOOT_COOLDOWN_MS) return;
                lastShootTime = now;
                
                // 判断是哪个控制器触发的
                const controller = event.target;
                let hit = false;
                if (controller === controller1 || controller === controller2) {
                    hit = performShootFromController(controller);
                }
                // 可选: 添加枪口闪光效果简单闪烁
                if (hit) {
                    // 增加轻微音感 (网页音频需要用户交互，这里不自动播放)
                }
            };
            
            controller1.addEventListener('selectstart', onSelectStart);
            controller2.addEventListener('selectstart', onSelectStart);
            
            // 存储控制器引用以便在动画循环中可能使用
            scene.add(controller1);
            scene.add(controller2);
            
            // 为了调试，也可以添加一些按钮映射，不过selectstart足够
        }
        
        // 气球漂浮动画更新函数
        function updateBalloonsAnimation(deltaTime) {
            const time = performance.now() / 1000;
            balloons.forEach(balloon => {
                if (!balloon) return;
                const data = balloon.userData;
                if (data) {
                    // 上下浮动
                    const newY = data.originalY + Math.sin(time * data.floatSpeed + data.floatOffset) * 0.05;
                    balloon.position.y = newY;
                    // 轻微自旋
                    balloon.rotation.y += data.rotationSpeed;
                    balloon.rotation.x = Math.sin(time * 0.8) * 0.05;
                    balloon.rotation.z = Math.cos(time * 0.5) * 0.03;
                }
            });
        }
        
        // --- 自动生成气球定时器 (使用setInterval，注意VR会话时也有效) ---
        let genInterval;
        function startBalloonGeneration() {
            if (genInterval) clearInterval(genInterval);
            genInterval = setInterval(() => {
                // 限制气球数量避免太多
                if (balloons.length < BALLOON_MAX_COUNT) {
                    spawnBalloon();
                }
            }, BALLOON_GEN_INTERVAL * 1000);
        }
        
        function stopBalloonGeneration() {
            if (genInterval) {
                clearInterval(genInterval);
                genInterval = null;
            }
        }
        
        // --- 渲染循环 (支持XR) ---
        let lastTimestamp = 0;
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTimestamp) / 1000);
            lastTimestamp = now;
            
            // 更新气球动画
            updateBalloonsAnimation(delta);
            
            // 粒子系统缓慢飘移
            particleSystem.rotation.y += 0.002;
            particleSystem.rotation.x += 0.001;
            
            // 根据是否在VR中调整一些视觉: 无特殊要求
            renderer.render(scene, camera);
        }
        
        renderer.setAnimationLoop(animate);
        
        // --- 监听XR会话开始和结束，重置一些状态 ---
        renderer.xr.addEventListener('sessionstart', () => {
            isVRActive = true;
            // 确保控制器设置 (若还没有)
            if (!controller1) {
                setupControllers();
            }
            // 可选: 重置分数? 可保留分数，不重置
            console.log('VR 模式已启动，手柄可用');
        });
        
        renderer.xr.addEventListener('sessionend', () => {
            isVRActive = false;
            console.log('退出 VR 模式');
        });
        
        // 初始化场景气球，先创建几个预先生成的气球，让游戏不空旷
        function initGame() {
            // 清理现有气球，生成一批初始气球
            clearAllBalloons();
            for (let i = 0; i < 8; i++) {
                spawnBalloon();
            }
            currentScore = 0;
            updateScoreUI();
            startBalloonGeneration();
        }
        
        // 启动游戏
        initGame();
        
        // 窗口大小适配
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 可选: 增加一个简单的浮动帮助球体提示位置 (非必须)
        const helpDot = new THREE.Mesh(
            new THREE.SphereGeometry(0.08, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0x442200 })
        );
        helpDot.position.set(0, 1, -1.5);
        scene.add(helpDot);
        
        // 控制台输出启动信息
        console.log('游戏已启动，支持 Pico 4 手柄扳机射击。');
    </script>
</body>
</html>
