<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico4 气球射击 VR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        #enter-vr {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 24px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 100;
        }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <button id="enter-vr">进入 VR 游戏</button>
    <div id="info" style="display:none;">
        扳机: 射击 | 摇杆: 移动 | A键: 退出
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        // ============ 全局变量 ============
        let scene, camera, renderer;
        let rightController, leftController;
        let rightGrip, leftGrip;
        let gun, gunTip;
        let rig;

        const bullets = [];
        const balloons = [];
        const scorePopups = [];
        let score = 0;
        let lastShootTime = 0;
        const SHOOT_COOLDOWN = 150; // ms

        // 输入状态
        const rightInput = { trigger: false, stickX: 0, stickY: 0, aPressed: false };
        const leftInput = { stickX: 0, stickY: 0 };

        // 移动速度
        const MOVE_SPEED = 2.0;
        const DEADZONE = 0.2;

        // 气球颜色
        const BALLOON_COLORS = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff, 0xff8800, 0xff0088];

        // ============ 初始化 ============
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 光照
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 玩家Rig（用于移动）
            rig = new THREE.Group();
            rig.add(camera);
            scene.add(rig);
            rig.position.set(0, 0, 5);

            // 地面
            createGround();

            // 手枪
            createGun();

            // 手柄
            setupControllers();

            // 初始气球
            spawnBalloons(15);

            // 事件
            document.getElementById('enter-vr').addEventListener('click', async () => {
                if (navigator.xr) {
                    const session = await navigator.xr.requestSession('immersive-vr', {
                        requiredFeatures: ['local-floor'],
                        optionalFeatures: ['hand-tracking']
                    });
                    renderer.xr.setSession(session);
                    document.getElementById('enter-vr').style.display = 'none';
                    document.getElementById('info').style.display = 'block';
                }
            });

            window.addEventListener('resize', onWindowResize);

            // 开始循环
            renderer.setAnimationLoop(animate);
        }

        // ============ 创建地面 ============
        function createGround() {
            // 主地面
            const groundGeo = new THREE.PlaneGeometry(100, 100);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x3a7a3a,
                roughness: 0.9
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // 网格辅助
            const grid = new THREE.GridHelper(100, 50, 0x555555, 0x777777);
            grid.position.y = 0.01;
            scene.add(grid);

            // 一些装饰性建筑/障碍物
            for (let i = 0; i < 10; i++) {
                const h = 1 + Math.random() * 3;
                const w = 0.5 + Math.random() * 1.5;
                const d = 0.5 + Math.random() * 1.5;
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(w, h, d),
                    new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                );
                const angle = Math.random() * Math.PI * 2;
                const dist = 5 + Math.random() * 20;
                box.position.set(Math.cos(angle) * dist, h/2, Math.sin(angle) * dist);
                scene.add(box);
            }
        }

        // ============ 创建枪 ============
        function createGun() {
            gun = new THREE.Group();

            // 枪身
            const bodyGeo = new THREE.BoxGeometry(0.04, 0.08, 0.25);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.z = -0.05;
            gun.add(body);

            // 枪管
            const barrelGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.15, 8);
            const barrelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 });
            const barrel = new THREE.Mesh(barrelGeo, barrelMat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.z = -0.18;
            gun.add(barrel);

            // 扳机护圈
            const guardGeo = new THREE.TorusGeometry(0.02, 0.005, 8, 16, Math.PI);
            const guard = new THREE.Mesh(guardGeo, bodyMat);
            guard.rotation.y = Math.PI / 2;
            guard.position.set(0, -0.02, 0.02);
            gun.add(guard);

            // 准星
            const sightGeo = new THREE.BoxGeometry(0.002, 0.02, 0.005);
            const sightMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
            const sight = new THREE.Mesh(sightGeo, sightMat);
            sight.position.set(0, 0.055, -0.14);
            gun.add(sight);

            // 枪口发射点（用于计算子弹方向）
            gunTip = new THREE.Object3D();
            gunTip.position.set(0, 0, -0.26);
            gun.add(gunTip);

            gun.position.set(0.1, -0.05, -0.15);
            gun.rotation.set(0, 0, -0.1);
        }

        // ============ 设置手柄 ============
        function setupControllers() {
            const controllerModelFactory = new XRControllerModelFactory();

            // 右手柄 (index 0通常是右手，但取决于设备)
            rightController = renderer.xr.getController(0);
            rightGrip = renderer.xr.getControllerGrip(0);
            const rightModel = controllerModelFactory.createControllerModel(rightGrip);
            rightGrip.add(rightModel);

            // 附加枪到右控制器
            rightGrip.add(gun);

            // 左手柄
            leftController = renderer.xr.getController(1);
            leftGrip = renderer.xr.getControllerGrip(1);
            const leftModel = controllerModelFactory.createControllerModel(leftGrip);
            leftGrip.add(leftModel);

            // 事件监听
            setupInputEvents();

            rig.add(rightGrip);
            rig.add(leftGrip);
        }

        // ============ 输入事件 ============
        function setupInputEvents() {
            // 右控制器事件
            rightController.addEventListener('selectstart', () => {
                rightInput.trigger = true;
                shoot();
            });
            rightController.addEventListener('selectend', () => {
                rightInput.trigger = false;
            });

            // 使用gamepad API轮询摇杆和按钮
        }

        // ============ 更新输入状态 ============
        function updateInput() {
            const session = renderer.xr.getSession();
            if (!session) return;

            for (const source of session.inputSources) {
                if (!source.gamepad) continue;

                const gp = source.gamepad;
                const handedness = source.handedness; // 'left', 'right', 'none'

                if (handedness === 'right' || (handedness === 'none' && source === session.inputSources[0])) {
                    // 右控制器: 摇杆轴 (通常axes[2], axes[3]是thumbstick)
                    if (gp.axes.length >= 4) {
                        rightInput.stickX = gp.axes[2] || gp.axes[0] || 0;
                        rightInput.stickY = gp.axes[3] || gp.axes[1] || 0;
                    } else if (gp.axes.length >= 2) {
                        rightInput.stickX = gp.axes[0];
                        rightInput.stickY = gp.axes[1];
                    }

                    // 按钮: A键通常是buttons[4]或buttons[3]
                    // 尝试检测A键
                    for (let i = 0; i < gp.buttons.length; i++) {
                        const btn = gp.buttons[i];
                        // 跳过扳机和握持键
                        if (i <= 1) continue;
                        if (btn.pressed && !rightInput.aPressed) {
                            // A键退出
                            if (i === 4 || i === 3) {
                                exitGame();
                            }
                        }
                        if (i === 4 || i === 3) {
                            rightInput.aPressed = btn.pressed;
                        }
                    }

                    // 扳机持续按住可连发
                    if (gp.buttons[0] && gp.buttons[0].pressed) {
                        const now = performance.now();
                        if (now - lastShootTime > SHOOT_COOLDOWN) {
                            shoot();
                        }
                    }
                } else if (handedness === 'left') {
                    if (gp.axes.length >= 4) {
                        leftInput.stickX = gp.axes[2] || gp.axes[0] || 0;
                        leftInput.stickY = gp.axes[3] || gp.axes[1] || 0;
                    } else if (gp.axes.length >= 2) {
                        leftInput.stickX = gp.axes[0];
                        leftInput.stickY = gp.axes[1];
                    }
                }
            }
        }

        // ============ 射击 ============
        function shoot() {
            const now = performance.now();
            if (now - lastShootTime < SHOOT_COOLDOWN) return;
            lastShootTime = now;

            // 获取枪口世界位置
            const tipWorldPos = new THREE.Vector3();
            gunTip.getWorldPosition(tipWorldPos);

            // 获取枪口方向
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(gun.getWorldQuaternion(new THREE.Quaternion()));
            direction.normalize();

            // 创建子弹
            const bulletGeo = new THREE.SphereGeometry(0.015, 8, 8);
            const bulletMat = new THREE.MeshStandardMaterial({
                color: 0xffff00,
                emissive: 0xffaa00,
                emissiveIntensity: 0.8
            });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            bullet.position.copy(tipWorldPos);
            scene.add(bullet);

            bullets.push({
                mesh: bullet,
                velocity: direction.multiplyScalar(30), // 子弹速度
                life: 2.0 // 2秒后销毁
            });

            // 枪口闪光
            createMuzzleFlash(tipWorldPos);

            // 后坐力动画
            gun.position.z += 0.02;
            setTimeout(() => { gun.position.z -= 0.02; }, 50);
        }

        // ============ 枪口闪光 ============
        function createMuzzleFlash(pos) {
            const flashGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const flashMat = new THREE.MeshBasicMaterial({
                color: 0xffffaa,
                transparent: true,
                opacity: 0.9
            });
            const flash = new THREE.Mesh(flashGeo, flashMat);
            flash.position.copy(pos);
            scene.add(flash);

            // 点光源
            const light = new THREE.PointLight(0xffaa00, 2, 3);
            light.position.copy(pos);
            scene.add(light);

            // 快速淡出
            let frame = 0;
            const fadeFlash = () => {
                frame++;
                flash.scale.multiplyScalar(1.3);
                flashMat.opacity -= 0.15;
                light.intensity *= 0.7;
                if (flashMat.opacity > 0 && frame < 10) {
                    requestAnimationFrame(fadeFlash);
                } else {
                    scene.remove(flash);
                    scene.remove(light);
                    flash.geometry.dispose();
                    flashMat.dispose();
                }
            };
            fadeFlash();
        }

        // ============ 生成气球 ============
        function spawnBalloons(count) {
            for (let i = 0; i < count; i++) {
                spawnSingleBalloon();
            }
        }

        function spawnSingleBalloon() {
            const radius = 0.15 + Math.random() * 0.15;
            const balloonGeo = new THREE.SphereGeometry(radius, 16, 16);
            // 稍微压扁成气球形状
            balloonGeo.scale(1, 1.2, 1);

            const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
            const balloonMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.2,
                metalness: 0.1
            });
            const balloon = new THREE.Mesh(balloonGeo, balloonMat);

            // 随机位置（在玩家周围）
            const angle = Math.random() * Math.PI * 2;
            const dist = 3 + Math.random() * 12;
            const x = Math.cos(angle) * dist;
            const z = Math.sin(angle) * dist;
            const y = 1 + Math.random() * 3;

            balloon.position.set(x, y, z);
            scene.add(balloon);

            // 绳子
            const stringGeo = new THREE.CylinderGeometry(0.002, 0.002, 1, 4);
            const stringMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const string = new THREE.Mesh(stringGeo, stringMat);
            string.position.y = -radius * 1.2 - 0.5;
            balloon.add(string);

            balloons.push({
                mesh: balloon,
                radius: radius,
                baseY: y,
                floatOffset: Math.random() * Math.PI * 2,
                floatSpeed: 0.5 + Math.random() * 1.5,
                points: Math.floor((0.3 - radius) * 100) + 10 // 越小的气球分数越高
            });
        }

        // ============ 创建得分弹出UI ============
        function createScorePopup(position, points) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            // 绘制背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.roundRect(0, 0, 256, 128, 20);
            ctx.fill();

            // 绘制文字
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`+${points}`, 128, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                opacity: 1
            });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.copy(position);
            sprite.position.y += 0.3;
            sprite.scale.set(0.6, 0.3, 1);
            scene.add(sprite);

            scorePopups.push({
                sprite: sprite,
                life: 1.5, // 显示1.5秒
                maxLife: 1.5,
                velocity: new THREE.Vector3(0, 0.5, 0)
            });
        }

        // ============ 气球爆炸效果 ============
        function createExplosion(position, color) {
            const particleCount = 15;
            for (let i = 0; i < particleCount; i++) {
                const geo = new THREE.PlaneGeometry(0.03, 0.03);
                const mat = new THREE.MeshBasicMaterial({
                    color: color,
                    side: THREE.DoubleSide,
                    transparent: true
                });
                const particle = new THREE.Mesh(geo, mat);
                particle.position.copy(position);

                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const speed = 2 + Math.random() * 4;
                const velocity = new THREE.Vector3(
                    Math.sin(phi) * Math.cos(theta) * speed,
                    Math.sin(phi) * Math.sin(theta) * speed,
                    Math.cos(phi) * speed
                );

                scene.add(particle);

                // 粒子动画
                let life = 0.5;
                const updateParticle = () => {
                    const dt = 0.016;
                    particle.position.addScaledVector(velocity, dt);
                    velocity.y -= 9.8 * dt; // 重力
                    life -= dt;
                    mat.opacity = life * 2;
                    particle.rotation.z += dt * 5;

                    if (life > 0) {
                        requestAnimationFrame(updateParticle);
                    } else {
                        scene.remove(particle);
                        geo.dispose();
                        mat.dispose();
                    }
                };
                updateParticle();
            }
        }

        // ============ 退出游戏 ============
        function exitGame() {
            const session = renderer.xr.getSession();
            if (session) {
                session.end();
            }
            document.getElementById('enter-vr').style.display = 'block';
            document.getElementById('info').style.display = 'none';
        }

        // ============ 碰撞检测 ============
        function checkCollisions(dt) {
            for (let bi = bullets.length - 1; bi >= 0; bi--) {
                const bullet = bullets[bi];
                let hit = false;

                for (let bali = balloons.length - 1; bali >= 0; bali--) {
                    const balloon = balloons[bali];
                    const dist = bullet.mesh.position.distanceTo(balloon.mesh.position);

                    if (dist < balloon.radius + 0.02) {
                        // 命中!
                        hit = true;

                        // 得分
                        score += balloon.points;

                        // 爆炸效果
                        createExplosion(balloon.mesh.position, balloon.mesh.material.color);

                        // 得分UI
                        createScorePopup(balloon.mesh.position, balloon.points);

                        // 移除气球
                        scene.remove(balloon.mesh);
                        balloon.mesh.geometry.dispose();
                        balloon.mesh.material.dispose();
                        balloons.splice(bali, 1);

                        // 补充新气球
                        setTimeout(() => spawnSingleBalloon(), 1000 + Math.random() * 2000);

                        break;
                    }
                }

                if (hit) {
                    scene.remove(bullet.mesh);
                    bullet.mesh.geometry.dispose();
                    bullet.mesh.material.dispose();
                    bullets.splice(bi, 1);
                }
            }
        }

        // ============ 更新移动 ============
        function updateMovement(dt) {
            // 使用右摇杆移动（向前/向后/向左/向右）
            // 或使用左摇杆，取决于哪个有输入
            let moveX = rightInput.stickX;
            let moveZ = -rightInput.stickY; // Y轴向上是负

            // 如果右摇杆没动，尝试左摇杆
            if (Math.abs(moveX) < DEADZONE && Math.abs(moveZ) < DEADZONE) {
                moveX = leftInput.stickX;
                moveZ = -leftInput.stickY;
            }

            if (Math.abs(moveX) > DEADZONE || Math.abs(moveZ) > DEADZONE) {
                // 获取头部朝向（只取Y轴旋转）
                const headDir = new THREE.Vector3(0, 0, -1);
                headDir.applyQuaternion(camera.quaternion);
                headDir.y = 0;
                headDir.normalize();

                const headRight = new THREE.Vector3(1, 0, 0);
                headRight.applyQuaternion(camera.quaternion);
                headRight.y = 0;
                headRight.normalize();

                const moveDir = new THREE.Vector3();
                moveDir.addScaledVector(headDir, moveZ);
                moveDir.addScaledVector(headRight, moveX);
                moveDir.normalize();

                rig.position.addScaledVector(moveDir, MOVE_SPEED * dt);
            }
        }

        // ============ 主循环 ============
        function animate() {
            const dt = 0.016; // 假设60fps

            // 更新输入
            updateInput();

            // 更新子弹
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.mesh.position.addScaledVector(bullet.velocity, dt);
                bullet.life -= dt;

                if (bullet.life <= 0) {
                    scene.remove(bullet.mesh);
                    bullet.mesh.geometry.dispose();
                    bullet.mesh.material.dispose();
                    bullets.splice(i, 1);
                }
            }

            // 更新气球浮动
            const time = performance.now() * 0.001;
            for (const balloon of balloons) {
                balloon.mesh.position.y = balloon.baseY + Math.sin(time * balloon.floatSpeed + balloon.floatOffset) * 0.3;
                balloon.mesh.rotation.y += dt * 0.5;
            }

            // 碰撞检测
            checkCollisions(dt);

            // 更新得分弹出UI
            for (let i = scorePopups.length - 1; i >= 0; i--) {
                const popup = scorePopups[i];
                popup.life -= dt;
                popup.sprite.position.addScaledVector(popup.velocity, dt);
                popup.sprite.material.opacity = popup.life / popup.maxLife;

                if (popup.life <= 0) {
                    scene.remove(popup.sprite);
                    popup.sprite.material.map.dispose();
                    popup.sprite.material.dispose();
                    scorePopups.splice(i, 1);
                }
            }

            // 更新移动
            updateMovement(dt);

            // 保持气球数量
            if (balloons.length < 10) {
                spawnSingleBalloon();
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 启动
        init();
    </script>
</body>
</html>
