<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎈🎉 VR 气球派对</title>
    <style>
        :root { --bg: #1a0a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        canvas { display: block; }
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: flex-start;
            align-items: center; padding-top: 24px;
        }
        #score-panel {
            background: linear-gradient(135deg, rgba(255,50,120,0.3), rgba(255,170,0,0.25));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 3px solid rgba(255,215,0,0.6); border-radius: 28px;
            padding: 16px 40px; color: #fff; text-align: center;
            pointer-events: auto; transition: all 0.3s ease;
            box-shadow:
                0 0 30px rgba(255,50,150,0.4),
                0 8px 32px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255,255,255,0.08);
        }
        #score-panel .label {
            font-size: 14px; text-transform: uppercase; letter-spacing: 5px;
            opacity: 0.9; font-weight: 600;
            background: linear-gradient(90deg, #ff6eb4, #ffd700, #ff6eb4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #score-panel .score {
            font-size: 60px; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, #fff176, #ffb300, #ff6d00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,200,0,0.7));
            animation: scoreGlow 2s ease-in-out infinite alternate;
        }
        @keyframes scoreGlow { from{filter:drop-shadow(0 0 10px rgba(255,200,0,0.5));} to{filter:drop-shadow(0 0 25px rgba(255,200,0,0.9));} }
        #score-panel .combo {
            font-size: 18px; color: #ffdd57; opacity: 0; transition: opacity 0.2s;
            min-height: 26px; font-weight: 700; letter-spacing: 2px;
        }
        #score-panel .combo.active {
            opacity: 1; animation: comboBounce 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
        }
        @keyframes comboBounce { 0%,100%{ transform: scale(1) translateY(0); } 50%{ transform: scale(1.4) translateY(-5px); } }
        #vr-entry {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 20; pointer-events: auto;
        }
        #enter-vr-btn {
            display: block; padding: 18px 56px; font-size: 22px; font-weight: 800;
            letter-spacing: 3px; color: #fff;
            background: linear-gradient(135deg, #ff2d7a, #ff6b35, #ffd700);
            background-size: 200% 200%;
            animation: btnShimmer 3s ease infinite;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255,45,122,0.6), inset 0 0 20px rgba(255,255,255,0.15);
            text-transform: uppercase; outline: none;
        }
        @keyframes btnShimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        #enter-vr-btn:hover {
            box-shadow: 0 0 60px rgba(255,107,53,0.9), inset 0 0 30px rgba(255,255,255,0.25);
            transform: translateY(-4px) scale(1.05);
        }
        #enter-vr-btn:active { transform: scale(0.95); }
        #enter-vr-btn:disabled { background: #444; box-shadow: none; cursor: not-allowed; opacity: 0.5; animation: none; }
        #vr-hints {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            z-index: 15; pointer-events: none; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
        }
        .hint-badge {
            background: linear-gradient(135deg, rgba(255,50,150,0.25), rgba(255,180,0,0.2));
            border: 2px solid rgba(255,215,0,0.4); border-radius: 24px;
            padding: 10px 22px; color: #fff; font-size: 14px; font-weight: 600;
            letter-spacing: 1px; backdrop-filter: blur(8px); white-space: nowrap;
            box-shadow: 0 0 15px rgba(255,150,0,0.2);
        }
        .hint-badge .key { font-weight: 800; color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.6); }
        #status-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 30; color: #fff; font-size: 20px; font-weight: 700; text-align: center;
            pointer-events: none; background: rgba(0,0,0,0.85); padding: 24px 36px;
            border-radius: 20px; border: 2px solid rgba(255,215,0,0.5); display: none;
        }
        #status-msg.error { background: rgba(180,20,60,0.9); border-color: #ff3366; display: block; }
        #status-msg.info { background: rgba(30,20,80,0.92); border-color: #aa66ff; display: block; }

        /* 浮动得分动画 */
        .float-score {
            position: fixed; pointer-events: none; z-index: 50;
            font-size: 32px; font-weight: 900; color: #ffd700;
            text-shadow: 0 0 10px rgba(255,200,0,0.8), 0 2px 4px rgba(0,0,0,0.5);
            animation: floatUp 1s ease-out forwards;
        }
        .float-score.golden {
            font-size: 42px; color: #fff;
            text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00, 0 2px 4px rgba(0,0,0,0.5);
            animation: floatUpGold 1.2s ease-out forwards;
        }
        @keyframes floatUp {
            0%{opacity:1;transform:translateY(0) scale(0.5);}
            100%{opacity:0;transform:translateY(-80px) scale(1.3);}
        }
        @keyframes floatUpGold {
            0%{opacity:1;transform:translateY(0) scale(0.3) rotate(-10deg);}
            50%{transform:translateY(-40px) scale(1.5) rotate(5deg);}
            100%{opacity:0;transform:translateY(-100px) scale(1) rotate(-5deg);}
        }
    </style>
</head>
<body>
    <div id="hud">
        <div id="score-panel">
            <div class="label">🎯 得 分</div>
            <div class="score" id="score-value">0</div>
            <div class="combo" id="combo-text"></div>
        </div>
    </div>
    <div id="vr-entry"><button id="enter-vr-btn">🎈 进入VR气球派对！</button></div>
    <div id="vr-hints">
        <span class="hint-badge">🔫 <span class="key">右手扳机</span> 自动步枪</span>
        <span class="hint-badge">🔫 <span class="key">左手扳机</span> 手枪单发</span>
        <span class="hint-badge">🕹️ <span class="key">摇杆</span> 移动</span>
        <span class="hint-badge">🅰️ <span class="key">A键</span> 退出</span>
    </div>
    <div id="status-msg"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // DOM 元素
        const scoreValueEl = document.getElementById('score-value');
        const comboTextEl = document.getElementById('combo-text');
        const enterVRBtn = document.getElementById('enter-vr-btn');
        const statusMsgEl = document.getElementById('status-msg');
        const vrHintsEl = document.getElementById('vr-hints');
        const vrEntryEl = document.getElementById('vr-entry');

        // 游戏状态
        let score = 0, comboCount = 0, comboTimer;
        const COMBO_TIMEOUT = 1500, BALLOON_POINTS = 10, GOLDEN_POINTS = 30;
        const MAX_BALLOONS = 20, SPAWN_INTERVAL = 1800;
        const SPAWN_RADIUS_MIN = 4, SPAWN_RADIUS_MAX = 14;
        const SPAWN_HEIGHT_MIN = 1.2, SPAWN_HEIGHT_MAX = 4.5;
        const MOVE_SPEED = 3.5, RAY_MAX_DISTANCE = 20, GOLDEN_CHANCE = 0.12;
        const RIFLE_COOLDOWN = 120;
        const DEADZONE = 0.2;

        // 摇杆输入状态
        const rightInput = { stickX: 0, stickY: 0, trigger: false };
        const leftInput  = { stickX: 0, stickY: 0, trigger: false };

        // ════════════════════════════════════
        //  Three.js 初始化
        // ════════════════════════════════════
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = false;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();

        // ── 渐变天空（程序化天空盒）──
        const skyGeo = new THREE.SphereGeometry(90, 32, 32);
        const skyMat = new THREE.ShaderMaterial({
            side: THREE.BackSide,
            uniforms: {
                uTopColor:   { value: new THREE.Color(0xff6eb4) },   // 粉色顶
                uMidColor:   { value: new THREE.Color(0x64b5f6) },   // 蓝中
                uBottomColor:{ value: new THREE.Color(0xffb347) },   // 橙底
                uOffset:     { value: 0.4 },
                uExponent:   { value: 0.6 },
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPos = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPos.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }`,
            fragmentShader: `
                uniform vec3 uTopColor, uMidColor, uBottomColor;
                uniform float uOffset, uExponent;
                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize(vWorldPosition).y + uOffset;
                    float t = pow(max(h, 0.0), uExponent);
                    vec3 col = mix(uBottomColor, uMidColor, smoothstep(0.0, 0.5, t));
                    col = mix(col, uTopColor, smoothstep(0.5, 1.0, t));
                    gl_FragColor = vec4(col, 1.0);
                }`
        });
        scene.add(new THREE.Mesh(skyGeo, skyMat));
        scene.fog = new THREE.FogExp2(0xff88cc, 0.012);

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 0);
        const dolly = new THREE.Group();
        dolly.add(camera);
        scene.add(dolly);

        // ── 光照（狂欢氛围）──
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sunLight = new THREE.DirectionalLight(0xfff0e0, 2.0);
        sunLight.position.set(15, 25, 10);
        scene.add(sunLight);
        scene.add(new THREE.HemisphereLight(0xff88cc, 0x88ff88, 0.8));

        // 彩虹点光源（围绕场景旋转）
        const partyLights = [];
        const rainbowColors = [0xff3366, 0xff9933, 0xffff33, 0x33ff66, 0x3399ff, 0xcc33ff];
        for (let i = 0; i < 6; i++) {
            const light = new THREE.PointLight(rainbowColors[i], 2, 25);
            const angle = (i / 6) * Math.PI * 2;
            light.position.set(Math.cos(angle) * 12, 4 + Math.random() * 4, Math.sin(angle) * 12);
            scene.add(light);
            partyLights.push({ light, angle, speed: 0.3 + Math.random() * 0.4, radius: 10 + Math.random() * 6, yOffset: 3 + Math.random() * 4 });
        }

        // ════════════════════════════════════
        //  地面 — 彩虹棋盘格
        // ════════════════════════════════════
        function createPartyGround() {
            const groundGroup = new THREE.Group();
            // 主地面
            const groundMat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor1: { value: new THREE.Color(0xff6eb4) },
                    uColor2: { value: new THREE.Color(0x64d2ff) },
                    uScale: { value: 3.0 },
                    uTime: { value: 0 },
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }`,
                fragmentShader: `
                    uniform vec3 uColor1, uColor2;
                    uniform float uScale, uTime;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv * uScale;
                        float checker = mod(floor(uv.x) + floor(uv.y), 2.0);
                        vec3 baseCol = mix(uColor1, uColor2, checker);
                        // 边缘渐暗
                        float dist = length(vUv - 0.5) * 1.8;
                        float edge = 1.0 - smoothstep(0.5, 1.0, dist);
                        gl_FragColor = vec4(baseCol * (0.6 + 0.4 * edge), 1.0);
                    }`
            });
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80, 1, 1), groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.01;
            groundGroup.add(ground);
            ground.userData.material = groundMat;

            // 彩虹圆环装饰
            for (let ring = 0; ring < 3; ring++) {
                const rRadius = 6 + ring * 8;
                const ringGeo = new THREE.RingGeometry(rRadius - 0.15, rRadius + 0.15, 64);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: rainbowColors[ring % rainbowColors.length],
                    transparent: true, opacity: 0.35,
                    side: THREE.DoubleSide
                });
                const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.rotation.x = -Math.PI / 2;
                ringMesh.position.y = 0.005;
                groundGroup.add(ringMesh);
            }
            return groundGroup;
        }
        const groundScene = createPartyGround();
        scene.add(groundScene);

        // ════════════════════════════════════
        //  派对装饰物
        // ════════════════════════════════════

        // 漂浮气球串（环境装饰）
        const decorGroup = new THREE.Group(); scene.add(decorGroup);
        function createDecorBalloonString(x, z, colors) {
            const group = new THREE.Group();
            let yPos = 0;
            for (const c of colors) {
                const b = new THREE.Mesh(
                    new THREE.SphereGeometry(0.25, 12, 10),
                    new THREE.MeshStandardMaterial({ color: c, roughness: 0.3, emissive: c, emissiveIntensity: 0.2 })
                );
                b.scale.y = 1.3;
                b.position.set((Math.random()-0.5)*0.3, yPos, (Math.random()-0.5)*0.3);
                group.add(b);
                yPos += 0.6 + Math.random() * 0.3;
            }
            group.position.set(x, 3 + Math.random() * 4, z);
            group.userData.baseY = group.position.y;
            group.userData.phase = Math.random() * Math.PI * 2;
            return group;
        }
        for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2, r = 15 + Math.random() * 18;
            const x = Math.cos(angle) * r, z = Math.sin(angle) * r;
            if (Math.abs(x) < 4 && Math.abs(z) < 4) continue;
            const cols = [];
            for (let j = 0; j < 4 + Math.floor(Math.random()*4); j++)
                cols.push(balloonColors[Math.floor(Math.random()*balloonColors.length)]);
            decorGroup.add(createDecorBalloonString(x, z, cols));
        }

        // 彩色柱子（带霓虹发光）
        const pillarColors = [0xff3366, 0xff9933, 0xffee33, 0x33ff77, 0x33bbff, 0xcc33ff];
        for (let i = 0; i < 10; i++) {
            const angle = (i / 10) * Math.PI * 2 + Math.random() * 0.2, radius = 10 + Math.random() * 18;
            const px = Math.cos(angle) * radius, pz = Math.sin(angle) * radius;
            const pCol = pillarColors[i % pillarColors.length];

            const pillar = new THREE.Group();
            // 柱身
            const shaft = new THREE.Mesh(
                new THREE.CylinderGeometry(0.35, 0.45, 4, 12),
                new THREE.MeshStandardMaterial({ color: pCol, roughness: 0.2, metalness: 0.6, emissive: pCol, emissiveIntensity: 0.3 })
            );
            shaft.position.y = 2; pillar.add(shaft);
            // 球形顶部
            const top = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 12, 10),
                new THREE.MeshStandardMaterial({ color: pCol, roughness: 0.15, metalness: 0.8, emissive: pCol, emissiveIntensity: 0.5 })
            );
            top.position.y = 4.4; pillar.add(top);
            // 发光环
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.38, 0.03, 8, 24),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 })
            );
            ring.position.y = 3.5; ring.rotation.x = Math.PI/2; pillar.add(ring);

            pillar.position.set(px, 0, pz);
            scene.add(pillar);
        }

        // 星星粒子（背景闪烁）
        const starsGeo = new THREE.BufferGeometry();
        const starPositions = [], starColors = [];
        for (let i = 0; i < 300; i++) {
            starPositions.push((Math.random()-0.5)*70, Math.random()*20+2, (Math.random()-0.5)*70);
            const sc = new THREE.Color(rainbowColors[Math.floor(Math.random()*rainbowColors.length)]);
            starColors.push(sc.r, sc.g, sc.b);
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
        starsGeo.setAttribute('color', new THREE.Float32BufferAttribute(starColors, 3));
        const starsMat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // ════════════════════════════════════
        //  气球系统
        // ════════════════════════════════════
        const balloons = [], balloonGroup = new THREE.Group(); scene.add(balloonGroup);
        const balloonColors = [0xff3b3b, 0xff6b35, 0xffc635, 0x4caf50, 0x2196f3, 0x9c27b0, 0xe91e63, 0x00bcd4, 0xff9800, 0x8bc34a];
        const goldenColor = 0xffd700;

        function createBalloonMesh(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 24, 20),
                new THREE.MeshStandardMaterial({ color, roughness: 0.2, metalness: 0.05, emissive: color, emissiveIntensity: 0.25 })
            );
            body.name = 'balloonBody'; g.add(body);
            g.add(new THREE.Mesh(
                new THREE.ConeGeometry(0.06, 0.14, 8, 8),
                new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.6), roughness: 0.5 })
            ).translateY(-0.38));
            g.add(new THREE.Mesh(
                new THREE.CylinderGeometry(0.015, 0.025, 0.22, 6),
                new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.6 })
            ).translateY(-0.5));
            // 高光
            const hl = new THREE.Mesh(
                new THREE.SphereGeometry(0.09, 8, 6),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 })
            );
            hl.position.set(0.13, 0.17, 0.13); g.add(hl);
            // 光晕
            const glow = new THREE.Mesh(
                new THREE.SphereGeometry(0.45, 16, 12),
                new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.12, side: THREE.BackSide })
            );
            g.add(glow);
            g.userData = { bodyMesh: body, bodyMaterial: body.material };
            return g;
        }

        function spawnBalloon(forceGolden = false) {
            if (balloons.length >= MAX_BALLOONS) removeOldestBalloon();
            const isGolden = forceGolden || Math.random() < GOLDEN_CHANCE;
            const color = isGolden ? goldenColor : balloonColors[Math.floor(Math.random() * balloonColors.length)];
            const b = createBalloonMesh(color);
            b.userData.isGolden = isGolden; b.userData.color = color;
            b.userData.baseY = SPAWN_HEIGHT_MIN + Math.random() * (SPAWN_HEIGHT_MAX - SPAWN_HEIGHT_MIN);
            b.userData.floatSpeed = 0.5 + Math.random() * 1.8;
            b.userData.floatAmp = 0.15 + Math.random() * 0.6;
            b.userData.floatPhase = Math.random() * Math.PI * 2;
            b.userData.driftX = (Math.random() - 0.5) * 0.4;
            b.userData.driftZ = (Math.random() - 0.5) * 0.4;
            b.userData.points = isGolden ? GOLDEN_POINTS : BALLOON_POINTS;

            const pos = dolly.position;
            const angle = Math.random() * Math.PI * 2;
            const r = SPAWN_RADIUS_MIN + Math.random() * (SPAWN_RADIUS_MAX - SPAWN_RADIUS_MIN);
            b.position.set(pos.x + Math.cos(angle) * r, b.userData.baseY, pos.z + Math.sin(angle) * r);
            b.userData.spawnPos = b.position.clone();

            if (isGolden) {
                b.userData.bodyMaterial.emissive = new THREE.Color(goldenColor);
                b.userData.bodyMaterial.emissiveIntensity = 0.7;
                b.scale.setScalar(0.9);
                // 金色气球额外光晕
                const goldGlow = new THREE.Mesh(
                    new THREE.SphereGeometry(0.6, 16, 12),
                    new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.15, side: THREE.BackSide })
                );
                b.add(goldGlow);
            }
            balloonGroup.add(b); balloons.push(b);
            return b;
        }

        function removeOldestBalloon() {
            if (!balloons.length) return;
            const old = balloons.shift();
            const start = performance.now(), duration = 800, startPos = old.position.clone();
            const rise = 3 + Math.random() * 4, dx = (Math.random() - 0.5) * 2, dz = (Math.random() - 0.5) * 2;
            function anim(t) {
                const e = Math.min((t - start) / duration, 1);
                old.position.set(startPos.x + dx*e*e, startPos.y + rise*e*e, startPos.z + dz*e*e);
                old.scale.setScalar(1 - e*0.7);
                old.userData.bodyMaterial.opacity = 1-e; old.userData.bodyMaterial.transparent = true;
                if (e<1) requestAnimationFrame(anim); else disposeBalloon(old);
            }
            requestAnimationFrame(anim);
        }

        function disposeBalloon(b) {
            balloonGroup.remove(b);
            b.traverse(c => {
                if(c.geometry && c.geometry !== b.userData.bodyMesh?.geometry) c.geometry.dispose();
                if(c.material) Array.isArray(c.material)?c.material.forEach(m=>m.dispose()):c.material.dispose();
            });
            b.userData.bodyMaterial?.dispose(); b.userData.bodyMesh?.geometry?.dispose();
        }

        // ════════════════════════════════════
        //  碎片系统（升级：更多碎片+旋转）
        // ════════════════════════════════════
        const debris = [], debrisGroup = new THREE.Group(); scene.add(debrisGroup);
        function createDebris(position, color, isGolden = false) {
            const count = isGolden ? 22 : 14;
            const baseColor = new THREE.Color(color);
            for (let i = 0; i < count; i++) {
                const size = 0.03 + Math.random() * 0.07;
                // 随机形状：立方体或三角
                const geom = Math.random() > 0.5
                    ? new THREE.BoxGeometry(size, size, size)
                    : new THREE.TetrahedronGeometry(size);
                const mat = new THREE.MeshStandardMaterial({
                    color: baseColor.clone().multiplyScalar(0.7 + Math.random()*0.5),
                    roughness: 0.6,
                    emissive: isGolden ? goldenColor : color,
                    emissiveIntensity: isGolden ? 0.4 : 0.15,
                    transparent: true, opacity: 1
                });
                const piece = new THREE.Mesh(geom, mat);
                piece.position.copy(position);
                piece.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                const dir = new THREE.Vector3((Math.random()-0.5)*2, Math.random()*2+0.5, (Math.random()-0.5)*2).normalize();
                const speed = 2 + Math.random() * 5;
                piece.userData = {
                    velocity: dir.multiplyScalar(speed),
                    rotSpeed: new THREE.Vector3((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-0.5)*15),
                    life: 5, grounded: false, material: mat
                };
                debrisGroup.add(piece); debris.push(piece);
            }
            // 金色气球额外：星星爆发
            if (isGolden) {
                for (let i = 0; i < 12; i++) {
                    const sg = new THREE.OctahedronGeometry(0.06);
                    const sm = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 1 });
                    const star = new THREE.Mesh(sg, sm);
                    star.position.copy(position);
                    const sd = new THREE.Vector3((Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3).normalize().multiplyScalar(3+Math.random()*4);
                    star.userData = { velocity: sd, rotSpeed: new THREE.Vector3((Math.random()-0.5)*20,(Math.random()-0.5)*20,(Math.random()-0.5)*20), life: 3, grounded: false, material: sm, isStar: true };
                    debrisGroup.add(star); debris.push(star);
                }
            }
        }

        function updateDebris(dt) {
            for (let i = debris.length-1; i>=0; i--) {
                const d = debris[i], ud = d.userData;
                if (!ud.grounded) {
                    d.position.x += ud.velocity.x*dt;
                    d.position.y += ud.velocity.y*dt;
                    d.position.z += ud.velocity.z*dt;
                    d.rotation.x += ud.rotSpeed.x * dt;
                    d.rotation.y += ud.rotSpeed.y * dt;
                    d.rotation.z += ud.rotSpeed.z * dt;
                    ud.velocity.y -= 9.8 * dt;
                    if (d.position.y <= 0.01) { d.position.y=0.01; ud.grounded=true; ud.velocity.set(0,0,0); }
                } else {
                    ud.life -= dt;
                    if (ud.life<=0 || (ud.life<0.5 && ud.material.opacity<=0.05)) {
                        ud.material.dispose(); d.geometry.dispose(); debrisGroup.remove(d); debris.splice(i,1);
                    } else {
                        const fadeTime=0.5, remaining=Math.max(0, ud.life-4.5);
                        ud.material.opacity = Math.min(1, remaining/fadeTime);
                        // 落地后继续缓慢旋转
                        d.rotation.y += ud.rotSpeed.y * dt * 0.3;
                    }
                }
            }
        }

        let audioCtx;
        function initAudio() { if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}} if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); }
        function playPopSound(isGolden=false) {
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime, dur = isGolden?0.35:0.18;
                const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*dur), audioCtx.sampleRate);
                const data = buf.getChannelData(0);
                for(let i=0;i<buf.length;i++){
                    const t=i/audioCtx.sampleRate, env=Math.exp(-t*(isGolden?14:22));
                    data[i]=(Math.random()*2-1)*env*0.75 + Math.sin(t*(isGolden?900:550)*Math.PI*2)*env*0.45
                          + Math.sin(t*(isGolden?1400:800)*Math.PI*2)*env*0.25; // 双频更丰富
                }
                const src=audioCtx.createBufferSource(); src.buffer=buf;
                const gain=audioCtx.createGain(); gain.gain.setValueAtTime(isGolden?0.75:0.48,now); gain.gain.exponentialRampToValueAtTime(0.001,now+dur);
                src.connect(gain); gain.connect(audioCtx.destination); src.start(now); src.stop(now+dur);
            } catch(e){}
        }
        function playShootSound() {
            if (!audioCtx) return;
            try {
                const now=audioCtx.currentTime, dur=0.08;
                const buf=audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*dur),audioCtx.sampleRate);
                const data=buf.getChannelData(0);
                for(let i=0;i<buf.length;i++){
                    const t=i/audioCtx.sampleRate;
                    data[i]=(Math.random()*2-1)*Math.exp(-t*55)*0.8 + Math.sin(t*300*Math.PI*2)*Math.exp(-t*80)*0.3;
                }
                const src=audioCtx.createBufferSource();src.buffer=buf;
                const gain=audioCtx.createGain();gain.gain.setValueAtTime(0.3,now);gain.gain.exponentialRampToValueAtTime(0.001,now+dur);
                src.connect(gain);gain.connect(audioCtx.destination);src.start(now);src.stop(now+dur);
            } catch(e){}

        }

        // ── 后坐力动画 ──
        function applyRecoil(gunMesh, strength=1) {
            gunMesh.userData.recoilStrength = strength;
            gunMesh.userData.recoilTime = 0;
        }
        function updateRecoils(dt) {
            [rightController, leftController].forEach(ctrl => {
                if (!ctrl?.userData.gunModel) return;
                const gun = ctrl.userData.gunModel;
                if (gun.userData.recoilStrength !== undefined && gun.userData.recoilTime !== undefined) {
                    const totalDur = 0.1;
                    gun.userData.recoilTime += dt;
                    const t = gun.userData.recoilTime / totalDur;
                    if (t >= 1) {
                        gun.position.set(0, 0, 0);
                        delete gun.userData.recoilStrength;
                        delete gun.userData.recoilTime;
                    } else {
                        // 快回慢退
                        const recoilZ = gun.userData.recoilStrength * 0.04 * Math.max(0, 1-t*4);
                        const recoilRot = gun.userData.recoilStrength * 0.05 * Math.max(0, 1-t*3);
                        gun.position.set(0, 0, recoilZ);
                        gun.rotation.x = recoilRot;
                    }
                }
            });

            // 枪口闪光衰减
            [leftController, rightController].forEach(ctrl => {
                if (!ctrl?.userData.muzzleFlash) return;
                const mf = ctrl.userData.muzzleFlash;
                if (mf.userData.active) {
                    mf.userData.timer -= dt;
                    if (mf.userData.timer <= 0) {
                        mf.userData.active = false;
                        mf.children.forEach(c => { c.material.opacity = 0; });
                    } else {
                        const fade = mf.userData.timer / 0.06;
                        mf.children.forEach(c => { c.material.opacity = fade; });
                        mf.scale.setScalar(1 + (1-fade) * 2);
                    }
                }
            });
        }
        function triggerMuzzleFlash(controller) {
            if (!controller?.userData.muzzleFlash) return;
            const mf = controller.userData.muzzleFlash;
            mf.userData.active = true;
            mf.userData.timer = 0.06;
            mf.children.forEach(c => { c.material.opacity = 1; });
            mf.scale.setScalar(1);
        }

        function roundRect(ctx,x,y,w,h,r){
            ctx.beginPath();
            ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
            ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
            ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x+h,y+h,x,y+h-r);
            ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
            ctx.closePath();
        }

            bullet.add(new THREE.Mesh(geom, mat));

        // ── 开枪函数 ──
        let leftTriggerWas = false;
        function shoot(controller) {
            try {
                const {origin, direction} = getControllerRay(controller);
                if (!Number.isFinite(origin.x) || !Number.isFinite(direction.x)) return;
                const isRight = (controller === rightController);
                spawnBullet(origin, direction, isRight);
                playShootSound();
                // 触发枪口闪光和后坐力
                triggerMuzzleFlash(controller);
                if (controller.userData.gunModel) {
                    applyRecoil(controller.userData.gunModel, isRight ? 1 : 0.7);
                }
            } catch(e) { console.error('shoot error:', e); }
        }

        function updateBullets(dt) {
            const _bp = new THREE.Vector3(), _balp = new THREE.Vector3();
            for (let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i], ud = b.userData;
                ud.life -= dt;
                b.position.x += ud.velocity.x * dt;
                b.position.y += ud.velocity.y * dt;
                b.position.z += ud.velocity.z * dt;
                // 让子弹朝向运动方向
                b.lookAt(b.position.clone().add(ud.velocity));

                let hit = false;
                if(ud.life > 0 && balloons.length > 0) {
                    _bp.copy(b.position);
                    for(let j=balloons.length-1; j>=0; j--) {
                        const bal = balloons[j];
                        _balp.copy(bal.position);
                        if(_bp.distanceTo(_balp)<0.42){hit=true; destroyBalloon(bal,_balp.clone()); break;}
                    }
                }
                if(hit||ud.life<=0||Math.abs(b.position.y)>50||Math.abs(b.position.x)>60||Math.abs(b.position.z)>60) {
                    b.traverse(c=>{if(c.geometry)c.geometry.dispose(); if(c.material)c.material.dispose()});
                    bulletGroup.remove(b); bullets.splice(i,1);
                }
            }
        }

        // 射线检测
        const raycaster = new THREE.Raycaster(); raycaster.far = RAY_MAX_DISTANCE;

        function getGunMuzzleWorld(controller) {
            const muzzleLocal = new THREE.Vector3(0, 0.015, -0.12);
            return muzzleLocal.clone().applyMatrix4(controller.matrixWorld);
        }
        function getControllerRay(controller) {
            const origin = getGunMuzzleWorld(controller);
            const quat = controller.getWorldQuaternion(new THREE.Quaternion());
            const direction = new THREE.Vector3(0,0,-1).applyQuaternion(quat);
            return { origin, direction };
        }
        function checkBalloonHit(controller) {
            const {origin, direction}=getControllerRay(controller);
            raycaster.set(origin,direction);
            const targets=balloons.map(b=>b.userData.bodyMesh).filter(Boolean);
            const hits=raycaster.intersectObjects(targets,false);
            if(hits.length){
                for(const b of balloons)
                    if(b.userData.bodyMesh===hits[0].object) return {balloon:b, point:hits[0].point.clone()};
            }
            return null;
        }

        function updateLaserPointer(controller, hitPt=null) {
            const laser = controller.userData.laser, mat = controller.userData.laserMaterial;
            if(!laser||!mat) return;
            try {
                const isRight=(controller===rightController);
                if(hitPt) {
                    const {origin}=getControllerRay(controller);
                    const dist = origin.distanceTo(hitPt);
                    laser.scale.set(1, dist, 1);
                    laser.position.set(0,0,0);
                    mat.color.set(0x00ff44); mat.opacity=0.85; laser.visible=true;
                } else {
                    laser.scale.set(1,RAY_MAX_DISTANCE,1);
                    laser.position.set(0,0,0);
                    mat.color.set(isRight?0xff2222:0x2288ff); mat.opacity=0.45; laser.visible=true;
                }
            } catch(e){}
        }

        function setupController(idx) {
            const controller = renderer.xr.getController(idx);
            const grip = renderer.xr.getControllerGrip(idx);

            // 根据左右手创建不同枪模
            const gunModel = idx === 1 ? createRightGunModel() : createLeftGunModel();
            grip.add(gunModel);

            const laser = createLaserPointer(idx===1);
            controller.add(laser);

            // 枪口闪光
            const muzzleFlash = createMuzzleFlash(grip, idx===1 ? 0xff4400 : 0x2288ff);
            muzzleFlash.userData.active = false;
            muzzleFlash.userData.timer = 0;

            controller.userData = {
                laser, laserMaterial:laser.material, index:idx,
                gunModel: gunModel,
                muzzleFlash: muzzleFlash
            };

            dolly.add(controller); dolly.add(grip);
            controllers.push(controller);

            if(idx === 0) {
                leftController = controller;
                const scorePanel = createLeftControllerScore();
                controller.add(scorePanel);
                controller.userData.scorePanel = scorePanel;
                controller.addEventListener('selectstart', (e)=>{
                    if(e.target===controller){try{shoot(controller)}catch(e){}}
                });
            } else {
                rightController = controller;
                controller.addEventListener('selectstart', (e)=>{
                    if(e.target===controller){try{shoot(controller)}catch(e){}}
                });
            }
        }

        function destroyBalloon(b, hitPoint) {
            const idx = balloons.indexOf(b);
            if(idx >= 0) balloons.splice(idx, 1);
            createDebris(hitPoint || b.position.clone(), b.userData.color, b.userData.isGolden);
            addScore(b.userData.points, b.userData.isGolden);
            disposeBalloon(b);
            playPopSound(b.userData.isGolden);
        }

        // 退出检测
        let prevRightBtn={b4:false,b5:false};
        function exitVR(){if(renderer.xr.isPresenting)renderer.xr.getSession()?.end()?.catch(()=>{})}
        function handleExit(){
            const session=renderer.xr.getSession(); if(!session)return;
            for(const src of session.inputSources){
                if(src.handedness!=='right'||!src.gamepad||src.gamepad.buttons.length<6)continue;
                const a=src.gamepad.buttons[4].pressed, b=src.gamepad.buttons[5].pressed;
                if(a&&!prevRightBtn.b4)exitVR();
                if(b&&!prevRightBtn.b5)exitVR();
                prevRightBtn.b4=a; prevRightBtn.b5=b;
            }
        }

        function updateInput(){
            const session=renderer.xr.getSession(); if(!session) return;
            rightInput.stickX=0; rightInput.stickY=0; rightInput.trigger=false;
            leftInput.stickX=0;  leftInput.stickY=0;  leftInput.trigger=false;
            for(const source of session.inputSources){
                if(!source.gamepad) continue;
                const gp=source.gamepad, hand=source.handedness;
                if(gp.axes.length>=4){
                    if(hand==='right'){
                        rightInput.stickX=gp.axes[2]||0; rightInput.stickY=gp.axes[3]||0;
                        rightInput.trigger=(gp.buttons[0]?.value??0)>0.5;
                    }else if(hand==='left'){
                        leftInput.stickX=gp.axes[2]||0; leftInput.stickY=gp.axes[3]||0;
                        leftInput.trigger=(gp.buttons[0]?.value??0)>0.5;
                    }else{
                        if(rightInput.stickX===0&&rightInput.stickY===0){
                            rightInput.stickX=gp.axes[2]||0; rightInput.stickY=gp.axes[3]||0;
                            rightInput.trigger=(gp.buttons[0]?.value??0)>0.5;
                        }
                    }
                }else if(gp.axes.length>=2){
                    if(hand==='left'){leftInput.stickX=gp.axes[0]; leftInput.stickY=gp.axes[1];}
                }
            }
        }

        // ── 自动射击 & 手枪单发 ──
        let rifleTimer=0, pistolCooldown=0;
        function handleAutoFire(dt){
            if(!rightController||!rightInput.trigger){rifleTimer=0;return;}
            rifleTimer+=dt;
            const cooldown=RIFLE_COOLDOWN/1000;
            while(rifleTimer>=cooldown){shoot(rightController);rifleTimer-=cooldown;}
        }
        function handleLeftFire(dt){
            if(!leftController||!leftInput.trigger){leftTriggerWas=false;return;}
            if(pistolCooldown>0) return;
            if(!leftTriggerWas&&pistolCooldown<=0){
                shoot(leftController); pistolCooldown=0.25; leftTriggerWas=true;
            }
            if(pistolCooldown>0) pistolCooldown-=dt;
        }

        // 摇杆移动
        function handleMove(dt){
            let sx=rightInput.stickX, sy=rightInput.stickY;
            if(Math.abs(sx)<DEADZONE&&Math.abs(sy)<DEADZONE){sx=leftInput.stickX; sy=leftInput.stickY;}
            if(Math.abs(sx)<DEADZONE&&Math.abs(sy)<DEADZONE) return;
            const forward=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            forward.y=0; forward.normalize();
            const right=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
            right.y=0; right.normalize();
            const moveDir=new THREE.Vector3().addScaledVector(forward,-sy).addScaledVector(right,sx).normalize();
            const speed=MOVE_SPEED*Math.max(Math.abs(sx),Math.abs(sy));
            dolly.position.addScaledVector(moveDir, speed*dt);
            dolly.position.x=THREE.MathUtils.clamp(dolly.position.x,-30,30);
            dolly.position.z=THREE.MathUtils.clamp(dolly.position.z,-30,30);
        }

        // 气球生成与动画
        let lastSpawn=0;
        function spawnLoop(now){
            if(now-lastSpawn>SPAWN_INTERVAL){
                lastSpawn=now;
                if(balloons.length<MAX_BALLOONS) spawnBalloon();
                if(Math.random()<0.25&&balloons.length<MAX_BALLOONS-1) setTimeout(()=>{if(balloons.length<MAX_BALLOONS)spawnBalloon()},300+Math.random()*500);
            }
        }
        function animBalloons(now){
            balloons.forEach(b=>{
                const t=now*0.001;
                b.position.y=b.userData.baseY+Math.sin(t*b.userData.floatSpeed+b.userData.floatPhase)*b.userData.floatAmp;
                b.position.x+=b.userData.driftX*0.016; b.position.z+=b.userData.driftZ*0.016;
                b.rotation.y+=0.003; b.rotation.x+=Math.sin(t*0.7+b.userData.floatPhase)*0.005;
                const dx=b.position.x-b.userData.spawnPos.x, dz=b.position.z-b.userData.spawnPos.z;
                if(Math.sqrt(dx*dx+dz*dz)>5){b.userData.driftX*=-0.8;b.userData.driftZ*=-0.8;}
            });

            // 装饰气球串飘动
            decorGroup.children.forEach(d=>{
                d.position.y=d.userData.baseY+Math.sin(now*0.0008+d.userData.phase)*0.3;
                d.rotation.y=now*0.0003+d.userData.phase;
            });

            // 星星闪烁
            stars.rotation.y = now * 0.00005;

            // 派对灯光旋转
            partyLights.forEach(pl=>{
                pl.angle += pl.speed * 0.016;
                pl.light.position.set(
                    Math.cos(pl.angle)*pl.radius,
                    pl.yOffset + Math.sin(now*0.001+pl.angle)*1.5,
                    Math.sin(pl.angle)*pl.radius
                );
            });
        }

        // ════════════════════════════════════
        //  主循环
        // ════════════════════════════════════
        const clock=new THREE.Clock();
        function animate(ts, frame){
            const dt=Math.min(clock.getDelta(), 0.1);
            if(renderer.xr.isPresenting){
                updateInput(); handleExit(); handleMove(dt);
                handleAutoFire(dt); handleLeftFire(dt);
                spawnLoop(ts); animBalloons(ts);
                updateDebris(dt); updateBullets(dt);
                updateRecoils(dt);  // 后坐力+枪口闪光更新
                controllers.forEach(c=>{
                    const hit=checkBalloonHit(c);
                    updateLaserPointer(c, hit?hit.point:null);
                });
                updateLeftScoreDisplay();
                vrEntryEl.style.display='none'; vrHintsEl.style.display='none'; statusMsgEl.style.display='none';

                // 地面shader时间更新
                if(groundScene.userData.material){
                    groundScene.userData.material.uniforms.uTime.value = ts * 0.001;
                }
            } else {
                vrEntryEl.style.display='block'; vrHintsEl.style.display='flex';
                animBalloons(ts);
                // PC端也显示灯光旋转
                partyLights.forEach(pl=>{
                    pl.angle += pl.speed * 0.016;
                    pl.light.position.set(
                        Math.cos(pl.angle)*pl.radius, pl.yOffset, Math.sin(pl.angle)*pl.radius
                    );
                });
                stars.rotation.y = ts * 0.00005;
            }
            renderer.render(scene,camera);
        }
        renderer.setAnimationLoop(animate);

        // 启动
        function init(){
            setupController(0);
            setupController(1);
            for(let i=0;i<8;i++) setTimeout(()=>spawnBalloon(),i*250);
            setTimeout(()=>spawnBalloon(true),1500);
            lastSpawn=performance.now();

            enterVRBtn.onclick=async()=>{
                enterVRBtn.disabled=true; enterVRBtn.textContent='⏳ 启动中...';
                try{
                    const ok=await navigator.xr.isSessionSupported('immersive-vr');
                    if(!ok){showStatus('❌ 设备不支持','error'); enterVRBtn.disabled=false; enterVRBtn.textContent='🎈 进入VR气球派对！';return;}
                    const sess=await navigator.xr.requestSession('immersive-vr',{requiredFeatures:['local-floor']});
                    renderer.xr.setSession(sess); showStatus('','info');
                }catch(e){showStatus('❌ '+e.message,'error'); enterVRBtn.disabled=false; enterVRBtn.textContent='🎈 进入VR气球派对！';}
            };
            renderer.xr.addEventListener('sessionend',()=>{
                rifleTimer=0;
                enterVRBtn.disabled=false; enterVRBtn.textContent='🎈 进入VR气球派对！';
                vrEntryEl.style.display='block'; vrHintsEl.style.display='flex'; showStatus('','info');
                controllers.forEach(c=>{if(c.userData.laser) c.userData.laser.visible=false;});
            });
            renderer.xr.addEventListener('sessionstart',()=>{vrEntryEl.style.display='none'; vrHintsEl.style.display='none'; initAudio();});
            window.addEventListener('resize',()=>{
                camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth,window.innerHeight);
            });
            window.addEventListener('keydown',e=>{if(e.key==='Escape'&&renderer.xr.isPresenting) exitVR();});
        }
        function showStatus(m,t='info'){statusMsgEl.innerHTML=m; statusMsgEl.className=t; if(m==='')statusMsgEl.style.display='none';}
        init();
    </script>
</body>
</html>
